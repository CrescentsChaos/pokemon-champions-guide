<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ability Dex</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .dex-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .dex-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.16);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
        }

        .dex-card-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
        }

        .dex-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.95rem;
        }

        .dex-card-description {
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.75;
            font-size: 0.95rem;
        }

        .dex-sprite-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
        }

        .dex-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
        }

        .dex-sprite-cell {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dex-sprite-cell img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .dex-empty-state {
            padding: 2rem;
            border: 1px dashed rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.65);
            text-align: center;
        }

        .page-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <section class="pokedex-section" style="padding-top: 8rem; min-height: 100vh;">
        <div class="container">
            <div class="section-title fade-in">
                <h2 class="pokedex-title" style="font-size: 4rem;">ABILITY <span style="color: var(--primary-red)">DEX</span></h2>
                <p>Search and sort every ability with Pokémon sprites that can have it.</p>
            </div>

            <div class="page-links fade-in">
                <a href="../pokedex/" class="pokedex-select">Pokedex</a>
                <a href="../movedex/" class="pokedex-select">Move Dex</a>
                <a href="../itemdex/" class="pokedex-select">Item Dex</a>
            </div>

            <div class="pokedex-controls fade-in" style="gap:0.75rem; flex-wrap:wrap;">
                <input type="text" id="dex-search" class="search-input" placeholder="Search abilities, descriptions, or users...">
                <select id="sort-select" class="pokedex-select" style="min-width: 220px;">
                    <option value="name">Name</option>
                    <option value="learners">Pokémon Count</option>
                </select>
                <select id="sort-dir" class="pokedex-select" style="min-width: 160px;">
                    <option value="desc">High → Low</option>
                    <option value="asc">Low → High</option>
                </select>
            </div>

            <div id="dex-grid" class="dex-grid"></div>
        </div>
    </section>

    <script>
        let allAbilities = [];
        let allPokemon = [];
        let filteredAbilities = [];

        const grid = document.getElementById('dex-grid');
        const searchInput = document.getElementById('dex-search');
        const sortSelect = document.getElementById('sort-select');
        const sortDir = document.getElementById('sort-dir');

        async function initDex() {
            try {
                const cb = '?v=' + Date.now();
                const [abilitiesRes, pokeRes] = await Promise.all([
                    fetch('../assets/abilities.json' + cb),
                    fetch('../assets/pokemon.json' + cb)
                ]);

                allAbilities = await abilitiesRes.json();
                allPokemon = await pokeRes.json();
                buildAbilityLists();
                applyFiltersAndSort();
            } catch (err) {
                console.error('Failed to load Ability Dex data:', err);
                grid.innerHTML = '<div class="dex-empty-state">Unable to load Ability Dex data.</div>';
            }
        }

        function normalizeKey(value) {
            return (value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
        }

        function escapeHtmlAttr(value) {
            return (value || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escapeJsString(value) {
            return (value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        function getSpriteUrl(name, shiny = false) {
            const clean = (name || '').toLowerCase().replace(/ /g, '-').replace(/\./g, '').replace(/'/g, '').replace(/:/g, '').replace(/%/g, '');
            const base = shiny ? 'ani-shiny' : 'ani';
            return `https://play.pokemonshowdown.com/sprites/${base}/${clean}.gif`;
        }

        function handleSpriteError(img, name, shiny = false) {
            if (img.dataset.fallbackState === 'final') return;
            img.dataset.fallbackState = 'final';
            img.onerror = null;
            img.src = 'https://play.pokemonshowdown.com/sprites/ani/unown-interrogation.gif';
        }

        function buildAbilityLists() {
            allAbilities.forEach(ability => {
                const abilityKey = normalizeKey(ability.name || ability.Name);
                ability.learners = allPokemon.filter(p => {
                    const abilities = Array.isArray(p.Ability) ? p.Ability : (p.Ability ? [p.Ability] : []);
                    return abilities.some(a => normalizeKey(a) === abilityKey);
                });
            });
        }

        function applyFiltersAndSort() {
            const query = searchInput.value.toLowerCase().trim();
            filteredAbilities = allAbilities.filter(ability => {
                if (!query) return true;
                const text = [ability.name || ability.Name, ability.description]
                    .filter(Boolean)
                    .join(' ').toLowerCase();
                const usersText = (ability.learners || []).map(p => p.Name).join(' ').toLowerCase();
                return text.includes(query) || usersText.includes(query);
            });

            filteredAbilities.sort((a, b) => {
                const mode = sortSelect.value;
                const dir = sortDir.value === 'asc' ? 1 : -1;
                const av = mode === 'learners' ? (a.learners.length || 0) : (a.name || '').toLowerCase();
                const bv = mode === 'learners' ? (b.learners.length || 0) : (b.name || '').toLowerCase();
                if (typeof av === 'string' && typeof bv === 'string') return av.localeCompare(bv) * dir;
                return (av - bv) * dir;
            });
            renderDex();
        }

        function renderDex() {
            if (!filteredAbilities.length) {
                grid.innerHTML = '<div class="dex-empty-state">No abilities matched your search.</div>';
                return;
            }

            grid.innerHTML = '';
            const fragment = document.createDocumentFragment();
            filteredAbilities.forEach(ability => fragment.appendChild(createAbilityCard(ability)));
            grid.appendChild(fragment);
        }

        function createAbilityCard(ability) {
            const card = document.createElement('div');
            card.className = 'dex-card';
            const learners = ability.learners || [];
            const learnerSprites = learners.slice(0, 18).map(p => {
                const rawName = p.Name || p.name || 'Unknown';
                const safeName = escapeHtmlAttr(rawName);
                const jsName = escapeJsString(rawName);
                return `
                <div class="dex-sprite-cell" title="${safeName}">
                    <img src="${getSpriteUrl(rawName)}" alt="${safeName}" onerror="handleSpriteError(this, '${jsName}')">
                </div>
            `;
            }).join('');

            card.innerHTML = `
                <div class="dex-card-title">${ability.name || ability.Name}</div>
                <div class="dex-card-meta">
                    <div><strong>Pokémon</strong><br>${learners.length}</div>
                </div>
                <p class="dex-card-description">${ability.description || 'No description available.'}</p>
                <div class="dex-sprite-row">${learnerSprites}${learners.length > 18 ? `<span class="dex-pill" style="background: rgba(255,255,255,0.08);">+${learners.length - 18}</span>` : ''}</div>
            `;
            return card;
        }

        searchInput.addEventListener('input', applyFiltersAndSort);
        sortSelect.addEventListener('change', applyFiltersAndSort);
        sortDir.addEventListener('change', applyFiltersAndSort);

        initDex();
    </script>
</body>
</html>
