<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ability Dex | Pokemon Champions Guide</title>
    <link rel="icon" type="image/png" href="../assets/champions-logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dex.css">
</head>
<body class="dex-page">
    <section class="dex-shell">
        <div class="container">
            <header class="dex-header fade-in">
                <h1>Ability <em>Dex</em></h1>
                <p>Full ability descriptions with Pokémon sprites for every species that can have each ability.</p>
            </header>
            <div id="dex-nav-slot"></div>

            <div class="dex-toolbar fade-in">
                <div class="dex-search-row">
                    <input type="search" id="dex-search" class="dex-search" placeholder="Search abilities, effects, or Pokémon…" autocomplete="off">
                </div>
                <div class="dex-filters-row">
                    <span class="dex-label">Sort</span>
                    <select id="sort-primary" class="dex-select">
                        <option value="name">Name</option>
                        <option value="learners">Pokémon Count</option>
                        <option value="desc">Description Length</option>
                    </select>
                    <select id="sort-dir" class="dex-select">
                        <option value="asc" selected>Ascending</option>
                        <option value="desc">Descending</option>
                    </select>
                    <span class="dex-label">Group</span>
                    <select id="sort-group" class="dex-select">
                        <option value="none" selected>None</option>
                        <option value="rarity">By Rarity</option>
                    </select>
                    <label class="dex-check"><input type="checkbox" id="filter-popular"> Common (5+ Pokémon)</label>
                </div>
            </div>

            <p id="dex-results-meta" class="dex-results-meta"></p>
            <div id="dex-grid" class="dex-grid"></div>
        </div>
    </section>

    <div id="dex-detail-modal" class="modal-overlay dex-detail-modal">
        <div class="modal-content">
            <button type="button" class="close-modal" id="dex-close-modal">&times;</button>
            <div id="dex-modal-body"></div>
        </div>
    </div>

    <script src="../js/mega-sprites.js"></script>
    <script src="../js/dex-shared.js"></script>
    <script src="../js/dex/abilitydex.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
