<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Dex | Pokemon Champions Guide</title>
    <meta name="description" content="Item dex for Pokémon Champions — held items, mega stones, and Champions-legal gear.">
    <link rel="icon" type="image/png" href="../assets/champions-logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dex.css">
</head>
<body class="dex-page">
    <section class="dex-shell">
        <div class="container">
            <header class="dex-header fade-in">
                <h1>Item <em>Dex</em></h1>
                <p>Held items, mega stones, berries, and more — with sprites, usage data, and Champions availability.</p>
            </header>
            <div id="dex-nav-slot"></div>

            <div class="dex-toolbar fade-in">
                <div class="dex-search-row">
                    <input type="search" id="dex-search" class="dex-search" placeholder="Search items, effects, or Pokémon…" autocomplete="off">
                </div>
                <div class="dex-filters-row">
                    <span class="dex-label">Sort</span>
                    <select id="sort-primary" class="dex-select">
                        <option value="name">Name</option>
                        <option value="pokemon">Pokémon Count</option>
                        <option value="builds">Build Count</option>
                        <option value="category">Category</option>
                        <option value="champions" selected>Champions First</option>
                    </select>
                    <select id="sort-dir" class="dex-select">
                        <option value="asc">Ascending</option>
                        <option value="desc" selected>Descending</option>
                    </select>
                    <span class="dex-label">Group</span>
                    <select id="sort-group" class="dex-select">
                        <option value="none" selected>None</option>
                        <option value="category">By Category</option>
                    </select>
                </div>
                <div class="dex-filters-row">
                    <span class="dex-label">Filter</span>
                    <select id="filter-category" class="dex-select">
                        <option value="">All Categories</option>
                        <option value="Held Item">Held Item</option>
                        <option value="Mega Stone">Mega Stone</option>
                        <option value="Z-Crystal">Z-Crystal</option>
                        <option value="Type Item">Type Item</option>
                        <option value="Berry">Berry</option>
                        <option value="Other">Other</option>
                    </select>
                    <label class="dex-check"><input type="checkbox" id="filter-champions" checked> Champions only</label>
                </div>
            </div>

            <p id="dex-results-meta" class="dex-results-meta"></p>
            <div id="dex-grid" class="dex-grid"></div>
        </div>
    </section>

    <div id="dex-detail-modal" class="modal-overlay dex-detail-modal">
        <div class="modal-content">
            <button type="button" class="close-modal" id="dex-close-modal">&times;</button>
            <div id="dex-modal-body"></div>
        </div>
    </div>

    <script src="../js/dex-shared.js"></script>
    <script src="../js/dex/itemdex.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
