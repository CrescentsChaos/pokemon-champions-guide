<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Dex</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .dex-card {
            background: rgba(5, 12, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .dex-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.16);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
        }

        .dex-card-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
        }

        .dex-card-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, max-content));
            gap: 0.75rem;
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.95rem;
        }

        .dex-card-description {
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.75;
            font-size: 0.95rem;
        }

        .dex-sprite-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
        }

        .dex-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
        }

        .dex-sprite-cell {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dex-sprite-cell img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .dex-pokemon-badge {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 6px 12px;
            color: white;
            font-size: 0.82rem;
        }

        .dex-empty-state {
            padding: 2rem;
            border: 1px dashed rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.65);
            text-align: center;
        }

        .page-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <section class="pokedex-section" style="padding-top: 8rem; min-height: 100vh;">
        <div class="container">
            <div class="section-title fade-in">
                <h2 class="pokedex-title" style="font-size: 4rem;">ITEM <span style="color: var(--primary-red)">DEX</span></h2>
                <p>Browse every item with dataset usage, builds, and Pokémon.</p>
            </div>

            <div class="page-links fade-in">
                <a href="../pokedex/" class="pokedex-select">Pokedex</a>
                <a href="../movedex/" class="pokedex-select">Move Dex</a>
                <a href="../abilitydex/" class="pokedex-select">Ability Dex</a>
            </div>

            <div class="pokedex-controls fade-in" style="gap:0.75rem; flex-wrap:wrap;">
                <input type="text" id="dex-search" class="search-input" placeholder="Search items, categories, or effects...">
                <select id="sort-select" class="pokedex-select" style="min-width: 220px;">
                    <option value="name">Name</option>
                    <option value="category">Category</option>
                    <option value="pokemon">Pokémon Count</option>
                    <option value="builds">Build Count</option>
                </select>
                <select id="sort-dir" class="pokedex-select" style="min-width: 160px;">
                    <option value="desc">High → Low</option>
                    <option value="asc">Low → High</option>
                </select>
            </div>

            <div id="dex-grid" class="dex-grid"></div>
        </div>
    </section>

    <script>
        let allItems = [];
        let allPokemon = [];
        let allBuilds = [];
        let filteredItems = [];
        let usageMap = {};
        let buildMap = {};

        const grid = document.getElementById('dex-grid');
        const searchInput = document.getElementById('dex-search');
        const sortSelect = document.getElementById('sort-select');
        const sortDir = document.getElementById('sort-dir');

        async function initDex() {
            try {
                const cb = '?v=' + Date.now();
                const [itemsRes, pokeRes, buildsRes] = await Promise.all([
                    fetch('../assets/items.json' + cb),
                    fetch('../assets/pokemon.json' + cb),
                    fetch('../assets/builds.json' + cb)
                ]);

                allItems = await itemsRes.json();
                allPokemon = await pokeRes.json();
                allBuilds = await buildsRes.json();
                buildUsageMaps();
                applyFiltersAndSort();
            } catch (err) {
                console.error('Failed to load Item Dex data:', err);
                grid.innerHTML = '<div class="dex-empty-state">Unable to load Item Dex data.</div>';
            }
        }

        function normalizeKey(value) {
            return (value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
        }

        function getSpriteUrl(name) {
            const clean = (name || '').toLowerCase()
                .replace(/ /g, '-')
                .replace(/\./g, '')
                .replace(/'/g, '')
                .replace(/:/g, '')
                .replace(/%/g, '');
            return `https://play.pokemonshowdown.com/sprites/ani/${clean}.gif`;
        }

        function handleSpriteError(img) {
            if (img.dataset.fallbackState === 'final') return;
            img.dataset.fallbackState = 'final';
            img.onerror = null;
            img.src = 'https://play.pokemonshowdown.com/sprites/ani/unown-interrogation.gif';
        }

        function buildUsageMaps() {
            usageMap = {};
            buildMap = {};

            allPokemon.forEach(pokemon => {
                const itemList = Array.isArray(pokemon.Items) ? pokemon.Items : (pokemon.Items ? [pokemon.Items] : []);
                itemList.forEach(item => {
                    const key = normalizeKey(item);
                    if (!usageMap[key]) usageMap[key] = new Set();
                    usageMap[key].add(pokemon.Name);
                });
            });

            allBuilds.forEach(build => {
                const line = (build.build || '').split('\n')[0] || '';
                const match = line.match(/@\s*(.+)$/);
                if (!match) return;
                const item = match[1].trim();
                const key = normalizeKey(item);
                if (!buildMap[key]) buildMap[key] = new Set();
                buildMap[key].add(build.pokemon || build.pokemon_name || 'Unknown');
            });
        }

        function applyFiltersAndSort() {
            const query = searchInput.value.toLowerCase().trim();
            filteredItems = allItems.map(item => {
                const name = item.name || item.Name || 'Unknown';
                const key = normalizeKey(name);
                return {
                    item,
                    name,
                    category: item.category || item.Category || 'Unknown',
                    users: Array.from(usageMap[key] || []).sort(),
                    buildUsers: Array.from(buildMap[key] || []).sort()
                };
            }).filter(entry => {
                if (!query) return true;
                const text = [entry.name, entry.category, entry.item.description, entry.item.effect]
                    .filter(Boolean)
                    .join(' ').toLowerCase();
                return text.includes(query) || entry.users.join(' ').toLowerCase().includes(query) || entry.buildUsers.join(' ').toLowerCase().includes(query);
            });

            filteredItems.sort((a, b) => {
                const mode = sortSelect.value;
                const dir = sortDir.value === 'asc' ? 1 : -1;
                let av, bv;

                switch (mode) {
                    case 'category':
                        av = a.category.toLowerCase();
                        bv = b.category.toLowerCase();
                        break;
                    case 'pokemon':
                        av = a.users.length;
                        bv = b.users.length;
                        break;
                    case 'builds':
                        av = a.buildUsers.length;
                        bv = b.buildUsers.length;
                        break;
                    default:
                        av = a.name.toLowerCase();
                        bv = b.name.toLowerCase();
                }
                if (typeof av === 'string' && typeof bv === 'string') return av.localeCompare(bv) * dir;
                return (av - bv) * dir;
            });

            renderDex();
        }

        function renderDex() {
            if (!filteredItems.length) {
                grid.innerHTML = '<div class="dex-empty-state">No items matched your search.</div>';
                return;
            }

            grid.innerHTML = '';
            const fragment = document.createDocumentFragment();
            filteredItems.forEach(entry => fragment.appendChild(createItemCard(entry)));
            grid.appendChild(fragment);
        }

        function createItemCard(entry) {
            const card = document.createElement('div');
            card.className = 'dex-card';
            const users = entry.users;
            const builds = entry.buildUsers;
            const spriteHtml = users.slice(0, 18).map(name => `
                <div class="dex-sprite-cell" title="${name}">
                    <img src="${getSpriteUrl(name)}" alt="${name}" onerror="handleSpriteError(this)">
                </div>
            `).join('');

            const buildBadges = builds.slice(0, 18).map(name => `<span class="dex-pokemon-badge" title="${name}">${name}</span>`).join('');

            card.innerHTML = `
                <div class="dex-card-title">${entry.name}</div>
                <div class="dex-card-meta">
                    <div><strong>Category</strong><br>${entry.category}</div>
                    <div><strong>Pokémon</strong><br>${users.length}</div>
                    <div><strong>Builds</strong><br>${builds.length}</div>
                </div>
                <p class="dex-card-description">${entry.item.description || entry.item.effect || 'No description available.'}</p>
                <div>
                    <div style="color: rgba(255,255,255,0.78); margin-bottom: 0.65rem; font-size: 0.92rem;"><strong>Used by Pokémon</strong></div>
                    <div class="dex-sprite-row">${spriteHtml}${users.length > 18 ? `<span class="dex-pill" style="background: rgba(255,255,255,0.08);">+${users.length - 18}</span>` : ''}</div>
                </div>
                ${builds.length ? `
                    <div>
                        <div style="color: rgba(255,255,255,0.78); margin: 0.75rem 0 0.65rem; font-size: 0.92rem;"><strong>Featured in builds</strong></div>
                        <div style="display:flex; flex-wrap:wrap; gap:0.5rem;">${buildBadges}${builds.length > 18 ? `<span class="dex-pill" style="background: rgba(255,255,255,0.08);">+${builds.length - 18}</span>` : ''}</div>
                    </div>
                ` : ''}
            `;
            return card;
        }

        searchInput.addEventListener('input', applyFiltersAndSort);
        sortSelect.addEventListener('change', applyFiltersAndSort);
        sortDir.addEventListener('change', applyFiltersAndSort);

        initDex();
    </script>
</body>
</html>
