<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move Dex | Pokemon Champions Guide</title>
    <link rel="icon" type="image/png" href="../assets/champions-logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dex.css">
</head>
<body class="dex-page">
    <section class="dex-shell">
        <div class="container">
            <header class="dex-header fade-in">
                <h1>Move <em>Dex</em></h1>
                <p>Every move with power, accuracy, damage class, move tags, and which Pokémon learn it.</p>
            </header>
            <div id="dex-nav-slot"></div>

            <div class="dex-toolbar fade-in">
                <div class="dex-search-row">
                    <input type="search" id="dex-search" class="dex-search" placeholder="Search moves, types, tags, effects…" autocomplete="off">
                </div>
                <div class="dex-filters-row">
                    <span class="dex-label">Sort</span>
                    <select id="sort-primary" class="dex-select">
                        <option value="name">Name</option>
                        <option value="type">Type</option>
                        <option value="power">Power</option>
                        <option value="accuracy">Accuracy</option>
                        <option value="pp">PP</option>
                        <option value="priority">Priority</option>
                        <option value="dmg">Damage Class</option>
                        <option value="gen">Generation</option>
                        <option value="learners">Learner Count</option>
                        <option value="id">Move ID</option>
                    </select>
                    <select id="sort-dir" class="dex-select">
                        <option value="asc" selected>Ascending</option>
                        <option value="desc">Descending</option>
                    </select>
                    <span class="dex-label">Group</span>
                    <select id="sort-group" class="dex-select">
                        <option value="none" selected>None</option>
                        <option value="type">By Type</option>
                        <option value="dmg">By Damage Class</option>
                        <option value="gen">By Generation</option>
                    </select>
                </div>
                <div class="dex-filters-row">
                    <span class="dex-label">Filter</span>
                    <select id="filter-type" class="dex-select"><option value="">All Types</option></select>
                    <select id="filter-dmg" class="dex-select">
                        <option value="">All Classes</option>
                        <option value="Physical">Physical</option>
                        <option value="Special">Special</option>
                        <option value="Status">Status</option>
                    </select>
                    <select id="filter-tag" class="dex-select"><option value="">All Tags</option></select>
                    <select id="filter-gen" class="dex-select"><option value="">All Generations</option></select>
                    <label class="dex-check"><input type="checkbox" id="filter-damaging"> Damaging moves only</label>
                </div>
            </div>

            <p id="dex-results-meta" class="dex-results-meta"></p>
            <div id="dex-grid" class="dex-grid"></div>
        </div>
    </section>

    <div id="dex-detail-modal" class="modal-overlay dex-detail-modal">
        <div class="modal-content">
            <button type="button" class="close-modal" id="dex-close-modal">&times;</button>
            <div id="dex-modal-body"></div>
        </div>
    </div>

    <script src="../js/dex-shared.js"></script>
    <script src="../js/dex/movedex.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
