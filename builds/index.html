<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Competitive Pokemon Builds Library: Browse and export top-tier strategies for Scarlet and Violet.">
    <title>Competitive Builds | Pokemon Champions Guide</title>

    <!-- Preload critical datasets -->
    <link rel="preload" href="../assets/builds.json" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="../assets/pokemon.json" as="fetch" crossorigin="anonymous">

    <link rel="stylesheet" href="../css/style.css">
    <style>
        .builds-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8rem 2rem;
        }

        .search-wrapper {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: sticky;
            top: 5rem;
            z-index: 100;
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-select {
            flex: 1;
            min-width: 200px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .filter-select:focus {
            border-color: var(--primary-red);
            background: rgba(255, 255, 255, 0.06);
        }

        .filter-select option {
            background: #1a1a1a;
            color: white;
        }

        #build-search {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem 2rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        #build-search:focus {
            border-color: var(--primary-red);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: var(--accent-glow);
        }

        /* Build Card Wrapper */
        .build-card-wrapper {
            cursor: pointer;
            transition: var(--transition);
        }

        .build-card-wrapper:hover {
            transform: translateY(-5px);
        }

        .build-card-wrapper.selected .pokemon-card-premium {
            border-color: var(--primary-red) !important;
            box-shadow: var(--accent-glow), 0 20px 40px rgba(0, 0, 0, 0.6) !important;
            background: rgba(255, 51, 51, 0.06) !important;
        }

        /* Synergy Section */
        #synergy-container {
            margin-top: 5rem;
            padding-top: 5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .synergy-header {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        #builds-grid,
        #synergy-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        /* Premium Card Styles (Sync with Teambuilder) */
        .pokemon-card-premium {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.4));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: auto; /* Allow card to shrink/grow naturally */
        }

        .card-header {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .card-sprite-area {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .premium-sprite {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
        }

        .header-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .roles-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }

        .role-badge {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .format-badge {
            background: var(--primary-red);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.55rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tera-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tera-icon {
            width: 10px;
            height: 10px;
            clip-path: polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%);
        }

        .type-badges-row {
            display: flex;
            gap: 6px;
        }

        .move-pill {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 5px 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .move-pill span {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #eee;
        }

        .stat-bar-mini {
            height: 5px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            flex: 1;
            overflow: hidden;
            margin: 0 8px;
        }

        .stat-fill-mini {
            height: 100%;
            border-radius: 10px;
            transition: width 0.8s ease-out;
        }

        @media (max-width: 1200px) {
            #builds-grid,
            #synergy-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 850px) {
            #builds-grid,
            #synergy-grid {
                grid-template-columns: 1fr !important;
            }

            .synergy-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }

        /* Empty Slot */
        .empty-slot-premium {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.01);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 400px;
            color: rgba(255, 255, 255, 0.1);
            gap: 12px;
        }
    </style>
</head>

<body>
    <div class="builds-container">
        <div class="section-title fade-in">
            <h2>BUILD FINDER</h2>
            <p style="color: var(--text-muted);">Visualized competitive sets from the world's best trainers.</p>
        </div>

        <div class="search-wrapper fade-in">
            <input type="text" id="build-search" placeholder="Search by Pokemon name (e.g. Miraidon, Incineroar)...">
            <div class="filter-row">
                <select id="type-filter" class="filter-select">
                    <option value="">All Types</option>
                </select>
                <select id="role-filter" class="filter-select">
                    <option value="">All Roles</option>
                </select>
                <select id="format-filter" class="filter-select">
                    <option value="">All Formats</option>
                    <option value="Singles">Singles</option>
                    <option value="Doubles">Doubles</option>
                </select>
            </div>
        </div>

        <div id="builds-grid" class="fade-in" style="margin-bottom: 2rem;">
            <!-- Builds will be injected here as high-fidelity cards -->
        </div>

        <div id="load-more-sentinel" style="height: 50px; margin-top: 1rem;"></div>

        <div id="synergy-container" class="fade-in">
            <div class="synergy-header">
                <div>
                    <h2 id="synergy-title" style="color: white; font-size: 2.2rem; margin-bottom: 0.5rem;">STRATEGIC
                        SYNERGY</h2>
                    <p style="color: var(--text-muted);">The best partners for your selected build.</p>
                </div>
                <button onclick="closeSynergy()" class="btn btn-secondary"
                    style="background:transparent; border: 1px solid rgba(255,255,255,0.2);">CLOSE VIEW</button>
            </div>
            <div id="synergy-grid">
                <!-- Synergy cards injected here -->
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Build Paste Copied!</div>

    <script src="../js/main.js"></script>
    <script>
        let allPokemon = [];
        let allBuilds = [];
        let allMoves = [];
        let allItems = [];
        let selectedBuildId = null;
        let displayedCount = 12;
        const batchSize = 12;

        const typeColors = {
            normal: '#A8A77A', fire: '#EE8130', water: '#6390F0', electric: '#F7D02C',
            grass: '#7AC74C', ice: '#96D9D6', fighting: '#C22E28', poison: '#A33EA1',
            ground: '#E2BF65', flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
            rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC', steel: '#B7B7CE',
            fairy: '#D685AD', dark: '#705746', stellar: '#70DBFF'
        };

        const rolesList = [
            'Physical Sweeper', 'Special Sweeper', 'Wallbreaker', 'Revenge Killer',
            'Physical Wall', 'Special Wall', 'Fake Out Pressure', 'Redirection',
            'Intimidate Support', 'Trick Room Setter', 'Speed Control', 'Pivot',
            'Screener', 'Hazard Setter', 'Hazard Control', 'Setup Sweeper',
            'Disruptor', 'Cleric/Healer', 'Phazer/Hazer', 'Weather Setter',
            'Terrain Setter', 'Restricted Legendary', 'Generalist'
        ];

        const natureMap = {
            'Adamant': { pos: 'atk', neg: 'spa' }, 'Bold': { pos: 'def', neg: 'atk' },
            'Brave': { pos: 'atk', neg: 'spe' }, 'Calm': { pos: 'spd', neg: 'atk' },
            'Careful': { pos: 'spd', neg: 'spa' }, 'Hasty': { pos: 'spe', neg: 'def' },
            'Impish': { pos: 'def', neg: 'spa' }, 'Jolly': { pos: 'spe', neg: 'spa' },
            'Modest': { pos: 'spa', neg: 'atk' }, 'Naive': { pos: 'spe', neg: 'spd' },
            'Quiet': { pos: 'spa', neg: 'spe' }, 'Rash': { pos: 'spa', neg: 'spd' },
            'Relaxed': { pos: 'def', neg: 'spe' }, 'Sassy': { pos: 'spd', neg: 'spe' },
            'Timid': { pos: 'spe', neg: 'atk' }
        };

        async function loadData() {
            try {
                const [pResp, bResp, mResp, iResp] = await Promise.all([
                    fetch('../assets/pokemon.json'),
                    fetch('../assets/builds.json'),
                    fetch('../assets/moves.json'),
                    fetch('../assets/items.json')
                ]);
                allPokemon = await pResp.json();
                allBuilds = await bResp.json();
                allMoves = await mResp.json();
                allItems = await iResp.json();

                // Sort Alphabetically
                allBuilds.sort((a, b) => a.pokemon.localeCompare(b.pokemon));

                populateFilters();
                setupInfiniteScroll();
                renderBuilds();
            } catch (e) { console.error("Data load failed", e); }
        }

        function setupInfiniteScroll() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    loadMore();
                }
            }, { rootMargin: '200px' });
            observer.observe(document.getElementById('load-more-sentinel'));
        }

        function loadMore() {
            const search = document.getElementById('build-search').value.trim();
            const typeFilter = document.getElementById('type-filter').value;
            const roleFilter = document.getElementById('role-filter').value;
            const formatFilter = document.getElementById('format-filter').value;

            // Only increase if we filter results are larger than displayed
            displayedCount += batchSize;
            renderBuilds(true);
        }

        function populateFilters() {
            const typeFilter = document.getElementById('type-filter');
            Object.keys(typeColors).forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t.charAt(0).toUpperCase() + t.slice(1);
                typeFilter.appendChild(opt);
            });

            const roleFilter = document.getElementById('role-filter');
            rolesList.sort().forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                roleFilter.appendChild(opt);
            });
        }

        function detectRole(p, db) {
            const stats = {
                hp: calculateStat(db?.HP || 0, p.ivs.hp, p.evs.hp, p.level, p.nature, 'hp'),
                atk: calculateStat(db?.Attack || 0, p.ivs.atk, p.evs.atk, p.level, p.nature, 'atk'),
                def: calculateStat(db?.Defense || 0, p.ivs.def, p.evs.def, p.level, p.nature, 'def'),
                spa: calculateStat(db?.['Sp.Atk'] || 0, p.ivs.spa, p.evs.spa, p.level, p.nature, 'spa'),
                spd: calculateStat(db?.['Sp.Def'] || 0, p.ivs.spd, p.evs.spd, p.level, p.nature, 'spd'),
                spe: calculateStat(db?.Speed || 0, p.ivs.spe, p.evs.spe, p.level, p.nature, 'spe')
            };

            const ability = (p.ability || '').toLowerCase();
            const item = (p.item || '').toLowerCase();
            const moves = p.moves.map(m => m.toLowerCase());
            const bst = db?.Total_Stats || 0;

            const hasMove = (list) => list.some(m => moves.includes(m));
            const roles = [];

            if (stats.atk > 150 && stats.spe > 130) roles.push('Physical Sweeper');
            if (stats.spa > 150 && stats.spe > 130) roles.push('Special Sweeper');
            if (stats.atk > 180 || stats.spa > 180) roles.push('Wallbreaker');
            if (item === 'choice scarf') roles.push('Revenge Killer');
            if (stats.hp > 180 && stats.def > 130) roles.push('Physical Wall');
            if (stats.hp > 180 && stats.spd > 130) roles.push('Special Wall');

            if (hasMove(['fake out'])) roles.push('Fake Out Pressure');
            if (hasMove(['follow me', 'rage powder', 'ally switch'])) roles.push('Redirection');
            if (ability === 'intimidate') roles.push('Intimidate Support');
            if (hasMove(['trick room'])) roles.push('Trick Room Setter');
            if (hasMove(['tailwind', 'icy wind', 'electroweb', 'string shot'])) roles.push('Speed Control');
            if (hasMove(['u-turn', 'volt switch', 'parting shot', 'flip turn'])) roles.push('Pivot');
            if (hasMove(['reflect', 'light screen', 'aurora veil'])) roles.push('Screener');
            if (hasMove(['stealth rock', 'spikes', 'toxic spikes', 'sticky web'])) roles.push('Hazard Setter');
            if (hasMove(['rapid spin', 'defog', 'mortal spin', 'court change'])) roles.push('Hazard Control');
            if (hasMove(['swords dance', 'calm mind', 'nasty plot', 'dragon dance', 'quiver dance', 'bulk up', 'iron defense'])) roles.push('Setup Sweeper');
            if (hasMove(['will-o-wisp', 'thunder wave', 'spore', 'toxic', 'yawn', 'sleep powder'])) roles.push('Disruptor');
            if (hasMove(['wish', 'heal bell', 'aromatherapy', 'life dew', 'milk drink', 'recover', 'roost', 'soft-boiled', 'pollen puff'])) roles.push('Cleric/Healer');
            if (hasMove(['roar', 'whirlwind', 'dragon tail', 'circle throw', 'haze', 'clear smog'])) roles.push('Phazer/Hazer');

            if (['drought', 'drizzle', 'sand stream', 'snow warning'].includes(ability)) roles.push('Weather Setter');
            if (['psychic surge', 'grassy surge', 'misty surge', 'electric surge'].includes(ability)) roles.push('Terrain Setter');
            if (bst >= 670) roles.push('Restricted Legendary');

            return roles.length > 0 ? roles : ['Generalist'];
        }

        function handleSpriteError(img, species, shiny) {
            if (!species || img.dataset.fallback === 'true') return;
            img.dataset.fallback = 'true';
            img.classList.remove('mega-toggle');
            const clean = species.toLowerCase().replace(/ /g, '-').replace(/\./g, '').replace(/[^a-z0-9-]/g, '');
            const folder = shiny ? 'xy-shiny' : 'xy';
            img.src = `https://www.smogon.com/dex/media/sprites/${folder}/${clean}.gif`;
        }

        function getMegaSpriteUrl(p) {
            if (!p || !p.species || !p.item) return null;
            const it = p.item.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!it.endsWith('ite') && !it.endsWith('itex') && !it.endsWith('itey')) return null;
            if (it === 'eviolite' || it === 'meteorite') return null;

            let suffix = '-mega';
            if (it.endsWith('itex')) suffix = '-megax';
            else if (it.endsWith('itey')) suffix = '-megay';

            const clean = p.species.toLowerCase().replace(/ /g, '-').replace(/\./g, '');
            const base = p.shiny ? 'ani-shiny' : 'ani';
            return `https://play.pokemonshowdown.com/sprites/${base}/${clean}${suffix}.gif`;
        }

        setInterval(() => {
            document.querySelectorAll('img.mega-toggle').forEach(img => {
                if (img.dataset.fallback === 'true') {
                    img.classList.remove('mega-toggle');
                    return;
                }
                if (img.dataset.currentSrc !== 'mega') {
                    img.src = img.dataset.mega;
                    img.dataset.currentSrc = 'mega';
                } else {
                    img.src = img.dataset.base;
                    img.dataset.currentSrc = 'base';
                }
            });
        }, 3000);

        function getSpriteUrl(p) {
            if (!p || !p.species) return 'https://play.pokemonshowdown.com/sprites/ani/unown-interrogation.gif';
            const clean = p.species.toLowerCase().replace(/ /g, '-').replace(/\./g, '');
            const base = p.shiny ? 'ani-shiny' : 'ani';
            return `https://play.pokemonshowdown.com/sprites/${base}/${clean}.gif`;
        }

        function getItemSpriteUrl(item) {
            if (!item || item.toLowerCase() === 'none') return '';
            const clean = item.toLowerCase().replace(/[^a-z0-9-]/g, '');
            return `https://www.serebii.net/itemdex/sprites/sv/${clean}.png`;
        }

        function handleItemError(img, item) {
            if (img.dataset.fallback === 'true' || !item) {
                img.style.display = 'none';
                return;
            }
            img.dataset.fallback = 'true';
            if (item.toLowerCase().endsWith('ite')) {
                const clean = item.toLowerCase().replace(/[^a-z0-9-]/g, '');
                img.src = `https://www.serebii.net/itemdex/sprites/pgl/${clean}.png`;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        }

        function calculateStat(base, iv, ev, level, natureType, statKey) {
            const lvl = parseInt(level) || 50;
            const evBonus = Math.floor(parseInt(ev || 0) / 4);
            const ivVal = parseInt(iv || 31);
            if (statKey === 'hp') {
                if (parseInt(base) === 1) return 1;
                return Math.floor(((2 * parseInt(base) + ivVal + evBonus) * lvl) / 100) + lvl + 10;
            }
            let val = Math.floor(((2 * parseInt(base) + ivVal + evBonus) * lvl) / 100) + 5;
            const nature = natureMap[natureType];
            if (nature) {
                if (nature.pos === statKey) val = Math.floor(val * 1.1);
                if (nature.neg === statKey) val = Math.floor(val * 0.9);
            }
            return val;
        }

        function parsePaste(text) {
            const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const slot = {
                species: '', item: '', ability: '', level: 50, shiny: false,
                tera: 'Normal', evs: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
                ivs: { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 },
                nature: 'Serious', moves: [], nickname: '', gender: ''
            };
            if (lines.length === 0) return slot;

            const head = lines[0];
            const itemSplit = head.split('@');
            if (itemSplit[1]) slot.item = itemSplit[1].trim();
            const speciesPart = itemSplit[0].trim();
            slot.species = speciesPart.includes('(') ? speciesPart.split('(')[1].split(')')[0].trim() : speciesPart;

            lines.slice(1).forEach(l => {
                const line = l.trim();
                if (line.match(/^Ability\s*:/i)) slot.ability = line.split(':')[1].trim();
                else if (line.match(/^Level\s*:/i)) slot.level = parseInt(line.split(':')[1].trim());
                else if (line.match(/^Tera Type\s*:/i)) slot.tera = line.split(':')[1].trim();
                else if (line.match(/^EVs\s*:/i)) {
                    line.split(':')[1].split('/').forEach(p => {
                        const match = p.trim().match(/(\d+)\s*([a-zA-Z]+)/);
                        if (match) {
                            let key = match[2].toLowerCase();
                            if (key === 'hp') key = 'hp';
                            else if (key === 'atk') key = 'atk';
                            else if (key === 'def') key = 'def';
                            else if (key === 'spa' || key === 'spatk' || key === 'satk') key = 'spa';
                            else if (key === 'spd' || key === 'spdef' || key === 'sdef') key = 'spd';
                            else if (key === 'spe' || key === 'speed') key = 'spe';
                            if (slot.evs[key] !== undefined) slot.evs[key] = parseInt(match[1]);
                        }
                    });
                } else if (line.match(/^IVs\s*:/i)) {
                    line.split(':')[1].split('/').forEach(p => {
                        const match = p.trim().match(/(\d+)\s*([a-zA-Z]+)/);
                        if (match) {
                            let key = match[2].toLowerCase();
                            if (key === 'hp') key = 'hp';
                            else if (key === 'atk') key = 'atk';
                            else if (key === 'def') key = 'def';
                            else if (key === 'spa' || key === 'spatk' || key === 'satk') key = 'spa';
                            else if (key === 'spd' || key === 'spdef' || key === 'sdef') key = 'spd';
                            else if (key === 'spe' || key === 'speed') key = 'spe';
                            if (slot.ivs[key] !== undefined) slot.ivs[key] = parseInt(match[1]);
                        }
                    });
                } else if (line.toLowerCase().endsWith('nature')) {
                    slot.nature = line.substring(0, line.length - 6).trim();
                } else if (line.startsWith('-')) {
                    slot.moves.push(line.substring(1).trim());
                }
            });
            while (slot.moves.length < 4) slot.moves.push('');
            return slot;
        }

        function createTeamCard(p, dbRef, rawBuild) {
            const card = document.createElement('div');
            card.className = 'pokemon-card-premium fade-in';
            const t1 = (dbRef?.Type_1 || 'Normal').toLowerCase();
            const t2 = dbRef?.Type_2?.toLowerCase();

            const roles = detectRole(p, dbRef);
            const rolesHtml = roles.map(r => `<span class="role-badge">${r}</span>`).join('');

            const statsArr = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
            const statLabels = ['HP', 'ATK', 'DEF', 'SPA', 'SPD', 'SPE'];
            const statColors = ['#4caf50', '#f44336', '#ff9800', '#9c27b0', '#ffeb3b', '#00bcd4'];
            const statKeys = { hp: 'HP', atk: 'Attack', def: 'Defense', spa: 'Sp.Atk', spd: 'Sp.Def', spe: 'Speed' };

            const statsHtml = statsArr.map((s, idx) => {
                const base = dbRef ? (parseInt(dbRef[statKeys[s]]) || 0) : 0;
                const val = calculateStat(base, p.ivs[s], p.evs[s], p.level, p.nature, s);
                const nature = natureMap[p.nature] || { pos: '', neg: '' };
                const color = nature.pos === s ? '#00ffcc' : (nature.neg === s ? '#ff4d4d' : '#ddd');
                return `
                    <div style="display:flex; align-items:center; font-size:0.65rem; margin-bottom:4px;">
                        <span style="width:25px; color:rgba(255,255,255,0.4); font-weight:800;">${statLabels[idx]}</span>
                        <div class="stat-bar-mini"><div class="stat-fill-mini" style="width:${Math.min(100, (val / 250) * 100)}%; background:${statColors[idx]};"></div></div>
                        <span style="width:30px; text-align:right; font-weight:900; color:${color}">${val}</span>
                    </div>
                `;
            }).join('');

            const movesHtml = p.moves.map(m => {
                if (!m) return `<div class="move-pill" style="opacity:0.2;"><span>EMPTY SLOT</span></div>`;
                const moveData = allMoves.find(x => x.name.toLowerCase() === m.toLowerCase()) || { type: 'Normal' };
                const mt = moveData.type.toLowerCase();
                return `
                    <div class="move-pill">
                        <span>${m.toUpperCase()}</span>
                        <div style="width:8px; height:8px; border-radius:50%; background:${typeColors[mt]}; box-shadow: 0 0 8px ${typeColors[mt]}88;"></div>
                    </div>
                `;
            }).join('');

            const spriteUrl = getSpriteUrl(p);
            const megaUrl = getMegaSpriteUrl(p);
            const format = rawBuild.format || 'SINGLES';

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-sprite-area">
                        <img class="premium-sprite ${megaUrl ? 'mega-toggle' : ''}" src="${spriteUrl}" alt="${p.species}" ${megaUrl ? `data-base="${spriteUrl}" data-mega="${megaUrl}" data-current-src="base"` : ''} onerror="handleSpriteError(this, '${p.species}', ${p.shiny})">
                        <div class="tera-badge">
                            <div class="tera-icon" style="background:${typeColors[p.tera.toLowerCase()] || '#fff'}"></div>
                            <span style="font-size:0.5rem; font-weight:900; color:white;">${p.tera.toUpperCase()}</span>
                        </div>
                        ${p.item ? `<img src="${getItemSpriteUrl(p.item)}" onerror="handleItemError(this, '${p.item.replace(/'/g, "\\'")}')" style="position:absolute; bottom:5px; left:5px; width:22px; height:22px; filter:drop-shadow(0 3px 6px rgba(0,0,0,0.5));">` : ''}
                    </div>
                    <div class="header-info">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h3 style="font-size:1.1rem; color:white; margin:0;">${p.species}</h3>
                            <span class="format-badge" style="background:${format.toLowerCase() === 'doubles' ? '#4a90e2' : '#e63946'}">${format[0]}</span>
                        </div>
                        <div class="type-badges-row" style="margin-top:2px;">
                            <span class="type-tag type-${t1}" style="font-size:0.55rem; padding:1px 5px;">${t1}</span>
                            ${t2 ? `<span class="type-tag type-${t2}" style="font-size:0.55rem; padding:1px 5px;">${t2}</span>` : ''}
                        </div>
                        <div class="roles-row">${rolesHtml}</div>
                    </div>
                </div>

                <div style="margin-top:4px;">
                    <div style="font-size:0.65rem; color:rgba(255,255,255,0.4); font-weight:700; display:flex; gap:8px;">
                        <span>LVL ${p.level}</span>
                        <span>Item: <span style="color:#eee">${(p.item || 'None').toUpperCase()}</span></span>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1.2fr 0.8fr; gap:10px; margin:4px 0; align-items: start;">
                    <div class="moves-column">${movesHtml}</div>
                    <div class="stats-column" style="background:rgba(0,0,0,0.2); padding:6px; border-radius:10px;">${statsHtml}</div>
                </div>

                <div style="margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center;">
                    <div style="font-size: 0.6rem; color: rgba(255, 255, 255, 0.3); font-weight: 800; line-height: 1.2;">
                        ${p.nature.toUpperCase()} NATURE<br>
                        ABILITY: <span style="color: rgba(255, 255, 255, 0.6)">${(p.ability || 'UNKNOWN').toUpperCase()}</span>
                    </div>
                    <button class="btn" style="padding: 4px 10px; font-size: 0.55rem;" onclick="event.stopPropagation(); copyPaste(\`${rawBuild.build.replace(/`/g, '\\`')}\`)">COPY PASTE</button>
                </div>
            `;
            return card;
        }

        function createEmptyCard() {
            const el = document.createElement('div');
            el.className = 'empty-slot-premium fade-in';
            el.innerHTML = `
                <div style="font-size:3rem; opacity:0.2;">+</div>
                <div style="font-weight:900; font-size:0.7rem; letter-spacing:2px; opacity:0.3;">EMPTY SLOT</div>
            `;
            return el;
        }

        function renderBuilds(append = false) {
            const grid = document.getElementById('builds-grid');
            if (!append) {
                grid.innerHTML = '';
                displayedCount = batchSize;
            }
            
            const searchInput = document.getElementById('build-search');
            const search = searchInput.value.toLowerCase().trim();
            const typeFilter = document.getElementById('type-filter').value.toLowerCase();
            const roleFilter = document.getElementById('role-filter').value;
            const formatFilter = document.getElementById('format-filter').value.toLowerCase();

            let count = 0;
            const filtered = allBuilds.filter(build => {
                const p = parsePaste(build.build);
                const speciesSearch = p.species.toLowerCase().replace(/[^a-z0-9]/g, '');
                const dbRef = allPokemon.find(x => (x.Name || '').toLowerCase().replace(/[^a-z0-9]/g, '') === speciesSearch);
                
                const t1 = (dbRef?.Type_1 || '').toLowerCase();
                const t2 = (dbRef?.Type_2 || '').toLowerCase();
                const ability = (p.ability || '').toLowerCase();
                const moves = p.moves.map(m => m.toLowerCase());
                const format = (build.format || 'Singles').toLowerCase();

                if (search) {
                    const searchPool = [p.species.toLowerCase(), t1, t2, ability, ...moves];
                    if (!searchPool.some(val => val.includes(search))) return false;
                }
                if (typeFilter && t1 !== typeFilter && t2 !== typeFilter) return false;
                const buildRoles = detectRole(p, dbRef);
                if (roleFilter && !buildRoles.includes(roleFilter)) return false;
                if (formatFilter && format !== formatFilter) return false;

                return true;
            });

            // If appending, only render the next slice
            const toRender = append ? filtered.slice(displayedCount - batchSize, displayedCount) : filtered.slice(0, displayedCount);

            toRender.forEach(build => {
                const p = parsePaste(build.build);
                const speciesSearch = p.species.toLowerCase().replace(/[^a-z0-9]/g, '');
                const dbRef = allPokemon.find(x => (x.Name || '').toLowerCase().replace(/[^a-z0-9]/g, '') === speciesSearch);
                
                const wrapper = document.createElement('div');
                wrapper.className = `build-card-wrapper fade-in ${selectedBuildId === build.id ? 'selected' : ''}`;
                wrapper.id = `build-${build.id}`;
                wrapper.onclick = (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    selectBuild(build.id);
                };

                wrapper.appendChild(createTeamCard(p, dbRef, build));
                grid.appendChild(wrapper);
            });

            const sentinel = document.getElementById('load-more-sentinel');
            if (displayedCount >= filtered.length) {
                sentinel.style.display = 'none';
            } else {
                sentinel.style.display = 'block';
            }
        }

        function selectBuild(id) {
            selectedBuildId = id;
            document.querySelectorAll('.build-card-wrapper').forEach(el => el.classList.remove('selected'));
            const card = document.getElementById(`build-${id}`);
            if (card) card.classList.add('selected');

            const build = allBuilds.find(b => b.id === id);
            if (build) {
                const titleEl = document.getElementById('synergy-title');
                if (titleEl) titleEl.innerText = `STRATEGIC SYNERGY FOR ${build.pokemon.toUpperCase()}`;

                renderSynergy(build.synergy);
                const container = document.getElementById('synergy-container');
                container.style.display = 'block';
                setTimeout(() => container.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
            }
        }

        function closeSynergy() {
            selectedBuildId = null;
            document.querySelectorAll('.build-card-wrapper').forEach(el => el.classList.remove('selected'));
            document.getElementById('synergy-container').style.display = 'none';
        }

        function renderSynergy(synergyIds) {
            const grid = document.getElementById('synergy-grid');
            grid.innerHTML = '';

            for (let i = 0; i < 6; i++) {
                const sid = (synergyIds || [])[i];
                const build = sid ? allBuilds.find(b => b.id === sid) : null;

                if (build) {
                    const p = parsePaste(build.build);
                    const speciesSearch = p.species.toLowerCase().replace(/[^a-z0-9]/g, '');
                    const dbRef = allPokemon.find(x => (x.Name || '').toLowerCase().replace(/[^a-z0-9]/g, '') === speciesSearch);
                    grid.appendChild(createTeamCard(p, dbRef, build));
                } else {
                    grid.appendChild(createEmptyCard());
                }
            }
        }

        function copyPaste(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('active');
                setTimeout(() => toast.classList.remove('active'), 3000);
            });
        }

        document.getElementById('build-search').addEventListener('input', () => renderBuilds());
        document.getElementById('type-filter').addEventListener('change', () => renderBuilds());
        document.getElementById('role-filter').addEventListener('change', () => renderBuilds());
        document.getElementById('format-filter').addEventListener('change', () => renderBuilds());
        loadData();
    </script>
</body>

</html>
