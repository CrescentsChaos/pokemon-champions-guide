<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Builds | Pokemon Champions Guide</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .builds-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem;
        }

        .search-wrapper {
            margin-bottom: 4rem;
            position: relative;
        }

        #build-search {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        #build-search:focus {
            border-color: var(--primary-red);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: var(--accent-glow);
        }

        /* Build Card Wrapper */
        .build-card-wrapper {
            cursor: pointer;
            transition: var(--transition);
        }

        .build-card-wrapper:hover {
            transform: translateY(-5px);
        }

        .build-card-wrapper.selected .pokemon-config {
            border-color: var(--primary-red) !important;
            box-shadow: var(--accent-glow), 0 20px 40px rgba(0,0,0,0.6) !important;
            background: rgba(255, 51, 51, 0.08) !important;
        }

        .copy-btn-mini {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.65rem;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 1px;
        }

        .copy-btn-mini:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px rgba(255,62,62,0.4);
        }

        /* Synergy Section */
        #synergy-container {
            margin-top: 5rem;
            padding-top: 5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: none;
        }

        .synergy-header {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        #builds-grid, #synergy-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        @media (max-width: 1200px) {
            #builds-grid, #synergy-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 991px) {
            #builds-grid, #synergy-grid { grid-template-columns: 1fr !important; }
            .synergy-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="builds-container">
        <div class="section-title fade-in">
            <h2>BUILD FINDER</h2>
            <p style="color: var(--text-muted);">Visualized competitive sets from the world's best trainers.</p>
        </div>

        <div class="search-wrapper fade-in">
            <input type="text" id="build-search" placeholder="Search by Pokemon name (e.g. Miraidon, Incineroar)...">
        </div>

        <div id="builds-grid" class="fade-in">
            <!-- Builds will be injected here as high-fidelity cards -->
        </div>

        <div id="synergy-container" class="fade-in">
            <div class="synergy-header">
                <div>
                    <h2 id="synergy-title" style="color: white; font-size: 2.2rem; margin-bottom: 0.5rem;">STRATEGIC SYNERGY</h2>
                    <p style="color: var(--text-muted);">The best partners for your selected build.</p>
                </div>
                <button onclick="closeSynergy()" class="btn btn-secondary" style="background:transparent; border: 1px solid rgba(255,255,255,0.2);">CLOSE VIEW</button>
            </div>
            <div id="synergy-grid">
                <!-- Synergy cards injected here -->
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Build Paste Copied!</div>

    <script src="../js/main.js"></script>
    <script>
        let allPokemon = [];
        let allBuilds = [];
        let allMoves = [];
        let allItems = [];
        let selectedBuildId = null;

        const typeColors = {
            normal: '#A8A77A', fire: '#EE8130', water: '#6390F0', electric: '#F7D02C',
            grass: '#7AC74C', ice: '#96D9D6', fighting: '#C22E28', poison: '#A33EA1',
            ground: '#E2BF65', flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
            rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC', steel: '#B7B7CE',
            fairy: '#D685AD', dark: '#705746'
        };

        const natureMap = {
            'Adamant': { pos: 'atk', neg: 'spa' }, 'Bold': { pos: 'def', neg: 'atk' },
            'Brave': { pos: 'atk', neg: 'spe' }, 'Calm': { pos: 'spd', neg: 'atk' },
            'Careful': { pos: 'spd', neg: 'spa' }, 'Hasty': { pos: 'spe', neg: 'def' },
            'Impish': { pos: 'def', neg: 'spa' }, 'Jolly': { pos: 'spe', neg: 'spa' },
            'Modest': { pos: 'spa', neg: 'atk' }, 'Naive': { pos: 'spe', neg: 'spd' },
            'Quiet': { pos: 'spa', neg: 'spe' }, 'Rash': { pos: 'spa', neg: 'spd' },
            'Relaxed': { pos: 'def', neg: 'spe' }, 'Sassy': { pos: 'spd', neg: 'spe' },
            'Timid': { pos: 'spe', neg: 'atk' }, 'Serious': { pos: '', neg: '' },
            'Docile': { pos: '', neg: '' }, 'Bashful': { pos: '', neg: '' },
            'Hardy': { pos: '', neg: '' }, 'Quirky': { pos: '', neg: '' }
        };

        async function loadData() {
            try {
                const [pResp, bResp, mResp, iResp] = await Promise.all([
                    fetch('../assets/pokemon.json'),
                    fetch('../assets/builds.json'),
                    fetch('../assets/moves.json'),
                    fetch('../assets/items.json')
                ]);
                allPokemon = await pResp.json();
                allBuilds = await bResp.json();
                allMoves = await mResp.json();
                allItems = await iResp.json();
                renderBuilds();
            } catch (e) { console.error("Data load failed", e); }
        }

        function handleSpriteError(img, name) {
            const clean = name.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!img.src.includes('xy')) {
                img.src = `https://www.smogon.com/dex/media/sprites/xy/${clean}.gif`;
            } else if (!img.src.includes('dex/media/sprites/gen5')) {
                img.src = `https://www.smogon.com/dex/media/sprites/gen5/${clean}.png`;
            } else {
                img.src = 'https://play.pokemonshowdown.com/sprites/ani/unown-interrogation.gif';
            }
            img.onerror = null; 
        }

        function handleItemError(img) {
            img.style.display = 'none';
            img.onerror = null;
        }

        function getSpriteUrl(name, shiny) {
            let clean = name.toLowerCase()
                .replace(/ /g, '-')
                .replace(/\./g, '')
                .replace(/'/g, '')
                .replace(/:/g, '')
                .replace(/%/g, '');
            
            if (clean === 'giratina-altered') clean = 'giratina-origin';
            if (clean === 'mimikyu-disguised') clean = 'mimikyu';
            
            const basePath = shiny ? 'ani-shiny' : 'ani';
            return `https://play.pokemonshowdown.com/sprites/${basePath}/${clean}.gif`;
        }

        function getItemSpriteUrl(item) {
            if (!item) return '';
            let clean = item.toLowerCase()
                .replace(/ /g, '-')
                .replace(/'/g, '')
                .replace(/\./g, '')
                .replace(/[^a-z0-9-]/g, '');
            
            if (clean === 'choice-specs') clean = 'choicespecs';
            if (clean === 'choice-scarf') clean = 'choicescarf';
            if (clean === 'choice-band') clean = 'choiceband';
            if (clean === 'focus-sash') clean = 'focussash';
            if (clean === 'life-orb') clean = 'lifeorb';
            if (clean === 'sitrus-berry') clean = 'sitrusberry';
            if (clean === 'lum-berry') clean = 'lumberry';
            if (clean === 'assault-vest') clean = 'assaultvest';
            if (clean === 'booster-energy') clean = 'boosterenergy';
            if (clean === 'clear-amulet') clean = 'clearamulet';
            if (clean === 'covert-cloak') clean = 'covertcloak';
            if (clean === 'safety-goggles') clean = 'safetygoggles';
            if (clean === 'leftovers') clean = 'leftovers';
            
            return `https://play.pokemonshowdown.com/sprites/itemicons/${clean}.png`;
        }

        function calculateStat(base, iv, ev, level, natureType, statKey) {
            if (!base || isNaN(base)) return '--';
            const lvl = parseInt(level) || 50;
            const evBonus = Math.floor(parseInt(ev || 0) / 4);
            const ivVal = parseInt(iv || 31);
            if (statKey === 'hp') {
                if (parseInt(base) === 1) return 1;
                return Math.floor(((2 * parseInt(base) + ivVal + evBonus) * lvl) / 100) + lvl + 10;
            }
            let val = Math.floor(((2 * parseInt(base) + ivVal + evBonus) * lvl) / 100) + 5;
            const nature = natureMap[natureType] || { pos: '', neg: '' };
            if (nature.pos === statKey) val = Math.floor(val * 1.1);
            if (nature.neg === statKey) val = Math.floor(val * 0.9);
            return val;
        }

        function parsePaste(text) {
            const lines = text.trim().split('\n').map(l => l.trim());
            const slot = {
                species: '', item: '', ability: '', level: 50, shiny: false,
                tera: '', evs: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
                ivs: { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 },
                nature: 'Serious', moves: []
            };
            const head = lines[0];
            if (!head) return slot;
            const itemSplit = head.split('@');
            if (itemSplit[1]) slot.item = itemSplit[1].trim();
            
            // Handle species with nickname format: Nickname (Species)
            const speciesPart = itemSplit[0].trim();
            if (speciesPart.includes('(')) {
                slot.species = speciesPart.split('(')[1].split(')')[0].trim();
            } else {
                slot.species = speciesPart;
            }

            lines.slice(1).forEach(line => {
                const l = line.trim();
                if (l.startsWith('Ability:')) slot.ability = l.split(':')[1].trim();
                else if (l.startsWith('Level:')) slot.level = parseInt(l.split(':')[1].trim());
                else if (l.startsWith('Shiny:')) slot.shiny = l.split(':')[1].trim().toLowerCase() === 'yes';
                else if (l.startsWith('Tera Type:')) slot.tera = l.split(':')[1].trim();
                else if (l.startsWith('EVs:')) {
                    const evParts = l.split(':')[1].split('/');
                    evParts.forEach(p => {
                        const parts = p.trim().split(' ');
                        if (parts.length >= 2) {
                            const val = parts[0];
                            let key = parts[1].toLowerCase();
                            if (slot.evs[key] !== undefined) slot.evs[key] = parseInt(val);
                        }
                    });
                } else if (l.includes('Nature')) slot.nature = l.split('Nature')[0].trim();
                else if (l.startsWith('-')) slot.moves.push(l.substring(1).trim());
            });
            while (slot.moves.length < 4) slot.moves.push('');
            return slot;
        }

        function createEmptyCard() {
            const card = document.createElement('div');
            card.className = 'pokemon-config empty-card';
            card.style.cssText = `
                padding: 15px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; 
                justify-content: center; gap: 10px; opacity: 0.2; 
                border: 2px dashed rgba(255,255,255,0.2); background: rgba(255,255,255,0.02);
                min-height: 280px; transition: var(--transition);
            `;
            card.innerHTML = `
                <div style="font-size: 2.5rem; color: rgba(255,255,255,0.3);">+</div>
                <div style="font-size: 0.65rem; font-weight: 800; color: rgba(255,255,255,0.5); letter-spacing: 1px;">SLOT EMPTY</div>
            `;
            return card;
        }
        function createTeamCard(p, dbRef, t1, t2, rawBuild) {
            const card = document.createElement('div');
            card.className = 'pokemon-config';
            card.style.cssText = `
                padding: 12px 16px; border-radius: 18px; display: flex; flex-direction: column; gap: 8px;
                background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.6));
                border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden;
                backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px ${typeColors[t1] || '#777'}22;
                min-height: 280px; transition: var(--transition);
            `;

            const statsArr = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
            const statLabels = ['HP', 'ATK', 'DEF', 'SPA', 'SPD', 'SPE'];
            const keys = { hp: 'HP', atk: 'Attack', def: 'Defense', spa: 'Sp.Atk', spd: 'Sp.Def', spe: 'Speed' };
            const statOrder = ['#4caf50', '#f44336', '#ff9800', '#9c27b0', '#ffeb3b', '#00bcd4'];

            const statsHtml = statsArr.map((s, idx) => {
                const base = dbRef ? (parseInt(dbRef[keys[s]]) || 0) : 0;
                const val = calculateStat(base, p.ivs[s], p.evs[s], p.level, p.nature, s);
                const nature = natureMap[p.nature] || { pos: '', neg: '' };
                const color = nature.pos === s ? '#00ffcc' : (nature.neg === s ? '#ff4d4d' : '#ddd');
                return `
                    <div style="display:flex; align-items:center; gap:6px; font-size:0.6rem; margin-bottom:2px; height:12px;">
                        <span style="width:22px; color:rgba(255,255,255,0.3); font-weight:900;">${statLabels[idx]}</span>
                        <div style="flex:1; height:3px; background:rgba(0,0,0,0.2); border-radius:1px; overflow:hidden;">
                            <div style="height:100%; width:${Math.min(100, (val/250)*100)}%; background:${statOrder[idx]};"></div>
                        </div>
                        <span style="width:25px; text-align:right; font-weight:900; color:${color}">${val}</span>
                    </div>
                `;
            }).join('');

            const movesHtml = p.moves.map(m => {
                if (!m) return '';
                const moveRef = (allMoves || []).find(x => x.name.toLowerCase() === m.toLowerCase()) || { type: 'Normal' };
                const type = moveRef.type.toLowerCase();
                return `
                    <div style="display:flex; align-items:center; gap:5px; margin-bottom:3px; background:rgba(0,0,0,0.2); padding:2px 5px; border-radius:4px; border:1px solid rgba(255,255,255,0.03);">
                        <span style="font-size:0.6rem; color:#eee; font-weight:700; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${m.toUpperCase()}</span>
                        <div style="width:6px; height:6px; border-radius:50%; background:${typeColors[type]};"></div>
                    </div>
                `;
            }).join('');

            const itemSprite = getItemSpriteUrl(p.item);

            card.innerHTML = `
                <div style="display:flex; gap:10px; align-items:center; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05);">
                    <div style="position:relative; width:48px; height:48px; background:rgba(255,255,255,0.03); border-radius:8px; display:flex; align-items:center; justify-content:center;">
                        <img src="${getSpriteUrl(p.species, p.shiny)}" style="width:90%; height:90%; object-fit:contain;" 
                             onerror="handleSpriteError(this, '${p.species}')">
                        ${itemSprite ? `<img src="${itemSprite}" style="position:absolute; bottom:-3px; right:-3px; width:20px; height:20px;" onerror="handleItemError(this)">` : ''}
                    </div>
                    <div style="flex:1; min-width:0;">
                        <div style="font-weight:900; font-size:0.95rem; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; letter-spacing:0.5px;">${p.species.toUpperCase()}</div>
                        <div style="font-size:0.65rem; color:rgba(255,255,255,0.4); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:700;">${(p.item || 'NO ITEM').toUpperCase()}</div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1.1fr 0.9fr; gap:12px; margin-top:8px;">
                    <div>${movesHtml}</div>
                    <div style="background:rgba(0,0,0,0.1); padding:6px; border-radius:8px;">${statsHtml}</div>
                </div>
                <div style="margin-top:auto; padding-top:8px; border-top:1px solid rgba(255,255,255,0.03); display:flex; align-items:center; justify-content:space-between;">
                    <div style="font-size:0.55rem; color:rgba(255,255,255,0.25); font-weight:800; letter-spacing:0.5px;">ID: ${rawBuild.id} // ${p.nature.toUpperCase()}</div>
                    <button class="copy-btn-mini" onclick="event.stopPropagation(); copyPaste(\`${rawBuild.build.replace(/`/g, '\\`')}\`)">COPY PASTE</button>
                </div>
            `;
            return card;
        }

        function renderBuilds() {
            const grid = document.getElementById('builds-grid');
            grid.innerHTML = '';
            const search = document.getElementById('build-search').value.toLowerCase();

            allBuilds.forEach(build => {
                const p = parsePaste(build.build);
                if (!p.species.toLowerCase().includes(search)) return;

                const dbRef = allPokemon.find(x => x.Name.toLowerCase() === p.species.toLowerCase());
                const t1 = dbRef ? (dbRef.Type_1 || 'Normal').toLowerCase() : 'normal';
                const t2 = dbRef && dbRef.Type_2 ? dbRef.Type_2.toLowerCase() : null;

                const wrapper = document.createElement('div');
                wrapper.className = `build-card-wrapper fade-in ${selectedBuildId === build.id ? 'selected' : ''}`;
                wrapper.id = `build-${build.id}`;
                wrapper.onclick = (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    selectBuild(build.id);
                };
                
                const card = createTeamCard(p, dbRef, t1, t2, build);
                wrapper.appendChild(card);
                grid.appendChild(wrapper);
            });
        }

        async function selectBuild(id) {
            selectedBuildId = id;
            document.querySelectorAll('.build-card-wrapper').forEach(el => el.classList.remove('selected'));
            const card = document.getElementById(`build-${id}`);
            if (card) card.classList.add('selected');

            const build = allBuilds.find(b => b.id === id);
            if (build) {
                renderSynergy(build.synergy);
                document.getElementById('synergy-container').style.display = 'block';
                document.getElementById('synergy-container').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function closeSynergy() {
            selectedBuildId = null;
            document.querySelectorAll('.build-card-wrapper').forEach(el => el.classList.remove('selected'));
            document.getElementById('synergy-container').style.display = 'none';
        }

        function renderSynergy(synergyIds) {
            const grid = document.getElementById('synergy-grid');
            grid.innerHTML = '';
            
            // Loop 6 times to always show 6 slots
            for (let i = 0; i < 6; i++) {
                const sid = (synergyIds || [])[i];
                const build = sid ? allBuilds.find(b => b.id === sid) : null;
                
                if (build) {
                    const p = parsePaste(build.build);
                    const dbRef = allPokemon.find(x => x.Name.toLowerCase() === p.species.toLowerCase());
                    const t1 = dbRef ? (dbRef.Type_1 || 'Normal').toLowerCase() : 'normal';
                    const t2 = dbRef && dbRef.Type_2 ? dbRef.Type_2.toLowerCase() : null;
                    
                    const card = createTeamCard(p, dbRef, t1, t2, build);
                    grid.appendChild(card);
                } else {
                    grid.appendChild(createEmptyCard());
                }
            }
        }

        function copyPaste(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('active');
                setTimeout(() => toast.classList.remove('active'), 3000);
            });
        }

        document.getElementById('build-search').addEventListener('input', (e) => renderBuilds(e.target.value));
        loadData();
    </script>
</body>
</html>
