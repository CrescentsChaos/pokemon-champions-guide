<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Builds | Pokemon Champions Guide</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .builds-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8rem 2rem;
        }

        .search-wrapper {
            margin-bottom: 4rem;
            position: relative;
        }

        #build-search {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        #build-search:focus {
            border-color: var(--primary-red);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: var(--accent-glow);
        }

        /* Build Card Wrapper */
        .build-card-wrapper {
            cursor: pointer;
            transition: var(--transition);
        }

        .build-card-wrapper:hover {
            transform: translateY(-5px);
        }

        .build-card-wrapper.selected .pokemon-card-premium {
            border-color: var(--primary-red) !important;
            box-shadow: var(--accent-glow), 0 20px 40px rgba(0,0,0,0.6) !important;
            background: rgba(255, 51, 51, 0.06) !important;
        }

        /* Synergy Section */
        #synergy-container {
            margin-top: 5rem;
            padding-top: 5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: none;
        }

        .synergy-header {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        #builds-grid, #synergy-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2.5rem;
        }

        /* Premium Card Styles (Sync with Teambuilder) */
        .pokemon-card-premium {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.4));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 480px;
        }

        .card-sprite-area {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .premium-sprite {
            width: 140px;
            height: 140px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .tera-badge {
            position: absolute;
            top: 10px;
            right: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tera-icon {
            width: 14px;
            height: 14px;
            clip-path: polygon(50% 0%, 100% 35%, 82% 100%, 18% 100%, 0% 35%);
        }

        .type-badges-row {
            display: flex;
            gap: 8px;
            margin-top: -5px;
        }

        .move-pill {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .move-pill span {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #eee;
        }

        .stat-bar-mini {
            height: 5px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            flex: 1;
            overflow: hidden;
            margin: 0 8px;
        }

        .stat-fill-mini {
            height: 100%;
            border-radius: 10px;
            transition: width 0.8s ease-out;
        }

        @media (max-width: 1200px) {
            #builds-grid, #synergy-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 850px) {
            #builds-grid, #synergy-grid { grid-template-columns: 1fr !important; }
            .synergy-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }

        /* Empty Slot */
        .empty-slot-premium {
            border: 2px dashed rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.01);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 480px;
            color: rgba(255,255,255,0.1);
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="builds-container">
        <div class="section-title fade-in">
            <h2>BUILD FINDER</h2>
            <p style="color: var(--text-muted);">Visualized competitive sets from the world's best trainers.</p>
        </div>

        <div class="search-wrapper fade-in">
            <input type="text" id="build-search" placeholder="Search by Pokemon name (e.g. Miraidon, Incineroar)...">
        </div>

        <div id="builds-grid" class="fade-in">
            <!-- Builds will be injected here as high-fidelity cards -->
        </div>

        <div id="synergy-container" class="fade-in">
            <div class="synergy-header">
                <div>
                    <h2 id="synergy-title" style="color: white; font-size: 2.2rem; margin-bottom: 0.5rem;">STRATEGIC SYNERGY</h2>
                    <p style="color: var(--text-muted);">The best partners for your selected build.</p>
                </div>
                <button onclick="closeSynergy()" class="btn btn-secondary" style="background:transparent; border: 1px solid rgba(255,255,255,0.2);">CLOSE VIEW</button>
            </div>
            <div id="synergy-grid">
                <!-- Synergy cards injected here -->
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Build Paste Copied!</div>

    <script src="../js/main.js"></script>
    <script>
        let allPokemon = [];
        let allBuilds = [];
        let allMoves = [];
        let allItems = [];
        let selectedBuildId = null;

        const typeColors = {
            normal: '#A8A77A', fire: '#EE8130', water: '#6390F0', electric: '#F7D02C',
            grass: '#7AC74C', ice: '#96D9D6', fighting: '#C22E28', poison: '#A33EA1',
            ground: '#E2BF65', flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
            rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC', steel: '#B7B7CE',
            fairy: '#D685AD', dark: '#705746', stellar: '#70DBFF'
        };

        const natureMap = {
            'Adamant': { pos: 'atk', neg: 'spa' }, 'Bold': { pos: 'def', neg: 'atk' },
            'Brave': { pos: 'atk', neg: 'spe' }, 'Calm': { pos: 'spd', neg: 'atk' },
            'Careful': { pos: 'spd', neg: 'spa' }, 'Hasty': { pos: 'spe', neg: 'def' },
            'Impish': { pos: 'def', neg: 'spa' }, 'Jolly': { pos: 'spe', neg: 'spa' },
            'Modest': { pos: 'spa', neg: 'atk' }, 'Naive': { pos: 'spe', neg: 'spd' },
            'Quiet': { pos: 'spa', neg: 'spe' }, 'Rash': { pos: 'spa', neg: 'spd' },
            'Relaxed': { pos: 'def', neg: 'spe' }, 'Sassy': { pos: 'spd', neg: 'spe' },
            'Timid': { pos: 'spe', neg: 'atk' }
        };

        async function loadData() {
            try {
                const [pResp, bResp, mResp, iResp] = await Promise.all([
                    fetch('../assets/pokemon.json'),
                    fetch('../assets/builds.json'),
                    fetch('../assets/moves.json'),
                    fetch('../assets/items.json')
                ]);
                allPokemon = await pResp.json();
                allBuilds = await bResp.json();
                allMoves = await mResp.json();
                allItems = await iResp.json();
                renderBuilds();
            } catch (e) { console.error("Data load failed", e); }
        }

        function handleSpriteError(img, name) {
            const clean = name.toLowerCase().replace(/[^a-z0-9]/g, '');
            img.src = `https://www.smogon.com/dex/media/sprites/xy/${clean}.gif`;
            img.onerror = () => {
                img.src = 'https://play.pokemonshowdown.com/sprites/ani/unown-interrogation.gif';
            };
        }

        function getItemSpriteUrl(item) {
            if (!item) return '';
            let clean = item.toLowerCase().replace(/ /g, '-').replace(/'/g, '').replace(/\./g, '').replace(/[^a-z0-9-]/g, '');
            const shortcuts = {
                'choice-specs': 'choicespecs', 'choice-scarf': 'choicescarf', 'choice-band': 'choiceband',
                'focus-sash': 'focussash', 'life-orb': 'lifeorb', 'sitrus-berry': 'sitrusberry',
                'assault-vest': 'assaultvest', 'clear-amulet': 'clearamulet', 'covert-cloak': 'covertcloak'
            };
            return `https://play.pokemonshowdown.com/sprites/itemicons/${shortcuts[clean] || clean.replace(/-/g, '')}.png`;
        }

        function calculateStat(base, iv, ev, level, natureType, statKey) {
            const lvl = parseInt(level) || 50;
            const evBonus = Math.floor(parseInt(ev || 0) / 4);
            const ivVal = parseInt(iv || 31);
            if (statKey === 'hp') {
                if (parseInt(base) === 1) return 1;
                return Math.floor(((2 * parseInt(base) + ivVal + evBonus) * lvl) / 100) + lvl + 10;
            }
            let val = Math.floor(((2 * parseInt(base) + ivVal + evBonus) * lvl) / 100) + 5;
            const nature = natureMap[natureType];
            if (nature) {
                if (nature.pos === statKey) val = Math.floor(val * 1.1);
                if (nature.neg === statKey) val = Math.floor(val * 0.9);
            }
            return val;
        }

        function parsePaste(text) {
            const lines = text.trim().split('\n').map(l => l.trim());
            const slot = {
                species: '', item: '', ability: '', level: 50, shiny: false,
                tera: 'Normal', evs: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
                ivs: { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 },
                nature: 'Serious', moves: []
            };
            const head = lines[0] || '';
            const itemSplit = head.split('@');
            if (itemSplit[1]) slot.item = itemSplit[1].trim();
            const speciesPart = itemSplit[0].trim();
            slot.species = speciesPart.includes('(') ? speciesPart.split('(')[1].split(')')[0].trim() : speciesPart;

            lines.slice(1).forEach(l => {
                const line = l.trim();
                if (line.startsWith('Ability:')) slot.ability = line.split(':')[1].trim();
                else if (line.startsWith('Level:')) slot.level = parseInt(line.split(':')[1].trim());
                else if (line.startsWith('Tera Type:')) slot.tera = line.split(':')[1].trim();
                else if (line.startsWith('EVs:')) {
                    line.split(':')[1].split('/').forEach(p => {
                        const parts = p.trim().split(' ');
                        const key = parts[1]?.toLowerCase();
                        if (slot.evs[key] !== undefined) slot.evs[key] = parseInt(parts[0]);
                    });
                } else if (line.includes('Nature')) slot.nature = line.split('Nature')[0].trim();
                else if (line.startsWith('-')) slot.moves.push(line.substring(1).trim());
            });
            while (slot.moves.length < 4) slot.moves.push('');
            return slot;
        }

        function createTeamCard(p, dbRef, rawBuild) {
            const card = document.createElement('div');
            card.className = 'pokemon-card-premium fade-in';
            const t1 = (dbRef?.Type_1 || 'Normal').toLowerCase();
            const t2 = dbRef?.Type_2?.toLowerCase();
            
            const statsArr = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
            const statLabels = ['HP', 'ATK', 'DEF', 'SPA', 'SPD', 'SPE'];
            const statColors = ['#4caf50', '#f44336', '#ff9800', '#9c27b0', '#ffeb3b', '#00bcd4'];
            const statKeys = { hp: 'HP', atk: 'Attack', def: 'Defense', spa: 'Sp.Atk', spd: 'Sp.Def', spe: 'Speed' };

            const statsHtml = statsArr.map((s, idx) => {
                const base = dbRef ? (parseInt(dbRef[statKeys[s]]) || 0) : 0;
                const val = calculateStat(base, p.ivs[s], p.evs[s], p.level, p.nature, s);
                const nature = natureMap[p.nature] || { pos: '', neg: '' };
                const color = nature.pos === s ? '#00ffcc' : (nature.neg === s ? '#ff4d4d' : '#ddd');
                return `
                    <div style="display:flex; align-items:center; font-size:0.65rem; margin-bottom:4px;">
                        <span style="width:25px; color:rgba(255,255,255,0.4); font-weight:800;">${statLabels[idx]}</span>
                        <div class="stat-bar-mini"><div class="stat-fill-mini" style="width:${Math.min(100, (val/250)*100)}%; background:${statColors[idx]};"></div></div>
                        <span style="width:30px; text-align:right; font-weight:900; color:${color}">${val}</span>
                    </div>
                `;
            }).join('');

            const movesHtml = p.moves.map(m => {
                if (!m) return `<div class="move-pill" style="opacity:0.2;"><span>EMPTY SLOT</span></div>`;
                const moveData = allMoves.find(x => x.name.toLowerCase() === m.toLowerCase()) || { type: 'Normal' };
                const mt = moveData.type.toLowerCase();
                return `
                    <div class="move-pill">
                        <span>${m.toUpperCase()}</span>
                        <div style="width:8px; height:8px; border-radius:50%; background:${typeColors[mt]}; box-shadow: 0 0 8px ${typeColors[mt]}88;"></div>
                    </div>
                `;
            }).join('');

            const spriteUrl = `https://play.pokemonshowdown.com/sprites/ani${p.shiny ? '-shiny' : ''}/${p.species.toLowerCase().replace(/ /g, '-')}.gif`;

            card.innerHTML = `
                <div class="card-sprite-area">
                    <img class="premium-sprite" src="${spriteUrl}" onerror="handleSpriteError(this, '${p.species}')">
                    <div class="tera-badge">
                        <div class="tera-icon" style="background:${typeColors[p.tera.toLowerCase()] || '#fff'}"></div>
                        <span style="font-size:0.6rem; font-weight:900; color:white;">${p.tera.toUpperCase()}</span>
                    </div>
                    ${p.item ? `<img src="${getItemSpriteUrl(p.item)}" style="position:absolute; bottom:15px; left:15px; width:36px; height:36px; filter:drop-shadow(0 5px 10px rgba(0,0,0,0.5));">` : ''}
                </div>

                <div style="padding:0 5px;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px;">
                        <h3 style="font-size:1.4rem; color:white; letter-spacing:-0.5px;">${p.species}</h3>
                        <div class="type-badges-row">
                            <span class="type-tag type-${t1}">${t1}</span>
                            ${t2 ? `<span class="type-tag type-${t2}">${t2}</span>` : ''}
                        </div>
                    </div>
                    <div style="font-size:0.7rem; color:rgba(255,255,255,0.4); font-weight:700; display:flex; gap:10px;">
                        <span>LVL ${p.level}</span>
                        <span>HELD: <span style="color:#eee">${(p.item || 'NONE').toUpperCase()}</span></span>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin:5px 0;">
                    <div class="moves-column">${movesHtml}</div>
                    <div class="stats-column" style="background:rgba(0,0,0,0.2); padding:12px; border-radius:15px;">${statsHtml}</div>
                </div>

                <div style="margin-top:auto; padding-top:15px; border-top:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-size:0.65rem; color:rgba(255,255,255,0.3); font-weight:800;">
                        ${p.nature.toUpperCase()} NATURE<br>
                        ABILITY: <span style="color:rgba(255,255,255,0.6)">${(p.ability || 'UNKNOWN').toUpperCase()}</span>
                    </div>
                    <button class="btn" style="padding:8px 15px; font-size:0.65rem;" onclick="event.stopPropagation(); copyPaste(\`${rawBuild.build.replace(/`/g, '\\`')}\`)">COPY PASTE</button>
                </div>
            `;
            return card;
        }

        function createEmptyCard() {
            const el = document.createElement('div');
            el.className = 'empty-slot-premium fade-in';
            el.innerHTML = `
                <div style="font-size:3rem; opacity:0.2;">+</div>
                <div style="font-weight:900; font-size:0.7rem; letter-spacing:2px; opacity:0.3;">EMPTY SLOT</div>
            `;
            return el;
        }

        function renderBuilds() {
            const grid = document.getElementById('builds-grid');
            grid.innerHTML = '';
            const searchInput = document.getElementById('build-search');
            const search = searchInput.value.toLowerCase();

            allBuilds.forEach(build => {
                const p = parsePaste(build.build);
                if (search && !p.species.toLowerCase().includes(search)) return;

                const dbRef = allPokemon.find(x => x.Name.toLowerCase() === p.species.toLowerCase());
                const wrapper = document.createElement('div');
                wrapper.className = `build-card-wrapper fade-in ${selectedBuildId === build.id ? 'selected' : ''}`;
                wrapper.id = `build-${build.id}`;
                wrapper.onclick = (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    selectBuild(build.id);
                };
                
                wrapper.appendChild(createTeamCard(p, dbRef, build));
                grid.appendChild(wrapper);
            });
        }

        function selectBuild(id) {
            selectedBuildId = id;
            document.querySelectorAll('.build-card-wrapper').forEach(el => el.classList.remove('selected'));
            const card = document.getElementById(`build-${id}`);
            if (card) card.classList.add('selected');

            const build = allBuilds.find(b => b.id === id);
            if (build) {
                renderSynergy(build.synergy);
                const container = document.getElementById('synergy-container');
                container.style.display = 'block';
                setTimeout(() => container.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
            }
        }

        function closeSynergy() {
            selectedBuildId = null;
            document.querySelectorAll('.build-card-wrapper').forEach(el => el.classList.remove('selected'));
            document.getElementById('synergy-container').style.display = 'none';
        }

        function renderSynergy(synergyIds) {
            const grid = document.getElementById('synergy-grid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 6; i++) {
                const sid = (synergyIds || [])[i];
                const build = sid ? allBuilds.find(b => b.id === sid) : null;
                
                if (build) {
                    const p = parsePaste(build.build);
                    const dbRef = allPokemon.find(x => x.Name.toLowerCase() === p.species.toLowerCase());
                    grid.appendChild(createTeamCard(p, dbRef, build));
                } else {
                    grid.appendChild(createEmptyCard());
                }
            }
        }

        function copyPaste(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('active');
                setTimeout(() => toast.classList.remove('active'), 3000);
            });
        }

        document.getElementById('build-search').addEventListener('input', renderBuilds);
        loadData();
    </script>
</body>
</html>
