<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Builds | Pokemon Champions Guide</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .builds-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem;
        }

        .search-wrapper {
            margin-bottom: 4rem;
            position: relative;
        }

        #build-search {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        #build-search:focus {
            border-color: var(--primary-red);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: var(--accent-glow);
        }

        .build-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .build-card:hover {
            border-color: var(--primary-red);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-5px);
        }

        .build-card.selected {
            border-color: var(--primary-red);
            box-shadow: var(--accent-glow);
            background: rgba(255, 51, 51, 0.05);
        }

        .build-card-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .build-sprite {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255,62,62,0.3));
        }

        .build-meta h3 {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 0.2rem;
        }

        .paste-box {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-muted);
            white-space: pre-wrap;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .copy-btn {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            margin-top: auto;
        }

        .copy-btn:hover {
            filter: brightness(1.2);
            box-shadow: var(--accent-glow);
        }

        /* Synergy Section */
        #synergy-container {
            margin-top: 5rem;
            padding-top: 5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: none;
        }

        .synergy-header {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        #synergy-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        @media (max-width: 991px) {
            #synergy-grid { grid-template-columns: 1fr !important; }
            .synergy-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
        }

        @media (max-width: 600px) {
            .build-card { padding: 1.5rem; }
            .build-card-header { flex-direction: column; text-align: center; }
            .build-meta h3 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="builds-container">
        <div class="section-title fade-in">
            <h2>PRO BUILD FINDER</h2>
            <p style="color: var(--text-muted);">Explore tournament-winning sets and their perfect partners.</p>
        </div>

        <div class="search-wrapper fade-in">
            <input type="text" id="build-search" placeholder="Search by Pokemon name (e.g. Miraidon, Incineroar)...">
        </div>

        <div id="builds-grid" class="grid fade-in">
            <!-- Builds will be injected here -->
        </div>

        <div id="synergy-container" class="fade-in">
            <div class="synergy-header">
                <div>
                    <h2 id="synergy-title" style="color: white; font-size: 2.2rem; margin-bottom: 0.5rem;">STRATEGIC SYNERGY</h2>
                    <p style="color: var(--text-muted);">The best partners for your selected build.</p>
                </div>
                <button onclick="closeSynergy()" class="btn btn-secondary" style="background:transparent; border: 1px solid rgba(255,255,255,0.2);">CLOSE VIEW</button>
            </div>
            <div id="synergy-grid">
                <!-- Synergy cards injected here -->
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Build Copied to Clipboard!</div>

    <script src="../js/main.js"></script>
    <script>
        let allPokemon = [];
        let allBuilds = [];
        let allMoves = [];
        let allItems = [];
        let selectedBuildId = null;

        const typeColors = {
            normal: '#A8A77A', fire: '#EE8130', water: '#6390F0', electric: '#F7D02C',
            grass: '#7AC74C', ice: '#96D9D6', fighting: '#C22E28', poison: '#A33EA1',
            ground: '#E2BF65', flying: '#A98FF3', psychic: '#F95587', bug: '#A6B91A',
            rock: '#B6A136', ghost: '#735797', dragon: '#6F35FC', steel: '#B7B7CE',
            fairy: '#D685AD', dark: '#705746'
        };

        const natureMap = {
            'Adamant': { pos: 'atk', neg: 'spa' }, 'Bold': { pos: 'def', neg: 'atk' },
            'Brave': { pos: 'atk', neg: 'spe' }, 'Calm': { pos: 'spd', neg: 'atk' },
            'Careful': { pos: 'spd', neg: 'spa' }, 'Hasty': { pos: 'spe', neg: 'def' },
            'Impish': { pos: 'def', neg: 'spa' }, 'Jolly': { pos: 'spe', neg: 'spa' },
            'Modest': { pos: 'spa', neg: 'atk' }, 'Naive': { pos: 'spe', neg: 'spd' },
            'Quiet': { pos: 'spa', neg: 'spe' }, 'Rash': { pos: 'spa', neg: 'spd' },
            'Relaxed': { pos: 'def', neg: 'spe' }, 'Sassy': { pos: 'spd', neg: 'spe' },
            'Timid': { pos: 'spe', neg: 'atk' }, 'Serious': { pos: '', neg: '' },
            'Docile': { pos: '', neg: '' }, 'Bashful': { pos: '', neg: '' },
            'Hardy': { pos: '', neg: '' }, 'Quirky': { pos: '', neg: '' }
        };

        async function loadData() {
            try {
                const [pResp, bResp, mResp, iResp] = await Promise.all([
                    fetch('../assets/pokemon.json'),
                    fetch('../assets/builds.json'),
                    fetch('../assets/moves.json'),
                    fetch('../assets/items.json')
                ]);
                allPokemon = await pResp.json();
                allBuilds = await bResp.json();
                allMoves = await mResp.json();
                allItems = await iResp.json();
                renderBuilds();
            } catch (e) {
                console.error("Data load failed", e);
            }
        }

        function calculateStat(base, iv, ev, level, natureType, statKey) {
            if (!base || isNaN(base)) return '--';
            const lvl = parseInt(level) || 50;
            const evBonus = Math.floor(parseInt(ev || 0) / 4);
            const ivVal = parseInt(iv || 31);
            if (statKey === 'hp') {
                if (parseInt(base) === 1) return 1;
                return Math.floor(((2 * parseInt(base) + ivVal + evBonus) * lvl) / 100) + lvl + 10;
            }
            let val = Math.floor(((2 * parseInt(base) + ivVal + evBonus) * lvl) / 100) + 5;
            const nature = natureMap[natureType] || { pos: '', neg: '' };
            if (nature.pos === statKey) val = Math.floor(val * 1.1);
            if (nature.neg === statKey) val = Math.floor(val * 0.9);
            return val;
        }

        function parsePaste(text) {
            const lines = text.trim().split('\n').map(l => l.trim());
            const slot = {
                species: '', item: '', ability: '', level: 50, shiny: false,
                tera: '', evs: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
                ivs: { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 },
                nature: 'Serious', moves: []
            };
            
            const head = lines[0];
            const itemSplit = head.split('@');
            if (itemSplit[1]) slot.item = itemSplit[1].trim();
            slot.species = itemSplit[0].split('(')[0].trim();

            lines.slice(1).forEach(line => {
                if (line.startsWith('Ability:')) slot.ability = line.split(':')[1].trim();
                else if (line.startsWith('Level:')) slot.level = parseInt(line.split(':')[1].trim());
                else if (line.startsWith('Tera Type:')) slot.tera = line.split(':')[1].trim();
                else if (line.startsWith('EVs:')) {
                    line.split(':')[1].split('/').forEach(p => {
                        const [val, s] = p.trim().split(' ');
                        let key = s.toLowerCase();
                        if (key === 'atk') key = 'atk'; if (key === 'spa') key = 'spa';
                        if (slot.evs[key] !== undefined) slot.evs[key] = parseInt(val);
                    });
                }
                else if (line.includes('Nature')) slot.nature = line.split('Nature')[0].trim();
                else if (line.startsWith('-')) slot.moves.push(line.substring(1).trim());
            });
            while (slot.moves.length < 4) slot.moves.push('');
            return slot;
        }

        function getSpriteUrl(name, shiny) {
            const clean = name.toLowerCase().replace(/ /g, '-').replace(/[^a-z0-9-]/g, '');
            const base = shiny ? 'ani-shiny' : 'ani';
            return `https://play.pokemonshowdown.com/sprites/${base}/${clean}.gif`;
        }

        function getItemSpriteUrl(item) {
            if (!item) return '';
            const clean = item.toLowerCase().replace(/ /g, '-').replace(/[^a-z0-9-]/g, '');
            return `https://play.pokemonshowdown.com/sprites/itemicons/${clean}.png`;
        }

        function renderBuilds(filter = '') {
            const grid = document.getElementById('builds-grid');
            grid.innerHTML = '';
            const filtered = allBuilds.filter(b => b.pokemon.toLowerCase().includes(filter.toLowerCase()));
            
            filtered.forEach(b => {
                const card = document.createElement('div');
                card.className = `build-card ${selectedBuildId === b.id ? 'selected' : ''}`;
                card.onclick = (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    selectBuild(b.id);
                };
                card.innerHTML = `
                    <div class="build-card-header">
                        <img src="${getSpriteUrl(b.pokemon)}" class="build-sprite" onerror="this.src='https://play.pokemonshowdown.com/sprites/ani/unown-interrogation.gif'">
                        <div class="build-meta">
                            <h3>${b.pokemon}</h3>
                            <span class="type-tag" style="background:rgba(255,255,255,0.05); font-size:0.75rem;">Build ID: ${b.id}</span>
                        </div>
                    </div>
                    <div class="paste-box">${b.build}</div>
                    <button class="copy-btn" onclick="copyBuild(\`${b.build.replace(/`/g, '\\`')}\`)">Copy Build Paste</button>
                `;
                grid.appendChild(card);
            });
        }

        function selectBuild(id) {
            selectedBuildId = id;
            renderBuilds(document.getElementById('build-search').value);
            const build = allBuilds.find(b => b.id === id);
            if (build) renderSynergy(build);
            
            document.getElementById('synergy-container').style.display = 'block';
            document.getElementById('synergy-container').scrollIntoView({ behavior: 'smooth' });
        }

        function closeSynergy() {
            selectedBuildId = null;
            document.getElementById('synergy-container').style.display = 'none';
            renderBuilds(document.getElementById('build-search').value);
        }

        function renderSynergy(build) {
            const grid = document.getElementById('synergy-grid');
            grid.innerHTML = '';
            document.getElementById('synergy-title').textContent = `${build.pokemon.toUpperCase()} SYNERGIES`;

            (build.synergy || []).forEach(synId => {
                const synBuild = allBuilds.find(b => b.id === synId);
                if (synBuild) {
                    const p = parsePaste(synBuild.build);
                    const dbRef = (allPokemon || []).find(x => x.Name.toLowerCase() === p.species.toLowerCase()) || {};
                    const t1 = (dbRef.Type_1 || 'Normal').toLowerCase();
                    const t2 = (dbRef.Type_2 || '').toLowerCase();
                    
                    const card = createTeamCard(p, dbRef, t1, t2);
                    grid.appendChild(card);
                }
            });
        }

        function createTeamCard(p, dbRef, t1, t2) {
            const card = document.createElement('div');
            card.className = 'pokemon-config fade-in';
            card.style.cssText = `
                padding: 14px; border-radius: 20px; display: flex; flex-direction: column; gap: 12px;
                background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.6));
                border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden;
                backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px ${typeColors[t1]}22;
            `;

            const statsArr = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
            const statLabels = ['HP', 'ATK', 'DEF', 'SPA', 'SPD', 'SPE'];
            const keys = { hp: 'HP', atk: 'Attack', def: 'Defense', spa: 'Sp.Atk', spd: 'Sp.Def', spe: 'Speed' };
            const statOrder = ['#4caf50', '#f44336', '#ff9800', '#9c27b0', '#ffeb3b', '#00bcd4'];

            const statsHtml = statsArr.map((s, idx) => {
                const base = parseInt(dbRef[keys[s]]) || 0;
                const val = calculateStat(base, p.ivs[s], p.evs[s], p.level, p.nature, s);
                const nature = natureMap[p.nature] || { pos: '', neg: '' };
                const color = nature.pos === s ? '#00ffcc' : (nature.neg === s ? '#ff4d4d' : '#ddd');
                return `
                    <div style="display:flex; align-items:center; gap:8px; font-size:0.65rem; margin-bottom:2px; height:14px;">
                        <span style="width:25px; color:rgba(255,255,255,0.4); font-weight:900;">${statLabels[idx]}</span>
                        <div style="flex:1; height:4px; background:rgba(0,0,0,0.2); border-radius:2px; overflow:hidden;">
                            <div style="height:100%; width:${Math.min(100, (val/250)*100)}%; background:${statOrder[idx]};"></div>
                        </div>
                        <span style="width:30px; text-align:right; font-weight:900; color:${color}">${val}</span>
                    </div>
                `;
            }).join('');

            const movesHtml = p.moves.map(m => {
                if (!m) return '';
                const moveRef = (allMoves || []).find(x => x.name.toLowerCase() === m.toLowerCase()) || { type: 'Normal' };
                const type = moveRef.type.toLowerCase();
                return `
                    <div style="display:flex; align-items:center; gap:6px; margin-bottom:3px; background:rgba(0,0,0,0.2); padding:2px 6px; border-radius:4px; border:1px solid rgba(255,255,255,0.03);">
                        <span style="font-size:0.65rem; color:#eee; font-weight:700; flex:1;">${m}</span>
                        <span style="font-size:0.4rem; color:${typeColors[type]}; font-weight:900; text-transform:uppercase;">${type}</span>
                    </div>
                `;
            }).join('');

            card.innerHTML = `
                <div style="display:flex; gap:12px; align-items:center; padding-bottom:12px; border-bottom:1px solid rgba(255,255,255,0.1);">
                    <div style="position:relative; width:60px; height:60px; background:rgba(255,255,255,0.05); border-radius:10px; display:flex; align-items:center; justify-content:center;">
                        <img src="${getSpriteUrl(p.species, p.shiny)}" style="width:100%; height:100%; object-fit:contain;" onerror="this.src='https://play.pokemonshowdown.com/sprites/ani/unown-interrogation.gif'">
                        ${p.item ? `<img src="${getItemSpriteUrl(p.item)}" style="position:absolute; bottom:-4px; right:-4px; width:24px; height:24px;">` : ''}
                    </div>
                    <div style="flex:1;">
                        <div style="font-weight:900; font-size:1.1rem; color:#fff;">${p.species}</div>
                        <div style="font-size:0.75rem; color:rgba(255,255,255,0.5);">${p.item || 'No Item'}</div>
                        <div style="display:flex; gap:4px; margin-top:4px;">
                            <span style="background:${typeColors[t1]}; color:#fff; font-size:0.5rem; padding:2px 6px; border-radius:4px; font-weight:900;">${t1.toUpperCase()}</span>
                            ${t2 ? `<span style="background:${typeColors[t2]}; color:#fff; font-size:0.5rem; padding:2px 6px; border-radius:4px; font-weight:900;">${t2.toUpperCase()}</span>` : ''}
                        </div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:8px;">
                    <div>${movesHtml}</div>
                    <div>${statsHtml}</div>
                </div>
                <div style="margin-top:auto; padding-top:10px; border-top:1px solid rgba(255,255,255,0.05); font-size:0.65rem; color:rgba(255,255,255,0.3); font-weight:800;">
                    ${p.ability} / ${p.nature} Nature
                </div>
            `;
            return card;
        }

        function copyBuild(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast();
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('active');
            setTimeout(() => { toast.classList.remove('active'); }, 3000);
        }

        document.getElementById('build-search').addEventListener('input', (e) => {
            renderBuilds(e.target.value);
        });

        loadData();
    </script>
</body>
</html>
