<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokePaste Importer | Pokemon Champions Guide</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .paste-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 0;
        }

        .input-section {
            background: var(--glass-bg);
            border: var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        #paste-textarea {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        #paste-textarea:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.2);
        }

        .analyze-btn {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 51, 51, 0.3);
        }

        .analyze-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 51, 51, 0.5);
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 25px;
            margin-top: 50px;
        }

        .team-card {
            background: var(--glass-bg);
            border: var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
            padding: 25px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .team-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-red);
            background: rgba(255, 255, 255, 0.05);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
        }

        .pokemon-sprite-box {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .team-pokemon-sprite {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .pokemon-main-info h3 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: white;
        }

        .item-text {
            font-size: 0.85rem;
            color: var(--primary-red);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-body-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .moves-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .move-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: white;
            font-weight: 500;
            border-left: 3px solid transparent;
        }

        .stats-summary {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
        }

        .stats-summary b {
            color: white;
        }

        .tera-badge {
            background: var(--glass-bg);
            border: 1px solid var(--primary-red);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 5px;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .team-grid { grid-template-columns: 1fr; }
            .paste-container { padding: 6rem 20px; }
            .input-section { padding: 25px; }
        }
    </style>
</head>
<body>

    <section class="paste-container">
        <div class="container">
            <div class="section-title fade-in">
                <h2 style="font-size: 3.5rem;">TEAM <span style="color: var(--primary-red)">IMPORTER</span></h2>
                <p>Import your Showdown PokePaste and visualize your team's battle-ready details.</p>
            </div>

            <div class="input-section fade-in">
                <textarea id="paste-textarea" placeholder="Paste your Pokemon Showdown Export here..."></textarea>
                <div style="text-align: right;">
                    <button id="import-btn" class="analyze-btn">ANALYZE TEAM</button>
                    <button id="clear-btn" class="analyze-btn" style="background: transparent; border: 1px solid var(--glass-border); margin-right: 10px;">CLEAR</button>
                </div>
            </div>

            <div id="team-result" class="team-grid">
                <!-- Team cards will be injected here -->
            </div>
        </div>
    </section>

    <script src="../js/main.js"></script>
    <script>
        let allPokemon = [];
        let allMoves = [];

        async function loadData() {
            try {
                const [pokeRes, movesRes] = await Promise.all([
                    fetch('../assets/pokemon.json'),
                    fetch('../assets/moves.json')
                ]);
                allPokemon = await pokeRes.json();
                allMoves = await movesRes.json();
            } catch (err) {
                console.error("Data load failed:", err);
            }
        }

        function parsePaste(text) {
            const sections = text.trim().split(/\n\s*\n/);
            const team = [];

            sections.forEach(section => {
                const lines = section.split('\n').map(l => l.trim());
                if (lines.length === 0 || lines[0] === '') return;

                const slot = {
                    name: '',
                    item: '',
                    ability: '',
                    level: '100',
                    shiny: false,
                    tera: '',
                    evs: '',
                    ivs: '',
                    nature: '',
                    moves: []
                };

                // Line 1: [Nickname (]Name[)] [@ Item]
                const head = lines[0];
                const itemSplit = head.split('@');
                if (itemSplit[1]) slot.item = itemSplit[1].trim();
                
                let namePart = itemSplit[0].trim();
                if (namePart.includes('(')) {
                    const match = namePart.match(/\(([^)]+)\)/);
                    if (match) {
                        slot.nickname = namePart.split('(')[0].trim();
                        slot.name = match[1].trim();
                    }
                } else {
                    slot.name = namePart;
                }

                // Remaining lines
                lines.slice(1).forEach(line => {
                    if (line.startsWith('Ability:')) slot.ability = line.split(':')[1].trim();
                    else if (line.startsWith('Level:')) slot.level = line.split(':')[1].trim();
                    else if (line.startsWith('Shiny:')) slot.shiny = line.split(':')[1].trim().toLowerCase() === 'yes';
                    else if (line.startsWith('Tera Type:')) slot.tera = line.split(':')[1].trim();
                    else if (line.startsWith('EVs:')) slot.evs = line.split(':')[1].trim();
                    else if (line.startsWith('IVs:')) slot.ivs = line.split(':')[1].trim();
                    else if (line.includes('Nature')) slot.nature = line.split('Nature')[0].trim();
                    else if (line.startsWith('-')) slot.moves.push(line.substring(1).trim());
                });

                if (slot.name) team.push(slot);
            });

            return team;
        }

        function getSpriteUrl(pokemon) {
            let clean = pokemon.name.toLowerCase()
                .replace(/ /g, '-')
                .replace(/\./g, '')
                .replace(/'/g, '')
                .replace(/:/g, '')
                .replace(/%/g, '')
                .replace('-f', '-f') // Female variants sometimes need special handling, but let's try standard
                .replace('-m', '-m');

            // Handle specific variations known in Showdown
            if (clean === 'indeedee-f') clean = 'indeedee-f';
            if (clean === 'indeedee') clean = 'indeedee';

            const base = pokemon.shiny ? 'ani-shiny' : 'ani';
            return `https://play.pokemonshowdown.com/sprites/${base}/${clean}.gif`;
        }

        function renderTeam(team) {
            const grid = document.getElementById('team-result');
            grid.innerHTML = '';

            team.forEach(p => {
                const dbPokemon = allPokemon.find(dp => dp.Name.toLowerCase() === p.name.toLowerCase()) || {};
                const type1 = dbPokemon.Type_1 || 'Normal';
                const type2 = dbPokemon.Type_2;

                const card = document.createElement('div');
                card.className = 'team-card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="pokemon-sprite-box">
                            <img src="${getSpriteUrl(p)}" class="team-pokemon-sprite" 
                                 onerror="this.src='https://play.pokemonshowdown.com/sprites/ani/unown-interrogation.gif';">
                        </div>
                        <div class="pokemon-main-info">
                            <h3>${p.nickname ? `${p.nickname} (${p.name})` : p.name}</h3>
                            <div class="item-text">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
                                ${p.item || 'No Item'}
                            </div>
                            <div style="margin-top: 5px;">
                                <span class="type-tag type-${type1.toLowerCase()}">${type1}</span>
                                ${type2 ? `<span class="type-tag type-${type2.toLowerCase()}">${type2}</span>` : ''}
                            </div>
                            ${p.tera ? `<div class="tera-badge">TERA: ${p.tera}</div>` : ''}
                        </div>
                    </div>
                    <div class="card-body-section">
                        <div class="moves-list">
                            <div style="font-size: 0.7rem; color: rgba(255,255,255,0.3); text-transform: uppercase;">Moves</div>
                            ${p.moves.map(m => {
                                const moveData = allMoves.find(dm => dm.name.toLowerCase() === m.toLowerCase()) || {};
                                return `<div class="move-item" style="border-left-color: var(--type-${(moveData.type || 'normal').toLowerCase()})">${m}</div>`;
                            }).join('')}
                        </div>
                        <div class="stats-col">
                            <div style="font-size: 0.7rem; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 5px;">Build</div>
                            <div class="stats-summary">
                                <b>Ability:</b> ${p.ability || '--'}<br>
                                <b>Nature:</b> ${p.nature || '--'}<br>
                                <b>EVs:</b> <span style="font-size: 0.75rem;">${p.evs || '--'}</span><br>
                                ${p.ivs ? `<b>IVs:</b> <span style="font-size: 0.75rem;">${p.ivs}</span><br>` : ''}
                                <b>Level:</b> ${p.level}
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        const importBtn = document.getElementById('import-btn');
        importBtn.onclick = () => {
            const text = document.getElementById('paste-textarea').value;
            if (!text) return alert("Please paste a PokePaste!");
            const team = parsePaste(text);
            renderTeam(team);
        };

        document.getElementById('clear-btn').onclick = () => {
            document.getElementById('paste-textarea').value = '';
            document.getElementById('team-result').innerHTML = '';
        };

        loadData();
    </script>
</body>
</html>
