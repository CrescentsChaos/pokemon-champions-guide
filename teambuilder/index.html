<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Builder | Pokemon Champions Guide</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .builder-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 7rem 20px;
        }

        /* Tabs Navigation */
        .team-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .team-tab {
            background: var(--glass-bg);
            border: var(--glass-border);
            border-radius: 12px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
            opacity: 0.6;
        }

        .team-tab.active {
            opacity: 1;
            border-color: var(--primary-red);
            background: rgba(255, 51, 51, 0.05);
            transform: translateY(-5px);
        }

        .tab-sprite {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .tab-info {
            display: flex;
            flex-direction: column;
        }

        .tab-name {
            font-size: 0.85rem;
            font-weight: 800;
            color: white;
        }

        .tab-role {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        /* Builder Layout */
        .builder-main {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 30px;
        }

        .pokemon-config {
            background: var(--glass-bg);
            border: var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .config-header {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .big-sprite-box {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .big-sprite {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .builder-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px 15px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .builder-input:focus { border-color: var(--primary-red); }

        .moves-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        /* Stat Sliders */
        .stat-rows {
            background: var(--glass-bg);
            border: var(--glass-border);
            border-radius: 24px;
            padding: 30px;
        }

        .stat-row {
            display: grid;
            grid-template-columns: 80px 40px 1fr 60px 60px;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .stat-label { font-size: 0.85rem; font-weight: 800; color: white; }
        .base-val { font-size: 0.85rem; color: rgba(255, 255, 255, 0.3); text-align: center; }

        .slider-wrap {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            position: relative;
        }

        .slider-fill {
            height: 100%;
            border-radius: 10px;
            background: var(--primary-red);
        }

        input[type="range"] {
            width: 100%;
            position: absolute;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .ev-input, .iv-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 5px;
            color: white;
            padding: 4px;
            text-align: center;
            font-size: 0.8rem;
        }

        .actual-stat {
            font-size: 1rem;
            font-weight: 900;
            color: var(--primary-red);
            text-align: right;
        }

        .ev-remaining {
            text-align: right;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 15px;
        }

        .ev-remaining span {
            color: white;
            font-weight: 800;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .overlay-content {
            background: var(--glass-bg);
            border: var(--glass-border);
            border-radius: 30px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            padding: 40px;
            overflow-y: auto;
        }

        .search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .search-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .search-item:hover {
            background: rgba(255, 51, 51, 0.1);
            transform: scale(1.05);
        }

        .import-export-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .builder-main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <section class="builder-container">
        <div class="container">
            <div class="import-export-row">
                <button id="main-import-btn" class="analyze-btn" style="padding: 10px 25px; font-size: 0.8rem;">IMPORT PASTE</button>
                <button id="export-paste-btn" class="analyze-btn" style="padding: 10px 25px; font-size: 0.8rem; background: transparent; border: 1px solid var(--glass-border);">EXPORT PASTE</button>
            </div>

            <div class="team-tabs" id="team-tabs">
                <!-- 6 pokemon slots (plus Team View) -->
            </div>

            <!-- Team Preview Grid -->
            <div id="team-view" style="display: none; margin-top: 30px;">
                <div id="team-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                    <!-- Team cards injected via JS -->
                </div>
            </div>

            <div class="builder-main" id="builder-view">

                <!-- Left Column: Identity & Moves -->
                <div class="pokemon-config">
                    <div class="config-header">
                        <div class="big-sprite-box">
                            <img src="" id="current-big-sprite" class="big-sprite">
                        </div>
                        <div style="flex-grow: 1;">
                            <div class="input-group">
                                <span class="input-label">Species</span>
                                <input type="text" id="species-input" class="builder-input" placeholder="Enter Pokemon Name...">
                            </div>
                            <div class="input-group">
                                <span class="input-label">Nickname</span>
                                <input type="text" id="nickname-input" class="builder-input" placeholder="No Nickname">
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <div class="input-group" style="width: 30%;">
                                    <span class="input-label">Level</span>
                                    <input type="number" id="level-input" class="builder-input" value="50">
                                </div>
                                <div class="input-group" style="flex-grow: 1;">
                                    <span class="input-label">Gender / Shiny</span>
                                    <div style="display: flex; gap: 5px;">
                                        <select id="shiny-input" class="builder-input" style="width: 50%;">
                                            <option value="no">Normal</option>
                                            <option value="yes">Shiny ✨</option>
                                        </select>
                                        <select id="gender-input" class="builder-input" style="width: 50%;">
                                            <option value="-">-</option>
                                            <option value="M">Male</option>
                                            <option value="F">Female</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group">
                            <span class="input-label">Item</span>
                            <input type="text" id="item-input" class="builder-input" placeholder="No Item">
                        </div>
                        <div class="input-group">
                            <span class="input-label">Ability</span>
                            <input type="text" id="ability-input" class="builder-input" placeholder="No Ability">
                        </div>
                    </div>

                    <div class="input-group">
                        <span class="input-label">Tera Type</span>
                        <input type="text" id="tera-input" class="builder-input" placeholder="Optional">
                    </div>

                    <div class="moves-grid" id="moves-grid">
                        <div class="input-group"><span class="input-label">Move 1</span><input type="text" class="builder-input move-in" data-idx="0"></div>
                        <div class="input-group"><span class="input-label">Move 2</span><input type="text" class="builder-input move-in" data-idx="1"></div>
                        <div class="input-group"><span class="input-label">Move 3</span><input type="text" class="builder-input move-in" data-idx="2"></div>
                        <div class="input-group"><span class="input-label">Move 4</span><input type="text" class="builder-input move-in" data-idx="3"></div>
                    </div>
                </div>

                <!-- Right Column: Stats & Natures -->
                <div class="stat-rows" id="stat-rows">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                        <span class="input-label" style="font-size: 1.2rem; color: white;">Base Stats & EV Spread</span>
                        <select id="nature-input" class="builder-input" style="width: 150px; background: rgba(255,51,51,0.1); border-color: var(--primary-red);">
                            <!-- Natures loaded via JS -->
                        </select>
                    </div>


                    <div class="stat-row">
                        <span class="stat-label">HP</span><span class="base-val" id="base-hp">--</span>
                        <div class="slider-wrap"><div class="slider-fill" id="fill-hp" style="width: 0%"></div><input type="range" class="ev-slider" data-stat="hp" max="252" value="0"></div>
                        <input type="number" class="ev-input" data-stat="hp" value="0" max="252">
                        <span class="actual-stat" id="act-hp">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Attack</span><span class="base-val" id="base-atk">--</span>
                        <div class="slider-wrap"><div class="slider-fill" id="fill-atk" style="width: 0%"></div><input type="range" class="ev-slider" data-stat="atk" max="252" value="0"></div>
                        <input type="number" class="ev-input" data-stat="atk" value="0" max="252">
                        <span class="actual-stat" id="act-atk">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Defense</span><span class="base-val" id="base-def">--</span>
                        <div class="slider-wrap"><div class="slider-fill" id="fill-def" style="width: 0%"></div><input type="range" class="ev-slider" data-stat="def" max="252" value="0"></div>
                        <input type="number" class="ev-input" data-stat="def" value="0" max="252">
                        <span class="actual-stat" id="act-def">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Sp. Atk</span><span class="base-val" id="base-spa">--</span>
                        <div class="slider-wrap"><div class="slider-fill" id="fill-spa" style="width: 0%"></div><input type="range" class="ev-slider" data-stat="spa" max="252" value="0"></div>
                        <input type="number" class="ev-input" data-stat="spa" value="0" max="252">
                        <span class="actual-stat" id="act-spa">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Sp. Def</span><span class="base-val" id="base-spd">--</span>
                        <div class="slider-wrap"><div class="slider-fill" id="fill-spd" style="width: 0%"></div><input type="range" class="ev-slider" data-stat="spd" max="252" value="0"></div>
                        <input type="number" class="ev-input" data-stat="spd" value="0" max="252">
                        <span class="actual-stat" id="act-spd">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Speed</span><span class="base-val" id="base-spe">--</span>
                        <div class="slider-wrap"><div class="slider-fill" id="fill-spe" style="width: 0%"></div><input type="range" class="ev-slider" data-stat="spe" max="252" value="0"></div>
                        <input type="number" class="ev-input" data-stat="spe" value="0" max="252">
                        <span class="actual-stat" id="act-spe">--</span>
                    </div>

                    <div class="ev-remaining">Remaining: <span id="rem-ev">508</span></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Overlay for Search -->
    <div class="overlay" id="search-overlay">
        <div class="overlay-content">
            <h2 id="overlay-title">Select Pokemon</h2>
            <input type="text" id="overlay-search" class="builder-input" style="margin-top: 15px;" placeholder="Search...">
            <div class="search-results" id="search-results"></div>
        </div>
    </div>

    <!-- Paste Import Overlay -->
    <div class="overlay" id="import-overlay">
        <div class="overlay-content">
            <h2>Import PokePaste</h2>
            <textarea id="import-textarea" class="builder-input" style="height: 300px; margin-top: 20px;" placeholder="Paste team here..."></textarea>
            <div style="text-align: right; margin-top: 20px;">
                <button id="confirm-import" class="analyze-btn">LOAD TEAM</button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        // Data & State
        let allPokemon = [];
        let allMoves = [];
        let allItems = [];
        let currentSlot = 0;
        let overlayTarget = null; // 'species', 'item', 'move-0', etc.
        
        let team = Array(6).fill(null).map(() => ({
            species: '', item: '', ability: '', level: 50, shiny: false, 
            tera: '', nickname: '', gender: '-', nature: 'Serious',
            evs: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
            ivs: { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 },
            moves: ['', '', '', '']
        }));

        const natureMap = {
            'Adamant': { pos: 'atk', neg: 'spa' }, 'Bashful': {}, 'Bold': { pos: 'def', neg: 'atk' },
            'Brave': { pos: 'atk', neg: 'spe' }, 'Calm': { pos: 'spd', neg: 'atk' }, 'Careful': { pos: 'spd', neg: 'spa' },
            'Docile': {}, 'Gentle': { pos: 'spd', neg: 'def' }, 'Hardy': {}, 'Hasty': { pos: 'spe', neg: 'def' },
            'Impish': { pos: 'def', neg: 'spa' }, 'Jolly': { pos: 'spe', neg: 'spa' }, 'Lax': { pos: 'def', neg: 'spd' },
            'Lonely': { pos: 'atk', neg: 'def' }, 'Mild': { pos: 'spa', neg: 'def' }, 'Modest': { pos: 'spa', neg: 'atk' },
            'Naive': { pos: 'spe', neg: 'spd' }, 'Naughty': { pos: 'atk', neg: 'spd' }, 'Quiet': { pos: 'spa', neg: 'spe' },
            'Quirky': {}, 'Rash': { pos: 'spa', neg: 'spd' }, 'Relaxed': { pos: 'def', neg: 'spe' },
            'Sassy': { pos: 'spd', neg: 'spe' }, 'Serious': {}, 'Timid': { pos: 'spe', neg: 'atk' }
        };

        // DOM Elements
        const speciesIn = document.getElementById('species-input');
        const natureIn = document.getElementById('nature-input');
        const levelIn = document.getElementById('level-input');
        const evSliders = document.querySelectorAll('.ev-slider');
        const evInputs = document.querySelectorAll('.ev-input');
        const overlay = document.getElementById('search-overlay');
        const searchInput = document.getElementById('overlay-search');
        const resultsBox = document.getElementById('search-results');

        async function init() {
            try {
                const [p, m, i] = await Promise.all([
                    fetch('../assets/pokemon.json').then(r => r.json()),
                    fetch('../assets/moves.json').then(r => r.json()),
                    fetch('../assets/items.json').then(r => r.json())
                ]);
                allPokemon = p;
                allMoves = m;
                allItems = i;

                Object.keys(natureMap).forEach(n => {
                    const opt = document.createElement('option');
                    opt.value = n; opt.textContent = n;
                    natureIn.appendChild(opt);
                });

                setupTabs();
                syncUI();
            } catch (e) {
                console.error("Data error:", e);
            }
        }

        function setupTabs() {
            const container = document.getElementById('team-tabs');
            container.innerHTML = '';
            
            // Slots 1-6
            for(let i=0; i<6; i++) {
                const tab = document.createElement('div');
                tab.className = `team-tab ${i === currentSlot ? 'active' : ''}`;
                tab.id = `tab-${i}`;
                tab.onclick = () => switchSlot(i);
                
                const p = team[i];
                tab.innerHTML = `
                    <img src="${getSpriteUrl(p)}" class="tab-sprite" id="tab-sprite-${i}">
                    <div class="tab-info">
                        <span class="tab-name" id="tab-name-${i}">${p.species || 'Empty'}</span>
                        <span class="tab-role">Slot ${i+1}</span>
                    </div>
                `;
                container.appendChild(tab);
            }

            // Team View Tab
            const teamTab = document.createElement('div');
            teamTab.className = `team-tab ${currentSlot === -1 ? 'active' : ''}`;
            teamTab.style.borderStyle = 'dashed';
            teamTab.onclick = () => switchSlot(-1);
            teamTab.innerHTML = `
                <div class="tab-sprite" style="display:flex; align-items:center; justify-content:center; font-size:1.5rem;">📋</div>
                <div class="tab-info">
                    <span class="tab-name">TEAM VIEW</span>
                    <span class="tab-role">Overview</span>
                </div>
            `;
            container.appendChild(teamTab);
        }

        function switchSlot(idx) {
            currentSlot = idx;
            setupTabs();
            
            if (idx === -1) {
                document.getElementById('builder-view').style.display = 'none';
                document.getElementById('team-view').style.display = 'block';
                renderTeamPreview();
            } else {
                document.getElementById('builder-view').style.display = 'grid';
                document.getElementById('team-view').style.display = 'none';
                syncUI();
            }
        }

        function renderTeamPreview() {
            const grid = document.getElementById('team-grid');
            grid.innerHTML = '';
            
            team.forEach((p, i) => {
                const dbRef = allPokemon.find(x => x.Name.toLowerCase() === (p.species || '').toLowerCase()) || {};
                const sprite = getSpriteUrl(p);
                
                const card = document.createElement('div');
                card.className = 'pokemon-config fade-in';
                card.style.cursor = 'pointer';
                card.style.margin = '0';
                card.onclick = () => switchSlot(i);
                
                let movesHtml = p.moves.map(m => `<div style="font-size:0.75rem; color:rgba(255,255,255,0.7); margin-bottom:2px;">• ${m || '---'}</div>`).join('');
                
                const stats = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
                const statLabels = ['HP', 'Atk', 'Def', 'SpA', 'SpD', 'Spe'];
                const keys = { hp: 'HP', atk: 'Attack', def: 'Defense', spa: 'Sp.Atk', spd: 'Sp.Def', spe: 'Speed' };
                
                let statsHtml = stats.map((s, idx) => {
                    const base = dbRef[keys[s]] || 0;
                    const val = calculateStat(base, p.ivs[s], p.evs[s], p.level, p.nature, s);
                    const ev = p.evs[s];
                    const natureSuffix = natureMap[p.nature].pos === s ? '+' : (natureMap[p.nature].neg === s ? '-' : '');
                    return `
                        <div style="display:flex; align-items:center; gap:8px; font-size:0.7rem; margin-bottom:2px;">
                            <span style="width:25px; color:rgba(255,255,255,0.4); font-weight:800;">${statLabels[idx]}</span>
                            <div style="flex:1; height:4px; background:rgba(255,255,255,0.05); border-radius:2px;">
                                <div style="height:100%; border-radius:2px; background:var(--primary-red); opacity:0.6; width:${Math.min(100, (base/200)*100)}%;"></div>
                            </div>
                            <span style="width:30px; text-align:right; font-weight:800;">${val}${natureSuffix}</span>
                            <span style="width:25px; text-align:right; color:rgba(255,255,255,0.3); font-size:0.6rem;">${ev || ''}</span>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div style="display: flex; gap: 15px;">
                        <div style="width: 80px; height: 80px; background: rgba(255,255,255,0.03); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                            <img src="${sprite}" style="width: 60px; height: 60px; object-fit: contain;">
                        </div>
                        <div style="flex: 1;">
                            <div style="font-weight: 800; font-size: 1rem; color: white;">${p.species || 'Empty Slot'}</div>
                            <div style="font-size: 0.7rem; color: var(--primary-red); text-transform: uppercase;">Lvl ${p.level} • ${p.item || 'No Item'}</div>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                        <div>
                            <div class="input-label" style="margin-bottom:8px;">Moves</div>
                            ${movesHtml}
                        </div>
                        <div>
                            <div class="input-label" style="margin-bottom:8px;">Stats</div>
                            ${statsHtml}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }


        function openSearch(type, currentVal) {
            overlayTarget = type;
            overlay.style.display = 'flex';
            searchInput.value = '';
            searchInput.focus();
            
            document.getElementById('overlay-title').textContent = 
                type === 'species' ? 'Select Pokemon' : 
                type === 'item' ? 'Select Item' : 'Select Move';
            
            updateSearchResults('');
        }

        function updateSearchResults(q) {
            resultsBox.innerHTML = '';
            let data = [];
            if (overlayTarget === 'species') data = allPokemon;
            else if (overlayTarget === 'item') data = allItems;
            else data = allMoves;

            const filtered = data.filter(x => 
                (x.Name || x.name).toLowerCase().includes(q.toLowerCase())
            ).slice(0, 100);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'search-item';
                const name = item.Name || item.name;
                card.innerHTML = `<div style="font-weight:900;">${name}</div>`;
                if (item.Type_1) card.innerHTML += `<div style="font-size:0.7rem;">${item.Type_1} ${item.Type_2||''}</div>`;
                if (item.description) card.innerHTML += `<div style="font-size:0.65rem; opacity:0.6;">${item.description}</div>`;
                
                card.onclick = () => selectItem(name);
                resultsBox.appendChild(card);
            });
        }

        function selectItem(name) {
            const p = team[currentSlot];
            if (overlayTarget === 'species') p.species = name;
            else if (overlayTarget === 'item') p.item = name;
            else {
                const idx = overlayTarget.split('-')[1];
                p.moves[idx] = name;
            }
            overlay.style.display = 'none';
            syncUI();
        }

        searchInput.oninput = (e) => updateSearchResults(e.target.value);

        function getSpriteUrl(p) {
            if (!p.species) return 'https://play.pokemonshowdown.com/sprites/ani/unown-interrogation.gif';
            const clean = p.species.toLowerCase().replace(/ /g, '-').replace(/\./g, '');
            const base = p.shiny ? 'ani-shiny' : 'ani';
            return `https://play.pokemonshowdown.com/sprites/${base}/${clean}.gif`;
        }

        function calculateStat(base, iv, ev, level, natureType, statKey) {
            if (!base) return '--';
            const lvl = parseInt(level) || 50;
            const evBonus = Math.floor(parseInt(ev || 0) / 4);
            const ivVal = parseInt(iv || 31);
            
            if (statKey === 'hp') {
                if (base === 1) return 1; // Shedinja
                return Math.floor(((2 * base + ivVal + evBonus) * lvl) / 100) + lvl + 10;
            }
            
            let val = Math.floor(((2 * base + ivVal + evBonus) * lvl) / 100) + 5;
            const nature = natureMap[natureType] || {};
            if (nature.pos === statKey) val = Math.floor(val * 1.1);
            if (nature.neg === statKey) val = Math.floor(val * 0.9);
            return val;
        }


        function syncUI() {
            const p = team[currentSlot];
            const dbRef = allPokemon.find(x => x.Name.toLowerCase() === p.species.toLowerCase()) || {
                HP: 0, Attack: 0, Defense: 0, "Sp.Atk": 0, "Sp.Def": 0, Speed: 0
            };

            speciesIn.value = p.species;
            document.getElementById('nickname-input').value = p.nickname;
            document.getElementById('item-input').value = p.item;
            document.getElementById('ability-input').value = p.ability;
            document.getElementById('tera-input').value = p.tera;
            document.getElementById('shiny-input').value = p.shiny ? 'yes' : 'no';
            document.getElementById('gender-input').value = p.gender;
            levelIn.value = p.level;
            natureIn.value = p.nature;
            document.getElementById('current-big-sprite').src = getSpriteUrl(p);

            document.getElementById(`tab-name-${currentSlot}`).textContent = p.species || 'Empty';
            document.getElementById(`tab-sprite-${currentSlot}`).src = getSpriteUrl(p);

            const keys = { hp: 'HP', atk: 'Attack', def: 'Defense', spa: 'Sp.Atk', spd: 'Sp.Def', spe: 'Speed' };
            let totalEVs = 0;
            Object.entries(keys).forEach(([key, dbKey]) => {
                const base = dbRef[dbKey];
                document.getElementById(`base-${key}`).textContent = base || '--';
                const ev = p.evs[key];
                totalEVs += ev;
                document.querySelector(`.ev-slider[data-stat="${key}"]`).value = ev;
                document.querySelector(`.ev-input[data-stat="${key}"]`).value = ev;
                document.getElementById(`fill-${key}`).style.width = (ev / 252 * 100) + '%';
                const act = calculateStat(base, p.ivs[key], ev, p.level, p.nature, key);
                document.getElementById(`act-${key}`).textContent = act;
            });
            document.getElementById('rem-ev').textContent = 508 - totalEVs;

            p.moves.forEach((m, i) => {
                document.querySelector(`.move-in[data-idx="${i}"]`).value = m;
            });
        }

        // Binding Search Overlays
        speciesIn.onclick = () => openSearch('species');
        document.getElementById('item-input').onclick = () => openSearch('item');
        document.querySelectorAll('.move-in').forEach(el => {
            el.onclick = (e) => openSearch(`move-${e.target.dataset.idx}`);
        });

        [document.getElementById('nickname-input'), document.getElementById('ability-input'), 
         document.getElementById('tera-input'), document.getElementById('shiny-input'), 
         document.getElementById('gender-input'), levelIn, natureIn].forEach(el => {
            el.oninput = (e) => {
                const id = e.target.id;
                const p = team[currentSlot];
                if (id === 'nickname-input') p.nickname = e.target.value;
                if (id === 'ability-input') p.ability = e.target.value;
                if (id === 'tera-input') p.tera = e.target.value;
                if (id === 'level-input') p.level = e.target.value;
                if (id === 'nature-input') p.nature = e.target.value;
                if (id === 'shiny-input') p.shiny = e.target.value === 'yes';
                if (id === 'gender-input') p.gender = e.target.value;
                syncUI();
            };
        });

        evSliders.forEach(s => { s.oninput = (e) => { team[currentSlot].evs[e.target.dataset.stat] = parseInt(e.target.value); syncUI(); }; });
        evInputs.forEach(i => { i.oninput = (e) => { team[currentSlot].evs[e.target.dataset.stat] = parseInt(e.target.value || 0); syncUI(); }; });

        document.getElementById('main-import-btn').onclick = () => document.getElementById('import-overlay').style.display = 'flex';
        document.getElementById('confirm-import').onclick = () => {
            const parsed = parsePaste(document.getElementById('import-textarea').value);
            parsed.forEach((p, idx) => { if (idx < 6) team[idx] = { ...team[idx], ...p }; });
            document.getElementById('import-overlay').style.display = 'none';
            setupTabs(); syncUI();
        };

        function parsePaste(text) {
            const sections = text.trim().split(/\n\s*\n/);
            const team = [];
            sections.forEach(section => {
                const lines = section.split('\n').map(l => l.trim());
                if (lines.length === 0 || lines[0] === '') return;
                const slot = {
                    species: '', item: '', ability: '', level: 50, shiny: false,
                    tera: '', evs: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 },
                    ivs: { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 },
                    nature: 'Serious', moves: []
                };
                const head = lines[0];
                const itemSplit = head.split('@');
                if (itemSplit[1]) slot.item = itemSplit[1].trim();
                let namePart = itemSplit[0].trim();
                if (namePart.includes('(')) {
                    const match = namePart.match(/\(([^)]+)\)/);
                    if (match) {
                        slot.nickname = namePart.split('(')[0].trim();
                        slot.species = match[1].trim();
                    }
                } else { slot.species = namePart; }

                lines.slice(1).forEach(line => {
                    if (line.startsWith('Ability:')) slot.ability = line.split(':')[1].trim();
                    else if (line.startsWith('Level:')) slot.level = parseInt(line.split(':')[1].trim());
                    else if (line.startsWith('Shiny:')) slot.shiny = line.split(':')[1].trim().toLowerCase() === 'yes';
                    else if (line.startsWith('Tera Type:')) slot.tera = line.split(':')[1].trim();
                    else if (line.startsWith('EVs:')) {
                        const parts = line.split(':')[1].split('/');
                        parts.forEach(p => {
                            const [val, s] = p.trim().split(' ');
                            let key = s.toLowerCase();
                            if (key === 'spa') key = 'spa'; if (key === 'spd') key = 'spd';
                            if (slot.evs[key] !== undefined) slot.evs[key] = parseInt(val);
                        });
                    }
                    else if (line.includes('Nature')) slot.nature = line.split('Nature')[0].trim();
                    else if (line.startsWith('-')) slot.moves.push(line.substring(1).trim());
                });
                while (slot.moves.length < 4) slot.moves.push('');
                team.push(slot);
            });
            return team;
        }

        window.onclick = (e) => { if (e.target.className === 'overlay') e.target.style.display = 'none'; };
        init();
    </script>
</body>
</html>
