<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Tool | Pokemon Champions Guide</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root {
            --input-bg: rgba(0, 0, 0, 0.4);
            --focus-border: var(--primary-red);
        }

        body {
            padding-top: 100px;
            background: radial-gradient(circle at top right, rgba(255, 62, 62, 0.05), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(255, 204, 0, 0.02), #0a0a0c 100%);
        }

        .counter-container {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 2.5rem;
            align-items: start;
        }

        @media (max-width: 1100px) {
            .counter-container {
                grid-template-columns: 1fr;
            }
        }

        /* Premium Input Styles */
        .import-box {
            transition: var(--transition);
        }

        .import-box.minimized {
            height: 0;
            opacity: 0;
            overflow: hidden;
            margin-bottom: 0;
            padding: 0;
            border: none;
        }

        .import-area {
            width: 100%;
            height: 12rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            resize: none;
            transition: var(--transition);
            margin-bottom: 1rem;
        }

        .import-area:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.15);
        }

        /* Target Preview (Builder Style) */
        .target-preview-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.6));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 1.5rem;
            backdrop-filter: blur(15px);
            position: relative;
            display: none; /* Shown after import */
            animation: fadeIn 0.4s ease;
        }

        .target-preview-card.active {
            display: block;
        }

        .target-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 4px 15px;
            border-radius: 20px;
            letter-spacing: 1px;
            box-shadow: var(--accent-glow);
            z-index: 10;
        }

        .target-main-info {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .target-sprite-large {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        .target-details h3 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            color: white;
        }

        .target-type-tags {
            display: flex;
            gap: 6px;
        }

        .type-tag {
            font-size: 0.6rem;
            font-weight: 800;
            padding: 2px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        /* Stat Grid (Builder Style) */
        .stat-rows-mini {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .stat-row-mini {
            display: grid;
            grid-template-columns: 40px 1fr 35px;
            align-items: center;
            gap: 12px;
        }

        .stat-label-mini {
            font-size: 0.6rem;
            font-weight: 800;
            color: var(--text-muted);
        }

        .stat-bar-mini {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .stat-fill-mini {
            height: 100%;
            background: var(--primary-red);
            border-radius: 2px;
        }

        .stat-val-mini {
            font-size: 0.7rem;
            font-weight: 800;
            text-align: right;
        }

        .moves-preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .move-tag-mini {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
        }

        /* Editor Overrides */
        .target-editor-toggle {
            background: rgba(255,255,255,0.02);
            border: 1px dashed var(--glass-border);
            padding: 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
        }

        .target-editor-toggle:hover {
            background: rgba(255,255,255,0.05);
            border-style: solid;
            border-color: var(--primary-red);
        }

        /* Results Style */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 1.5rem;
        }

        .counter-card-premium {
            background: linear-gradient(160deg, rgba(255,255,255,0.03), rgba(0,0,0,0.4));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            position: relative;
            transition: var(--transition);
            overflow: hidden;
        }

        .counter-card-premium:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 62, 62, 0.4);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .counter-header-premium {
            display: flex;
            gap: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .counter-sprite-premium {
            width: 70px;
            height: 70px;
            object-fit: contain;
        }

        .counter-meta-premium h4 {
            font-size: 1.1rem;
            color: white;
            margin-bottom: 4px;
        }

        .counter-score-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: linear-gradient(135deg, #ff3e3e, #ff8000);
            color: white;
            font-size: 0.6rem;
            font-weight: 900;
            padding: 5px 12px;
            border-bottom-left-radius: 15px;
            box-shadow: -5px 5px 15px rgba(255, 62, 62, 0.2);
        }

        .rationale-list-premium {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .rationale-item-premium {
            display: flex;
            gap: 10px;
            font-size: 0.8rem;
            margin-bottom: 8px;
            align-items: flex-start;
        }

        .rationale-item-premium:last-child { margin-bottom: 0; }

        .rationale-icon {
            color: var(--primary-red);
            font-size: 0.9rem;
            line-height: 1;
        }

        .build-btn-premium {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .build-btn-premium:hover {
            background: var(--primary-red);
            color: white;
            border-color: var(--primary-red);
        }

        .build-raw-premium {
            display: none;
            background: rgba(0,0,0,0.5);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #ccc;
            white-space: pre-wrap;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .manage-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .secondary-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            flex: 1;
        }

        .secondary-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: white;
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="section-title fade-in" style="margin-bottom: 3rem;">
            <h2>Counter Strategy Engine</h2>
            <p>Optimize your competitive matchups with precision simulation and championship data.</p>
        </div>

        <div class="counter-container">
            <!-- Left Column: Build Management -->
            <div class="builder-column">
                
                <!-- Import State -->
                <div id="import-view" class="import-box fade-in">
                    <div class="glass" style="padding: 1.8rem; position: relative; overflow: hidden;">
                        <div style="position: absolute; top:0; right:0; width: 100px; height: 100px; background: radial-gradient(circle, rgba(255,62,62,0.1) 0%, transparent 70%); z-index: 0;"></div>
                        <h3 style="margin-bottom: 1.2rem; font-size: 0.9rem; position: relative; z-index: 1;">Import Championship Build</h3>
                        <textarea id="paste-input" class="import-area" placeholder="Paste PokePaste or raw build export here..."></textarea>
                        
                        <div style="display: flex; gap: 10px; position: relative; z-index: 1;">
                            <button id="analyze-btn" class="btn analyze-btn" style="flex: 2; margin-top: 0;">
                                <span>ANALYZE BUILD</span>
                                <div class="loader" id="analyze-loader" style="display: none; width: 18px; height: 18px; border-width: 2px;"></div>
                            </button>
                            <button id="show-editor-btn" class="secondary-btn" title="Manual Entry">
                                ⌨️
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Preview State (Builder Style Card) -->
                <div id="target-preview" class="target-preview-card">
                    <div class="target-badge">TARGET BUILD</div>
                    
                    <div class="target-main-info">
                        <img id="preview-sprite" src="" class="target-sprite-large" alt="">
                        <div class="target-details">
                            <h3 id="preview-species">POKEMON</h3>
                            <div id="preview-types" class="target-type-tags"></div>
                            <div style="margin-top: 10px; font-size: 0.75rem; color: var(--text-muted); font-weight: 600;" id="preview-item">Item: None</div>
                        </div>
                    </div>

                    <div class="stat-rows-mini" id="preview-stats">
                        <!-- Populated by JS -->
                    </div>

                    <div class="moves-preview-grid" id="preview-moves">
                        <!-- Populated by JS -->
                    </div>

                    <div class="manage-controls">
                        <button id="edit-build-btn" class="secondary-btn">EDIT BUILD</button>
                        <button id="new-import-btn" class="secondary-btn">NEW IMPORT</button>
                    </div>
                </div>

                <!-- Manual Editor Modal/Overlay (Initially Hidden) -->
                <div id="editor-view" class="glass target-editor" style="display: none; margin-top: 1rem;">
                    <div class="target-header">
                        <img src="https://play.pokemonshowdown.com/sprites/ani/substitute.gif" alt="Target" class="target-sprite" id="target-sprite">
                        <div style="flex: 1; position: relative;">
                            <input type="text" id="target-name" class="target-name-input" placeholder="POKEMON NAME">
                            <div id="search-results" class="search-results"></div>
                        </div>
                    </div>

                    <div class="editor-grid">
                        <div class="editor-field">
                            <label>Item</label>
                            <input type="text" id="target-item" placeholder="None">
                        </div>
                        <div class="editor-field">
                            <label>Ability</label>
                            <input type="text" id="target-ability" placeholder="None">
                        </div>
                        <div class="editor-field">
                            <label>Nature</label>
                            <select id="target-nature"></select>
                        </div>
                        <div class="editor-field">
                            <label>Level</label>
                            <input type="number" id="target-level" value="50">
                        </div>
                    </div>

                    <div style="margin-top: 1.5rem;">
                        <label style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Moves</label>
                        <div class="editor-grid" style="margin-top: 0.5rem;" id="target-moves-container">
                            <input type="text" class="target-move" placeholder="Move 1">
                            <input type="text" class="target-move" placeholder="Move 2">
                            <input type="text" class="target-move" placeholder="Move 3">
                            <input type="text" class="target-move" placeholder="Move 4">
                        </div>
                    </div>

                    <div style="margin-top: 1.5rem;">
                        <label style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">EVs</label>
                        <div class="editor-grid" style="grid-template-columns: repeat(3, 1fr); margin-top: 0.5rem;">
                            <div class="editor-field"><label>HP</label><input type="number" class="target-ev" data-stat="hp" value="0"></div>
                            <div class="editor-field"><label>Atk</label><input type="number" class="target-ev" data-stat="atk" value="0"></div>
                            <div class="editor-field"><label>Def</label><input type="number" class="target-ev" data-stat="def" value="0"></div>
                            <div class="editor-field"><label>SpA</label><input type="number" class="target-ev" data-stat="spa" value="0"></div>
                            <div class="editor-field"><label>SpD</label><input type="number" class="target-ev" data-stat="spd" value="0"></div>
                            <div class="editor-field"><label>Spe</label><input type="number" class="target-ev" data-stat="spe" value="0"></div>
                        </div>
                    </div>

                    <button id="save-editor-btn" class="btn analyze-btn" style="margin-top: 1.5rem;">
                        APPLY CHANGES
                    </button>
                    <button id="cancel-editor-btn" class="secondary-btn" style="width: 100%; margin-top: 10px;">
                        CANCEL
                    </button>
                </div>
            </div>

            <!-- Right Column: Results -->
            <div class="results-column">
                <div class="results-header">
                    <h3>Optimal Counter Measures</h3>
                    <span id="results-count" class="badge">0 RESULTS FOUND</span>
                </div>

                <div id="counter-results" class="counter-grid">
                    <div class="placeholder-text" style="background: rgba(255,255,255,0.02); border: 1px dashed var(--glass-border); border-radius: 20px; padding: 6rem;">
                        <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.2;">🛡️</div>
                        Import a build on the left to begin strategic analysis.
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script>
        // Data and Constants
        let pokemonDB = [];
        let movesDB = [];
        let buildsDB = [];

        const natureMap = {
            'Hardy': [1, 1, 1, 1, 1], 'Lonely': [1.1, 0.9, 1, 1, 1], 'Brave': [1.1, 1, 1, 1, 0.9], 'Adamant': [1.1, 1, 0.9, 1, 1], 'Naughty': [1.1, 1, 1, 0.9, 1],
            'Bold': [0.9, 1.1, 1, 1, 1], 'Docile': [1, 1, 1, 1, 1], 'Relaxed': [1, 1.1, 1, 1, 0.9], 'Impish': [1, 1.1, 0.9, 1, 1], 'Lax': [1, 1.1, 1, 0.9, 1],
            'Timid': [0.9, 1, 1, 1, 1.1], 'Hasty': [1, 0.9, 1, 1, 1.1], 'Serious': [1, 1, 1, 1, 1], 'Jolly': [1, 1, 0.9, 1, 1.1], 'Naive': [1, 1, 1, 0.9, 1.1],
            'Modest': [0.9, 1, 1.1, 1, 1], 'Mild': [1, 0.9, 1.1, 1, 1], 'Quiet': [1, 1, 1.1, 1, 0.9], 'Bashful': [1, 1, 1, 1, 1], 'Rash': [1, 1, 1.1, 0.9, 1],
            'Calm': [0.9, 1, 1, 1.1, 1], 'Gentle': [1, 0.9, 1, 1.1, 1], 'Sassy': [1, 1, 1, 1.1, 0.9], 'Careful': [1, 1, 0.9, 1.1, 1], 'Quirky': [1, 1, 1, 1, 1]
        };

        const typeChart = {
            normal: { ghost: 0, rock: 0.5, steel: 0.5 },
            fire: { fire: 0.5, water: 0.5, grass: 2, ice: 2, bug: 2, rock: 0.5, dragon: 0.5, steel: 2 },
            water: { fire: 2, water: 0.5, grass: 0.5, ground: 2, rock: 2, dragon: 0.5 },
            grass: { fire: 0.5, water: 2, grass: 0.5, poison: 0.5, ground: 2, flying: 0.5, bug: 0.5, rock: 2, dragon: 0.5, steel: 0.5 },
            electric: { water: 2, grass: 0.5, electric: 0.5, ground: 0, flying: 2, dragon: 0.5 },
            ice: { fire: 0.5, water: 0.5, grass: 2, ice: 0.5, ground: 2, flying: 2, dragon: 2, steel: 0.5 },
            fighting: { normal: 2, ice: 2, poison: 0.5, flying: 0.5, psychic: 0.5, bug: 0.5, rock: 2, ghost: 0, dark: 2, steel: 2, fairy: 0.5 },
            poison: { grass: 2, poison: 0.5, ground: 0.5, rock: 0.5, ghost: 0.5, steel: 0, fairy: 2 },
            ground: { fire: 2, grass: 0.5, electric: 2, poison: 2, flying: 0, bug: 0.5, rock: 2, steel: 2 },
            flying: { grass: 2, electric: 0.5, fighting: 2, bug: 2, rock: 0.5, steel: 0.5 },
            psychic: { fighting: 2, poison: 2, psychic: 0.5, dark: 0, steel: 0.5 },
            bug: { fire: 0.5, grass: 2, fighting: 0.5, poison: 0.5, flying: 0.5, psychic: 2, ghost: 0.5, dark: 2, steel: 0.5, fairy: 0.5 },
            rock: { fire: 2, ice: 2, fighting: 0.5, ground: 0.5, flying: 2, bug: 2, steel: 0.5 },
            ghost: { normal: 0, fighting: 0, psychic: 2, ghost: 2, dark: 0.5 },
            dragon: { dragon: 2, steel: 0.5, fairy: 0 },
            dark: { fighting: 0.5, psychic: 2, ghost: 2, dark: 0.5, fairy: 0.5 },
            steel: { fire: 0.5, water: 0.5, electric: 0.5, ice: 2, rock: 2, steel: 0.5, fairy: 2 },
            fairy: { fighting: 2, poison: 0.5, dragon: 2, dark: 2, steel: 0.5 }
        };

        const SPREAD_MOVES = [
            'Rock Slide', 'Earthquake', 'Surf', 'Blizzard', 'Heat Wave', 'Muddy Water', 'Icy Wind', 'Dazzling Gleam', 'Discharge',
            'Eruption', 'Water Spout', 'Hyper Voice', 'Snarl', 'Origin Pulse', 'Precipice Blades', 'Glacial Lance', 'Astral Barrage'
        ];

        let targetBuild = { name: '', item: '', ability: '', nature: 'Hardy', level: 50, moves: [], evs: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 }, types: ['None'] };

        async function init() {
            try {
                const [pkmn, mvs, blds] = await Promise.all([
                    fetch('../assets/pokemon.json').then(res => res.json()),
                    fetch('../assets/moves.json').then(res => res.json()),
                    fetch('../assets/builds.json').then(res => res.json())
                ]);
                pokemonDB = pkmn; movesDB = mvs; buildsDB = blds;
                populateNatures();
                setupEventListeners();
                
                // Set initial state
                showImportView();
            } catch (e) { console.error("Load fail", e); }
        }

        function populateNatures() {
            const select = document.getElementById('target-nature');
            Object.keys(natureMap).forEach(n => { const opt = document.createElement('option'); opt.value = n; opt.innerText = n; select.appendChild(opt); });
        }

        function setupEventListeners() {
            document.getElementById('analyze-btn').addEventListener('click', analyze);
            document.getElementById('paste-input').addEventListener('input', (e) => { 
                if (e.target.value.trim().length > 10) {
                    parsePaste(e.target.value);
                }
            });

            // UI Mode Toggles
            document.getElementById('new-import-btn').addEventListener('click', showImportView);
            document.getElementById('edit-build-btn').addEventListener('click', showEditorView);
            document.getElementById('show-editor-btn').addEventListener('click', showEditorView);
            document.getElementById('cancel-editor-btn').addEventListener('click', () => {
                if (targetBuild.name) showPreviewView();
                else showImportView();
            });
            document.getElementById('save-editor-btn').addEventListener('click', () => {
                updateTargetFromUI();
                analyze();
            });

            const nameInput = document.getElementById('target-name');
            const searchResults = document.getElementById('search-results');
            nameInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                if (query.length < 2) { searchResults.style.display = 'none'; return; }
                const matches = pokemonDB.filter(p => (p.Name || p.name).toLowerCase().includes(query)).slice(0, 10);
                if (matches.length > 0) {
                    searchResults.innerHTML = matches.map(p => `<div class="search-item" data-name="${p.Name || p.name}"><span>${p.Name || p.name}</span> <span style="font-size: 0.7rem; color: var(--text-muted);">${p.Type_1}${p.Type_2 ? '/' + p.Type_2 : ''}</span></div>`).join('');
                    searchResults.style.display = 'block';
                } else searchResults.style.display = 'none';
            });

            searchResults.addEventListener('click', (e) => {
                const item = e.target.closest('.search-item');
                if (item) { loadPokemon(item.dataset.name); searchResults.style.display = 'none'; }
            });

            document.querySelectorAll('#editor-view input, #editor-view select').forEach(el => { 
                el.addEventListener('change', updateTargetFromUI); 
            });
        }

        /* UI State Management */
        function showImportView() {
            document.getElementById('import-view').style.display = 'block';
            document.getElementById('target-preview').classList.remove('active');
            document.getElementById('editor-view').style.display = 'none';
            document.getElementById('paste-input').value = '';
        }

        function showPreviewView() {
            document.getElementById('import-view').style.display = 'none';
            document.getElementById('target-preview').classList.add('active');
            document.getElementById('editor-view').style.display = 'none';
            updatePreviewCard();
        }

        function showEditorView() {
            document.getElementById('import-view').style.display = 'none';
            document.getElementById('target-preview').classList.remove('active');
            document.getElementById('editor-view').style.display = 'block';
        }

        function updatePreviewCard() {
            const data = pokemonDB.find(p => (p.Name || p.name) === targetBuild.name);
            document.getElementById('preview-species').innerText = targetBuild.name.toUpperCase();
            document.getElementById('preview-item').innerText = `Item: ${targetBuild.item || 'None'}`;
            
            const clean = targetBuild.name.toLowerCase().replace(/ /g, '-').replace(/\./g, '').replace(/[^a-z0-9-]/g, '');
            document.getElementById('preview-sprite').src = `https://play.pokemonshowdown.com/sprites/ani/${clean}.gif`;

            // Types
            const typeContainer = document.getElementById('preview-types');
            typeContainer.innerHTML = targetBuild.types.filter(t => t && t !== 'None').map(t => 
                `<span class="type-tag" style="background: var(--type-${t.toLowerCase()}); color: white;">${t}</span>`
            ).join('');

            // Stats
            const statsContainer = document.getElementById('preview-stats');
            const statLabels = { hp: 'HP', atk: 'ATK', def: 'DEF', spa: 'SPA', spd: 'SPD', spe: 'SPE' };
            
            // Calculate actual stats for display
            if (data) {
                const stats = {
                    hp: getStat(parseInt(data.HP), 31, targetBuild.evs.hp, 50, targetBuild.nature, 'hp'),
                    atk: getStat(parseInt(data.Attack), 31, targetBuild.evs.atk, 50, targetBuild.nature, 'atk'),
                    def: getStat(parseInt(data.Defense), 31, targetBuild.evs.def, 50, targetBuild.nature, 'def'),
                    spa: getStat(parseInt(data['Sp.Atk']), 31, targetBuild.evs.spa, 50, targetBuild.nature, 'spa'),
                    spd: getStat(parseInt(data['Sp.Def']), 31, targetBuild.evs.spd, 50, targetBuild.nature, 'spd'),
                    spe: getStat(parseInt(data.Speed), 31, targetBuild.evs.spe, 50, targetBuild.nature, 'spe')
                };

                statsContainer.innerHTML = Object.entries(statLabels).map(([key, label]) => {
                    const val = stats[key];
                    const percent = Math.min(100, (val / 250) * 100);
                    return `
                        <div class="stat-row-mini">
                            <span class="stat-label-mini">${label}</span>
                            <div class="stat-bar-mini"><div class="stat-fill-mini" style="width: ${percent}%;"></div></div>
                            <span class="stat-val-mini">${val}</span>
                        </div>
                    `;
                }).join('');
            }

            // Moves
            const movesContainer = document.getElementById('preview-moves');
            movesContainer.innerHTML = targetBuild.moves.map(m => `<div class="move-tag-mini">${m}</div>`).join('');
            for (let i = targetBuild.moves.length; i < 4; i++) {
                movesContainer.innerHTML += `<div class="move-tag-mini" style="opacity: 0.2;">-</div>`;
            }
        }

        function loadPokemon(name) {
            const data = pokemonDB.find(p => (p.Name || p.name) === name);
            if (!data) return;
            targetBuild.name = data.Name || data.name;
            targetBuild.types = [data.Type_1, data.Type_2 || 'None'];
            document.getElementById('target-name').value = targetBuild.name;
            updateSprite(targetBuild.name);
            updateTargetFromUI();
        }

        function updateSprite(name) {
            const clean = name.toLowerCase().replace(/ /g, '-').replace(/\./g, '').replace(/[^a-z0-9-]/g, '');
            document.getElementById('target-sprite').src = `https://play.pokemonshowdown.com/sprites/ani/${clean}.gif`;
        }

        function parsePaste(text) {
            const lines = text.split('\n'); if (lines.length < 1) return;
            const nameLine = lines[0].split('@');
            let name = nameLine[0].trim();
            if (name.includes('(')) name = name.substring(name.indexOf('(') + 1, name.indexOf(')')).trim();
            const pkData = pokemonDB.find(p => (p.Name || p.name).toLowerCase() === name.toLowerCase());
            if (pkData) {
                targetBuild.name = pkData.Name || pkData.name;
                targetBuild.types = [pkData.Type_1, pkData.Type_2 || 'None'];
                document.getElementById('target-name').value = targetBuild.name;
                updateSprite(targetBuild.name);
            }
            if (nameLine[1]) { targetBuild.item = nameLine[1].trim(); document.getElementById('target-item').value = targetBuild.item; }
            targetBuild.moves = [];
            targetBuild.evs = { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 };
            lines.forEach(l => {
                const line = l.trim();
                if (line.startsWith('Ability:')) { targetBuild.ability = line.replace('Ability:', '').trim(); document.getElementById('target-ability').value = targetBuild.ability; }
                if (line.startsWith('Level:')) { targetBuild.level = parseInt(line.replace('Level:', '')) || 50; document.getElementById('target-level').value = targetBuild.level; }
                if (line.match(/Nature$/)) { targetBuild.nature = line.replace('Nature', '').trim(); document.getElementById('target-nature').value = targetBuild.nature; }
                if (line.startsWith('EVs:')) {
                    line.replace('EVs:', '').trim().split('/').forEach(p => {
                        const s = p.trim().split(' ');
                        const val = parseInt(s[0]);
                        const stat = s[1].toLowerCase();
                        if (targetBuild.evs.hasOwnProperty(stat)) {
                            targetBuild.evs[stat] = val;
                            const input = document.querySelector(`.target-ev[data-stat="${stat}"]`);
                            if (input) input.value = val;
                        }
                    });
                }
                if (line.startsWith('- ')) targetBuild.moves.push(line.replace('- ', '').trim());
            });
            const moveInputs = document.querySelectorAll('.target-move');
            moveInputs.forEach((input, i) => { input.value = targetBuild.moves[i] || ''; });
            updateTargetFromUI();
        }

        function updateTargetFromUI() {
            targetBuild.name = document.getElementById('target-name').value;
            targetBuild.item = document.getElementById('target-item').value;
            targetBuild.ability = document.getElementById('target-ability').value;
            targetBuild.nature = document.getElementById('target-nature').value;
            targetBuild.level = parseInt(document.getElementById('target-level').value) || 50;
            targetBuild.moves = Array.from(document.querySelectorAll('.target-move')).map(i => i.value.trim()).filter(v => v !== '');
            document.querySelectorAll('.target-ev').forEach(el => { targetBuild.evs[el.dataset.stat] = parseInt(el.value) || 0; });
            const pkData = pokemonDB.find(p => (p.Name || p.name).toLowerCase() === targetBuild.name.toLowerCase());
            if (pkData) { targetBuild.types = [pkData.Type_1, pkData.Type_2 || 'None']; updateSprite(targetBuild.name); }
        }

        function getStat(base, iv, ev, level, nature, type) {
            if (type === 'hp') return Math.floor((2 * base + iv + Math.floor(ev / 4)) * level / 100) + level + 10;
            const stats = ['atk', 'def', 'spa', 'spd', 'spe'];
            const index = stats.indexOf(type);
            const natureMult = natureMap[nature] ? natureMap[nature][index] : 1;
            return Math.floor((Math.floor((2 * base + iv + Math.floor(ev / 4)) * level / 100) + 5) * natureMult);
        }

        async function analyze() {
            const btn = document.getElementById('analyze-btn');
            const loader = document.getElementById('analyze-loader');
            const resultsContainer = document.getElementById('counter-results');
            if (!targetBuild.name) return;
            
            btn.disabled = true; loader.style.display = 'block'; 
            resultsContainer.style.opacity = '0.4';

            await new Promise(r => setTimeout(r, 400));
            
            const targetData = pokemonDB.find(p => (p.Name || p.name).toLowerCase() === targetBuild.name.toLowerCase());
            if (!targetData) {
                btn.disabled = false; loader.style.display = 'none';
                return;
            }

            const targetStats = {
                hp: getStat(parseInt(targetData.HP), 31, targetBuild.evs.hp, 50, targetBuild.nature, 'hp'),
                atk: getStat(parseInt(targetData.Attack), 31, targetBuild.evs.atk, 50, targetBuild.nature, 'atk'),
                def: getStat(parseInt(targetData.Defense), 31, targetBuild.evs.def, 50, targetBuild.nature, 'def'),
                spa: getStat(parseInt(targetData['Sp.Atk']), 31, targetBuild.evs.spa, 50, targetBuild.nature, 'spa'),
                spd: getStat(parseInt(targetData['Sp.Def']), 31, targetBuild.evs.spd, 50, targetBuild.nature, 'spd'),
                spe: getStat(parseInt(targetData.Speed), 31, targetBuild.evs.spe, 50, targetBuild.nature, 'spe')
            };

            const counters = [];
            buildsDB.forEach(build => {
                if (build.pokemon === targetBuild.name) return;
                const candidateData = pokemonDB.find(p => (p.Name || p.name) === build.pokemon);
                if (!candidateData) return;
                const cBuildParsed = parseCandidateBuild(build.build, candidateData);
                const cStats = calculateCandidateStats(cBuildParsed, candidateData);
                let score = 0, points = [], dead = false, maxTook = 0;
                
                const targetMoves = targetBuild.moves.map(mName => movesDB.find(m => m.name.toLowerCase() === mName.toLowerCase())).filter(m => m);
                targetMoves.forEach(m => {
                    const moveType = m.type.toLowerCase();
                    const isSpecial = m.damage_class === 'Special';
                    const targetAtk = isSpecial ? targetStats.spa : targetStats.atk;
                    const candidateDef = isSpecial ? cStats.spd : cStats.def;
                    let typeMult = 1;
                    [candidateData.Type_1, candidateData.Type_2].filter(t => t && t !== 'None').forEach(ct => {
                        const eff = typeChart[moveType]?.[ct.toLowerCase()];
                        if (eff !== undefined) typeMult *= eff;
                    });
                    const stab = [targetData.Type_1, targetData.Type_2].includes(m.type) ? 1.5 : 1.0;
                    const estDmg = ( ( ( (2 * 50 / 5 + 2) * (m.power || 40) * targetAtk / candidateDef ) / 50 ) + 2 ) * stab * typeMult;
                    const tookPercent = (estDmg / cStats.hp) * 100;
                    if (tookPercent > maxTook) maxTook = tookPercent;
                });
                if (maxTook >= 100) dead = true;
                if (maxTook < 50) { score += 40; points.push(`Takes max ${Math.round(maxTook)}% from moves.`); }
                else if (maxTook < 85) { score += 20; points.push(`Can tank hits (${Math.round(maxTook)}% max).`); }
                
                let bestDealt = 0;
                const candidateMoves = cBuildParsed.moves.map(mName => movesDB.find(m => m.name.toLowerCase() === mName.toLowerCase())).filter(m => m);
                candidateMoves.forEach(m => {
                    const moveType = m.type.toLowerCase();
                    const isSpecial = m.damage_class === 'Special';
                    const candAtk = isSpecial ? cStats.spa : cStats.atk;
                    const targetDef = isSpecial ? targetStats.spd : targetStats.def;
                    let typeMult = 1;
                    [targetData.Type_1, targetData.Type_2].filter(t => t && t !== 'None').forEach(tt => {
                        const eff = typeChart[moveType]?.[tt.toLowerCase()];
                        if (eff !== undefined) typeMult *= eff;
                    });
                    const stab = [candidateData.Type_1, candidateData.Type_2].includes(m.type) ? 1.5 : 1.0;
                    const estDmg = ( ( ( (2 * 50 / 5 + 2) * (m.power || 40) * candAtk / targetDef ) / 50 ) + 2 ) * stab * typeMult;
                    const dealtPercent = (estDmg / targetStats.hp) * 100;
                    if (dealtPercent > bestDealt) bestDealt = dealtPercent;
                });

                if (bestDealt >= 100) { score += 45; points.push(`Guaranteed OHKO (${Math.round(bestDealt)}%).`); }
                else if (bestDealt >= 50) { score += 25; points.push(`Solid 2HKO pressure (${Math.round(bestDealt)}%).`); }
                
                if (cStats.spe > targetStats.spe) { score += 15; points.push(`Outspeeds (${cStats.spe} > ${targetStats.spe}).`); }
                
                if (score > 35 && !dead) counters.push({ ...build, score: Math.min(100, Math.round(score)), points });
            });

            counters.sort((a, b) => b.score - a.score);
            loader.style.display = 'none'; btn.disabled = false;
            resultsContainer.style.opacity = '1';
            
            showPreviewView();
            renderResults(counters.slice(0, 15));
        }

        function parseCandidateBuild(buildStr, pData) {
            const build = { types: [pData.Type_1, pData.Type_2 || 'None'], moves: [], evs: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 }, nature: 'Hardy', item: '' };
            buildStr.split('\n').forEach(l => {
                const line = l.trim();
                if (line.includes('@')) build.item = line.split('@')[1].trim();
                if (line.startsWith('Ability:')) build.ability = line.replace('Ability:', '').trim();
                if (line.match(/Nature$/)) build.nature = line.replace('Nature', '').trim();
                if (line.startsWith('- ')) build.moves.push(line.replace('- ', '').trim());
                if (line.startsWith('EVs:')) {
                    line.replace('EVs:', '').trim().split('/').forEach(p => {
                        const s = p.trim().split(' ');
                        const val = parseInt(s[0]);
                        const stat = s[1].toLowerCase();
                        if (build.evs.hasOwnProperty(stat)) build.evs[stat] = val;
                    });
                }
            });
            return build;
        }

        function calculateCandidateStats(build, pData) {
            const stats = {
                hp: getStat(parseInt(pData.HP), 31, build.evs.hp, 50, build.nature, 'hp'),
                atk: getStat(parseInt(pData.Attack), 31, build.evs.atk, 50, build.nature, 'atk'),
                def: getStat(parseInt(pData.Defense), 31, build.evs.def, 50, build.nature, 'def'),
                spa: getStat(parseInt(pData['Sp.Atk']), 31, build.evs.spa, 50, build.nature, 'spa'),
                spd: getStat(parseInt(pData['Sp.Def']), 31, build.evs.spd, 50, build.nature, 'spd'),
                spe: getStat(parseInt(pData.Speed), 31, build.evs.spe, 50, build.nature, 'spe'),
            };
            if (build.item === 'Choice Scarf') stats.spe = Math.floor(stats.spe * 1.5);
            return stats;
        }

        function renderResults(counters) {
            const container = document.getElementById('counter-results');
            document.getElementById('results-count').innerText = `${counters.length} RESULTS FOUND`;
            
            if (counters.length === 0) { 
                container.innerHTML = '<div class="placeholder-text">No strong counters found for this specific build.</div>'; 
                return; 
            }

            container.innerHTML = counters.map((c, i) => {
                const clean = c.pokemon.toLowerCase().replace(/ /g, '-').replace(/\./g, '').replace(/[^a-z0-9-]/g, '');
                return `
                <div class="counter-card-premium fade-in" style="animation-delay: ${i * 0.05}s">
                    <div class="counter-score-badge">${c.score}% EFFECTIVE</div>
                    
                    <div class="counter-header-premium">
                        <img src="https://play.pokemonshowdown.com/sprites/ani/${clean}.gif" class="counter-sprite-premium">
                        <div class="counter-meta-premium">
                            <h4>${c.pokemon}</h4>
                            <div style="font-size: 0.65rem; color: var(--primary-yellow); font-weight: 800; letter-spacing: 0.5px;">
                                ${c.format.toUpperCase()} ${c.role || 'COUNTER'}
                            </div>
                        </div>
                    </div>

                    <div class="rationale-list-premium">
                        ${c.points.map(p => `
                            <div class="rationale-item-premium">
                                <span class="rationale-icon">✓</span>
                                <span>${p}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div id="build-${i}" class="build-raw-premium">${c.build}</div>
                    <button class="build-btn-premium" onclick="toggleBuild(${i})">View Matchup Build</button>
                </div>
            `}).join('');
        }

        function toggleBuild(id) {
            const el = document.getElementById(`build-${id}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        init();
    </script>
</body>
