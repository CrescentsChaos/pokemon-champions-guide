<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Tool | Pokemon Champions Guide</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root {
            --input-bg: rgba(0, 0, 0, 0.2);
            --focus-border: var(--primary-red);
        }

        body {
            padding-top: 100px;
            background: radial-gradient(circle at top right, rgba(255, 62, 62, 0.1), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(255, 204, 0, 0.05), #0a0a0c 100%);
        }

        .counter-container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .counter-container {
                grid-template-columns: 1fr;
            }
        }

        .builder-column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: sticky;
            top: 120px;
        }

        .import-area {
            width: 100%;
            height: 15rem;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            resize: vertical;
            transition: var(--transition);
        }

        .import-area:focus {
            outline: none;
            border-color: var(--focus-border);
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.2);
        }

        .target-editor {
            padding: 1.5rem;
        }

        .target-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .target-sprite {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .target-name-input {
            font-size: 1.5rem;
            font-weight: 800;
            background: none;
            border: none;
            border-bottom: 2px solid var(--glass-border);
            color: white;
            width: 100%;
            padding: 0.2rem 0;
            text-transform: uppercase;
        }

        .target-name-input:focus {
            outline: none;
            border-color: var(--primary-red);
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .editor-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .editor-field label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .editor-field select, .editor-field input {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 0.5rem;
            color: white;
            font-size: 0.85rem;
        }

        .results-column {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 600px) {
            .counter-grid {
                grid-template-columns: 1fr;
            }
        }

        .counter-card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border-left: 4px solid var(--primary-red);
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .counter-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .counter-mini-sprite {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .counter-name {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .counter-score {
            background: var(--primary-red);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 900;
            box-shadow: var(--accent-glow);
        }

        .counter-rationale {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
        }

        .rationale-point {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
        }

        .rationale-point::before {
            content: '•';
            color: var(--primary-red);
            font-weight: bold;
        }

        .counter-build-preview {
            display: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            white-space: pre-wrap;
            border-top: 1px solid var(--glass-border);
            padding-top: 0.5rem;
        }

        .show-build-btn {
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.7rem;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            width: fit-content;
            transition: var(--transition);
        }

        .show-build-btn:hover {
            border-color: white;
            color: white;
        }

        .analyze-btn {
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            margin-top: 1rem;
        }

        .stat-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #000;
            margin-right: 4px;
        }

        .placeholder-text {
            color: var(--text-muted);
            text-align: center;
            padding: 4rem;
            font-style: italic;
        }

        /* Search Results for target name */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #151518;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .search-item {
            padding: 0.8rem 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .search-item:hover {
            background: var(--primary-red);
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="section-title fade-in">
            <h2>Counter Tool</h2>
            <p>Paste a build to find the most effective counters from our championship library.</p>
        </div>

        <div class="counter-container">
            <!-- Left: Builder/Import -->
            <div class="builder-column">
                <div class="glass" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; font-size: 0.9rem;">Import Build</h3>
                    <textarea id="paste-input" class="import-area" placeholder="Paste PokePaste here..."></textarea>
                    <button id="analyze-btn" class="btn analyze-btn">
                        <span>ANALYZE COUNTERS</span>
                        <div class="loader" id="analyze-loader" style="display: none; width: 18px; height: 18px; border-width: 2px;"></div>
                    </button>
                </div>

                <div class="glass target-editor" id="target-editor">
                    <div class="target-header">
                        <img src="https://play.pokemonshowdown.com/sprites/ani/substitute.gif" alt="Target" class="target-sprite" id="target-sprite">
                        <div style="flex: 1; position: relative;">
                            <input type="text" id="target-name" class="target-name-input" placeholder="POKEMON NAME">
                            <div id="search-results" class="search-results"></div>
                        </div>
                    </div>

                    <div class="editor-grid">
                        <div class="editor-field">
                            <label>Item</label>
                            <input type="text" id="target-item" placeholder="None">
                        </div>
                        <div class="editor-field">
                            <label>Ability</label>
                            <input type="text" id="target-ability" placeholder="None">
                        </div>
                        <div class="editor-field">
                            <label>Nature</label>
                            <select id="target-nature"></select>
                        </div>
                        <div class="editor-field">
                            <label>Level</label>
                            <input type="number" id="target-level" value="50">
                        </div>
                    </div>

                    <div style="margin-top: 1.5rem;">
                        <label style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Moves</label>
                        <div class="editor-grid" style="margin-top: 0.5rem;" id="target-moves-container">
                            <input type="text" class="target-move" placeholder="Move 1">
                            <input type="text" class="target-move" placeholder="Move 2">
                            <input type="text" class="target-move" placeholder="Move 3">
                            <input type="text" class="target-move" placeholder="Move 4">
                        </div>
                    </div>

                    <div style="margin-top: 1.5rem;">
                        <label style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">EVs</label>
                        <div class="editor-grid" style="grid-template-columns: repeat(3, 1fr); margin-top: 0.5rem;">
                            <div class="editor-field">
                                <label>HP</label>
                                <input type="number" class="target-ev" data-stat="hp" value="0">
                            </div>
                            <div class="editor-field">
                                <label>Atk</label>
                                <input type="number" class="target-ev" data-stat="atk" value="0">
                            </div>
                            <div class="editor-field">
                                <label>Def</label>
                                <input type="number" class="target-ev" data-stat="def" value="0">
                            </div>
                            <div class="editor-field">
                                <label>SpA</label>
                                <input type="number" class="target-ev" data-stat="spa" value="0">
                            </div>
                            <div class="editor-field">
                                <label>SpD</label>
                                <input type="number" class="target-ev" data-stat="spd" value="0">
                            </div>
                            <div class="editor-field">
                                <label>Spe</label>
                                <input type="number" class="target-ev" data-stat="spe" value="0">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Results -->
            <div class="results-column">
                <div class="results-header">
                    <h3 id="results-title">Recommended Counters</h3>
                    <span id="results-count" style="font-size: 0.8rem; color: var(--text-muted);">0 found</span>
                </div>

                <div id="counter-results" class="counter-grid">
                    <div class="placeholder-text">Paste a build or enter a Pokémon to see counters here.</div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script>
        // Data and Constants
        let pokemonDB = [];
        let movesDB = [];
        let buildsDB = [];

        const natureMap = {
            'Hardy': [1, 1, 1, 1, 1], 'Lonely': [1.1, 0.9, 1, 1, 1], 'Brave': [1.1, 1, 1, 1, 0.9], 'Adamant': [1.1, 1, 0.9, 1, 1], 'Naughty': [1.1, 1, 1, 0.9, 1],
            'Bold': [0.9, 1.1, 1, 1, 1], 'Docile': [1, 1, 1, 1, 1], 'Relaxed': [1, 1.1, 1, 1, 0.9], 'Impish': [1, 1.1, 0.9, 1, 1], 'Lax': [1, 1.1, 1, 0.9, 1],
            'Timid': [0.9, 1, 1, 1, 1.1], 'Hasty': [1, 0.9, 1, 1, 1.1], 'Serious': [1, 1, 1, 1, 1], 'Jolly': [1, 1, 0.9, 1, 1.1], 'Naive': [1, 1, 1, 0.9, 1.1],
            'Modest': [0.9, 1, 1.1, 1, 1], 'Mild': [1, 0.9, 1.1, 1, 1], 'Quiet': [1, 1, 1.1, 1, 0.9], 'Bashful': [1, 1, 1, 1, 1], 'Rash': [1, 1, 1.1, 0.9, 1],
            'Calm': [0.9, 1, 1, 1.1, 1], 'Gentle': [1, 0.9, 1, 1.1, 1], 'Sassy': [1, 1, 1, 1.1, 0.9], 'Careful': [1, 1, 0.9, 1.1, 1], 'Quirky': [1, 1, 1, 1, 1]
        };

        const typeChart = {
            normal: { ghost: 0, rock: 0.5, steel: 0.5 },
            fire: { fire: 0.5, water: 0.5, grass: 2, ice: 2, bug: 2, rock: 0.5, dragon: 0.5, steel: 2 },
            water: { fire: 2, water: 0.5, grass: 0.5, ground: 2, rock: 2, dragon: 0.5 },
            grass: { fire: 0.5, water: 2, grass: 0.5, poison: 0.5, ground: 2, flying: 0.5, bug: 0.5, rock: 2, dragon: 0.5, steel: 0.5 },
            electric: { water: 2, grass: 0.5, electric: 0.5, ground: 0, flying: 2, dragon: 0.5 },
            ice: { fire: 0.5, water: 0.5, grass: 2, ice: 0.5, ground: 2, flying: 2, dragon: 2, steel: 0.5 },
            fighting: { normal: 2, ice: 2, poison: 0.5, flying: 0.5, psychic: 0.5, bug: 0.5, rock: 2, ghost: 0, dark: 2, steel: 2, fairy: 0.5 },
            poison: { grass: 2, poison: 0.5, ground: 0.5, rock: 0.5, ghost: 0.5, steel: 0, fairy: 2 },
            ground: { fire: 2, grass: 0.5, electric: 2, poison: 2, flying: 0, bug: 0.5, rock: 2, steel: 2 },
            flying: { grass: 2, electric: 0.5, fighting: 2, bug: 2, rock: 0.5, steel: 0.5 },
            psychic: { fighting: 2, poison: 2, psychic: 0.5, dark: 0, steel: 0.5 },
            bug: { fire: 0.5, grass: 2, fighting: 0.5, poison: 0.5, flying: 0.5, psychic: 2, ghost: 0.5, dark: 2, steel: 0.5, fairy: 0.5 },
            rock: { fire: 2, ice: 2, fighting: 0.5, ground: 0.5, flying: 2, bug: 2, steel: 0.5 },
            ghost: { normal: 0, fighting: 0, psychic: 2, ghost: 2, dark: 0.5 },
            dragon: { dragon: 2, steel: 0.5, fairy: 0 },
            dark: { fighting: 0.5, psychic: 2, ghost: 2, dark: 0.5, fairy: 0.5 },
            steel: { fire: 0.5, water: 0.5, electric: 0.5, ice: 2, rock: 2, steel: 0.5, fairy: 2 },
            fairy: { fighting: 2, poison: 0.5, dragon: 2, dark: 2, steel: 0.5 }
        };

        const SPREAD_MOVES = [
            'Rock Slide', 'Earthquake', 'Surf', 'Blizzard', 'Heat Wave', 'Muddy Water', 'Icy Wind', 'Dazzling Gleam', 'Discharge',
            'Eruption', 'Water Spout', 'Hyper Voice', 'Snarl', 'Origin Pulse', 'Precipice Blades', 'Glacial Lance', 'Astral Barrage'
        ];

        let targetBuild = { name: '', item: '', ability: '', nature: 'Hardy', level: 50, moves: [], evs: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 }, types: ['None'] };

        async function init() {
            try {
                const [pkmn, mvs, blds] = await Promise.all([
                    fetch('../assets/pokemon.json').then(res => res.json()),
                    fetch('../assets/moves.json').then(res => res.json()),
                    fetch('../assets/builds.json').then(res => res.json())
                ]);
                pokemonDB = pkmn; movesDB = mvs; buildsDB = blds;
                populateNatures();
                setupEventListeners();
                document.getElementById('analyze-loader').style.display = 'none';
            } catch (e) { console.error("Load fail", e); }
        }

        function populateNatures() {
            const select = document.getElementById('target-nature');
            Object.keys(natureMap).forEach(n => { const opt = document.createElement('option'); opt.value = n; opt.innerText = n; select.appendChild(opt); });
        }

        function setupEventListeners() {
            document.getElementById('analyze-btn').addEventListener('click', analyze);
            document.getElementById('paste-input').addEventListener('input', (e) => { if (e.target.value.trim().length > 10) parsePaste(e.target.value); });
            const nameInput = document.getElementById('target-name');
            const searchResults = document.getElementById('search-results');
            nameInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                if (query.length < 2) { searchResults.style.display = 'none'; return; }
                const matches = pokemonDB.filter(p => (p.Name || p.name).toLowerCase().includes(query)).slice(0, 10);
                if (matches.length > 0) {
                    searchResults.innerHTML = matches.map(p => `<div class="search-item" data-name="${p.Name || p.name}"><span>${p.Name || p.name}</span> <span style="font-size: 0.7rem; color: var(--text-muted);">${p.Type_1}${p.Type_2 ? '/' + p.Type_2 : ''}</span></div>`).join('');
                    searchResults.style.display = 'block';
                } else searchResults.style.display = 'none';
            });
            searchResults.addEventListener('click', (e) => {
                const item = e.target.closest('.search-item');
                if (item) { loadPokemon(item.dataset.name); searchResults.style.display = 'none'; }
            });
            document.querySelectorAll('#target-editor input, #target-editor select').forEach(el => { el.addEventListener('change', updateTargetFromUI); });
        }

        function loadPokemon(name) {
            const data = pokemonDB.find(p => (p.Name || p.name) === name);
            if (!data) return;
            targetBuild.name = data.Name || data.name;
            targetBuild.types = [data.Type_1, data.Type_2 || 'None'];
            document.getElementById('target-name').value = targetBuild.name;
            updateSprite(targetBuild.name);
            updateTargetFromUI();
        }

        function updateSprite(name) {
            const clean = name.toLowerCase().replace(/ /g, '-').replace(/\./g, '').replace(/[^a-z0-9-]/g, '');
            document.getElementById('target-sprite').src = `https://play.pokemonshowdown.com/sprites/ani/${clean}.gif`;
        }

        function parsePaste(text) {
            const lines = text.split('\n'); if (lines.length < 1) return;
            const nameLine = lines[0].split('@');
            let name = nameLine[0].trim();
            if (name.includes('(')) name = name.substring(name.indexOf('(') + 1, name.indexOf(')')).trim();
            const pkData = pokemonDB.find(p => (p.Name || p.name).toLowerCase() === name.toLowerCase());
            if (pkData) {
                targetBuild.name = pkData.Name || pkData.name;
                targetBuild.types = [pkData.Type_1, pkData.Type_2 || 'None'];
                document.getElementById('target-name').value = targetBuild.name;
                updateSprite(targetBuild.name);
            }
            if (nameLine[1]) { targetBuild.item = nameLine[1].trim(); document.getElementById('target-item').value = targetBuild.item; }
            targetBuild.moves = [];
            targetBuild.evs = { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 };
            lines.forEach(l => {
                const line = l.trim();
                if (line.startsWith('Ability:')) { targetBuild.ability = line.replace('Ability:', '').trim(); document.getElementById('target-ability').value = targetBuild.ability; }
                if (line.startsWith('Level:')) { targetBuild.level = parseInt(line.replace('Level:', '')) || 50; document.getElementById('target-level').value = targetBuild.level; }
                if (line.match(/Nature$/)) { targetBuild.nature = line.replace('Nature', '').trim(); document.getElementById('target-nature').value = targetBuild.nature; }
                if (line.startsWith('EVs:')) {
                    line.replace('EVs:', '').trim().split('/').forEach(p => {
                        const s = p.trim().split(' ');
                        const val = parseInt(s[0]);
                        const stat = s[1].toLowerCase();
                        if (targetBuild.evs.hasOwnProperty(stat)) {
                            targetBuild.evs[stat] = val;
                            const input = document.querySelector(`.target-ev[data-stat="${stat}"]`);
                            if (input) input.value = val;
                        }
                    });
                }
                if (line.startsWith('- ')) targetBuild.moves.push(line.replace('- ', '').trim());
            });
            const moveInputs = document.querySelectorAll('.target-move');
            moveInputs.forEach((input, i) => { input.value = targetBuild.moves[i] || ''; });
            updateTargetFromUI();
        }

        function updateTargetFromUI() {
            targetBuild.name = document.getElementById('target-name').value;
            targetBuild.item = document.getElementById('target-item').value;
            targetBuild.ability = document.getElementById('target-ability').value;
            targetBuild.nature = document.getElementById('target-nature').value;
            targetBuild.level = parseInt(document.getElementById('target-level').value) || 50;
            targetBuild.moves = Array.from(document.querySelectorAll('.target-move')).map(i => i.value.trim()).filter(v => v !== '');
            document.querySelectorAll('.target-ev').forEach(el => { targetBuild.evs[el.dataset.stat] = parseInt(el.value) || 0; });
            const pkData = pokemonDB.find(p => (p.Name || p.name).toLowerCase() === targetBuild.name.toLowerCase());
            if (pkData) { targetBuild.types = [pkData.Type_1, pkData.Type_2 || 'None']; updateSprite(targetBuild.name); }
        }

        function getStat(base, iv, ev, level, nature, type) {
            if (type === 'hp') return Math.floor((2 * base + iv + Math.floor(ev / 4)) * level / 100) + level + 10;
            const stats = ['atk', 'def', 'spa', 'spd', 'spe'];
            const index = stats.indexOf(type);
            const natureMult = natureMap[nature] ? natureMap[nature][index] : 1;
            return Math.floor((Math.floor((2 * base + iv + Math.floor(ev / 4)) * level / 100) + 5) * natureMult);
        }

        async function analyze() {
            const btn = document.getElementById('analyze-btn');
            const loader = document.getElementById('analyze-loader');
            const resultsContainer = document.getElementById('counter-results');
            if (!targetBuild.name) return;
            btn.disabled = true; loader.style.display = 'block'; resultsContainer.innerHTML = '';
            await new Promise(r => setTimeout(r, 100));
            const targetData = pokemonDB.find(p => (p.Name || p.name).toLowerCase() === targetBuild.name.toLowerCase());
            const targetStats = {
                hp: getStat(parseInt(targetData.HP), 31, targetBuild.evs.hp, 50, targetBuild.nature, 'hp'),
                atk: getStat(parseInt(targetData.Attack), 31, targetBuild.evs.atk, 50, targetBuild.nature, 'atk'),
                def: getStat(parseInt(targetData.Defense), 31, targetBuild.evs.def, 50, targetBuild.nature, 'def'),
                spa: getStat(parseInt(targetData['Sp.Atk']), 31, targetBuild.evs.spa, 50, targetBuild.nature, 'spa'),
                spd: getStat(parseInt(targetData['Sp.Def']), 31, targetBuild.evs.spd, 50, targetBuild.nature, 'spd'),
                spe: getStat(parseInt(targetData.Speed), 31, targetBuild.evs.spe, 50, targetBuild.nature, 'spe')
            };
            const counters = [];
            buildsDB.forEach(build => {
                if (build.pokemon === targetBuild.name) return;
                const candidateData = pokemonDB.find(p => (p.Name || p.name) === build.pokemon);
                if (!candidateData) return;
                const cBuildParsed = parseCandidateBuild(build.build, candidateData);
                const cStats = calculateCandidateStats(cBuildParsed, candidateData);
                let score = 0, points = [], dead = false, maxTook = 0;
                const targetMoves = targetBuild.moves.map(mName => movesDB.find(m => m.name === mName)).filter(m => m);
                targetMoves.forEach(m => {
                    const moveType = m.type.toLowerCase();
                    const isSpecial = m.damage_class === 'Special';
                    const targetAtk = isSpecial ? targetStats.spa : targetStats.atk;
                    const candidateDef = isSpecial ? cStats.spd : cStats.def;
                    let typeMult = 1;
                    [candidateData.Type_1, candidateData.Type_2].filter(t => t && t !== 'None').forEach(ct => {
                        const eff = typeChart[moveType]?.[ct.toLowerCase()];
                        if (eff !== undefined) typeMult *= eff;
                    });
                    const stab = [targetData.Type_1, targetData.Type_2].includes(m.type) ? 1.5 : 1.0;
                    const estDmg = ( ( ( (2 * 50 / 5 + 2) * (m.power || 40) * targetAtk / candidateDef ) / 50 ) + 2 ) * stab * typeMult;
                    const tookPercent = (estDmg / cStats.hp) * 100;
                    if (tookPercent > maxTook) maxTook = tookPercent;
                });
                if (maxTook >= 100) dead = true;
                if (dead) score -= 100;
                else if (maxTook < 50) { score += 40; points.push(`Defensive: Takes max ${Math.round(maxTook)}% from ${targetBuild.name}.`); }
                else if (maxTook < 85) { score += 20; points.push(`Survival: Can tank hits (${Math.round(maxTook)}% max).`); }
                let bestDealt = 0;
                const candidateMoves = cBuildParsed.moves.map(mName => movesDB.find(m => m.name === mName)).filter(m => m);
                candidateMoves.forEach(m => {
                    const moveType = m.type.toLowerCase();
                    const isSpecial = m.damage_class === 'Special';
                    const candAtk = isSpecial ? cStats.spa : cStats.atk;
                    const targetDef = isSpecial ? targetStats.spd : targetStats.def;
                    let typeMult = 1;
                    [targetData.Type_1, targetData.Type_2].filter(t => t && t !== 'None').forEach(tt => {
                        const eff = typeChart[moveType]?.[tt.toLowerCase()];
                        if (eff !== undefined) typeMult *= eff;
                    });
                    const stab = [candidateData.Type_1, candidateData.Type_2].includes(m.type) ? 1.5 : 1.0;
                    const estDmg = ( ( ( (2 * 50 / 5 + 2) * (m.power || 40) * candAtk / targetDef ) / 50 ) + 2 ) * stab * typeMult;
                    const dealtPercent = (estDmg / targetStats.hp) * 100;
                    if (dealtPercent > bestDealt) bestDealt = dealtPercent;
                });
                if (bestDealt >= 100) { score += 45; points.push(`Offensive: Guaranteed OHKO or high damage (${Math.round(bestDealt)}%).`); }
                else if (bestDealt >= 50) { score += 25; points.push(`Damage: Solid 2HKO pressure (${Math.round(bestDealt)}%).`); }
                if (cStats.spe > targetStats.spe) { score += 15; points.push(`Speed: Outspeeds Target (${cStats.spe} > ${targetStats.spe}).`); }
                if (score > 35 && !dead) counters.push({ ...build, score: Math.min(100, Math.round(score)), points });
            });
            counters.sort((a, b) => b.score - a.score);
            loader.style.display = 'none'; btn.disabled = false;
            renderResults(counters.slice(0, 15));
        }

        function parseCandidateBuild(buildStr, pData) {
            const build = { types: [pData.Type_1, pData.Type_2 || 'None'], moves: [], evs: { hp: 0, atk: 0, def: 0, spa: 0, spd: 0, spe: 0 }, nature: 'Hardy', item: '' };
            buildStr.split('\n').forEach(l => {
                const line = l.trim();
                if (line.includes('@')) build.item = line.split('@')[1].trim();
                if (line.startsWith('Ability:')) build.ability = line.replace('Ability:', '').trim();
                if (line.match(/Nature$/)) build.nature = line.replace('Nature', '').trim();
                if (line.startsWith('- ')) build.moves.push(line.replace('- ', '').trim());
                if (line.startsWith('EVs:')) {
                    line.replace('EVs:', '').trim().split('/').forEach(p => {
                        const s = p.trim().split(' ');
                        const val = parseInt(s[0]);
                        const stat = s[1].toLowerCase();
                        if (build.evs.hasOwnProperty(stat)) build.evs[stat] = val;
                    });
                }
            });
            return build;
        }

        function calculateCandidateStats(build, pData) {
            const stats = {
                hp: getStat(parseInt(pData.HP), 31, build.evs.hp, 50, build.nature, 'hp'),
                atk: getStat(parseInt(pData.Attack), 31, build.evs.atk, 50, build.nature, 'atk'),
                def: getStat(parseInt(pData.Defense), 31, build.evs.def, 50, build.nature, 'def'),
                spa: getStat(parseInt(pData['Sp.Atk']), 31, build.evs.spa, 50, build.nature, 'spa'),
                spd: getStat(parseInt(pData['Sp.Def']), 31, build.evs.spd, 50, build.nature, 'spd'),
                spe: getStat(parseInt(pData.Speed), 31, build.evs.spe, 50, build.nature, 'spe'),
            };
            if (build.item === 'Choice Scarf') stats.spe = Math.floor(stats.spe * 1.5);
            return stats;
        }

        function renderResults(counters) {
            const container = document.getElementById('counter-results');
            document.getElementById('results-count').innerText = `${counters.length} found`;
            if (counters.length === 0) { container.innerHTML = '<div class="placeholder-text">No strong counters found.</div>'; return; }
            container.innerHTML = counters.map((c, i) => {
                const clean = c.pokemon.toLowerCase().replace(/ /g, '-').replace(/\./g, '').replace(/[^a-z0-9-]/g, '');
                return `
                <div class="glass counter-card">
                    <div class="counter-card-header">
                        <div class="counter-info">
                            <img src="https://play.pokemonshowdown.com/sprites/ani/${clean}.gif" class="counter-mini-sprite">
                            <div>
                                <div class="counter-name">${c.pokemon}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted);">${c.format.toUpperCase()} ${c.role || 'BUILD'}</div>
                            </div>
                        </div>
                        <div class="counter-score">${c.score}% MATCH</div>
                    </div>
                    <div class="counter-rationale">
                        ${c.points.map(p => `<div class="rationale-point">${p}</div>`).join('')}
                    </div>
                    <div id="build-${i}" class="counter-build-preview">${c.build}</div>
                    <button class="show-build-btn" onclick="toggleBuild(${i})">VIEW FULL BUILD</button>
                </div>
            `}).join('');
        }

        function toggleBuild(id) {
            const el = document.getElementById(`build-${id}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        init();
    </script>
</body>
