<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex | Pokemon Champions Guide</title>
    <meta name="description" content="Champions Pokédex — browse eligible Pokémon, stats, abilities, and moves for the Champions format.">
    <link rel="icon" type="image/png" href="../assets/champions-logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dex.css">
</head>
<body class="dex-page">
    <section class="dex-shell">
        <div class="container">
            <header class="dex-header fade-in">
                <h1>Poké<em>dex</em></h1>
                <p>Search, filter, and sort every Pokémon in the dataset — stats, abilities, moves, items, and Champions availability.</p>
            </header>
            <div id="dex-nav-slot"></div>

            <div class="dex-toolbar fade-in">
                <div class="dex-search-row">
                    <input type="search" id="dex-search" class="dex-search" placeholder="Search name, type, generation, ability…" autocomplete="off">
                    <button type="button" id="view-toggle" class="dex-select" style="cursor:pointer;">Compact View</button>
                </div>
                <div class="dex-filters-row">
                    <span class="dex-label">Sort</span>
                    <select id="sort-primary" class="dex-select">
                        <option value="id">Dex #</option>
                        <option value="name">Name</option>
                        <option value="total">Total BST</option>
                        <option value="hp">HP</option>
                        <option value="atk">Attack</option>
                        <option value="def">Defense</option>
                        <option value="spa">Sp. Atk</option>
                        <option value="spd">Sp. Def</option>
                        <option value="spe">Speed</option>
                        <option value="weight">Weight</option>
                        <option value="height">Height</option>
                        <option value="gen">Generation</option>
                        <option value="type">Primary Type</option>
                    </select>
                    <select id="sort-dir" class="dex-select">
                        <option value="asc">Ascending</option>
                        <option value="desc" selected>Descending</option>
                    </select>
                    <span class="dex-label">Group</span>
                    <select id="sort-group" class="dex-select">
                        <option value="none" selected>None</option>
                        <option value="type">By Type</option>
                        <option value="gen">By Generation</option>
                    </select>
                </div>
                <div class="dex-filters-row">
                    <span class="dex-label">Filter</span>
                    <select id="filter-type" class="dex-select"><option value="">All Types</option></select>
                    <select id="filter-gen" class="dex-select"><option value="">All Generations</option></select>
                    <input type="text" id="filter-ability" class="dex-select" placeholder="Ability…" style="min-width:140px;">
                    <input type="text" id="filter-move" class="dex-select" placeholder="Move…" style="min-width:140px;">
                    <label class="dex-check"><input type="checkbox" id="filter-champions" checked> Champions only</label>
                    <label class="dex-check"><input type="checkbox" id="filter-legendary"> Legendary / Mythical</label>
                </div>
            </div>

            <p id="dex-results-meta" class="dex-results-meta"></p>
            <div id="dex-grid" class="dex-grid"></div>
            <div id="dex-sentinel" class="dex-sentinel"><div class="loader" style="display:none;"></div></div>
        </div>
    </section>

    <div id="dex-detail-modal" class="modal-overlay dex-detail-modal" role="dialog" aria-modal="true" aria-labelledby="pkd-detail-title" aria-hidden="true">
        <div class="modal-content pkd-modal-content">
            <button type="button" class="close-modal pkd-close" id="dex-close-modal" aria-label="Close Pokémon details">&times;</button>
            <div id="dex-modal-body"></div>
        </div>
    </div>

    <script src="../js/dex-shared.js"></script>
    <script src="../js/dex/pokedex.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
