<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Pokedex | Pokemon Champions Guide</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .search-container {
            width: 100%;
            margin-bottom: 4rem;
        }

        .search-input {
            width: 100%;
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1.25rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary-red);
            box-shadow: var(--accent-glow);
        }

        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .pokedex-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pokedex-card:hover {
            border-color: var(--primary-red);
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .pokemon-number {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.05);
            position: absolute;
            top: 0.5rem;
            right: 1rem;
        }

        .pokemon-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
        }
    </style>
</head>

<body>

    <section style="padding-top: 10rem; min-height: 100vh;">
        <div class="container">
            <div class="section-title fade-in">
                <h2 style="font-size: 4rem;">ELITE <span style="color: var(--primary-red)">POKEDEX</span></h2>
                <p>Fast, high-performance database optimized for competitive lookup.</p>
            </div>

            <div class="search-container fade-in">
                <input type="text" id="pokedex-search" class="search-input"
                    placeholder="Search by name, type, or generation...">
            </div>

            <div id="pokedex-grid" class="pokemon-grid">
                <!-- Dynamic cards will be injected here -->
            </div>

            <div id="sentinel" style="height: 50px; display: flex; align-items: center; justify-content: center;">
                <div class="loader" id="loader" style="display: none;"></div>
            </div>
        </div>
    </section>

    <!-- Pokemon Detail Modal -->
    <div id="pokemon-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" id="close-modal">&times;</button>
            <div id="modal-body">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        let allPokemon = [];
        let filteredPokemon = [];
        let allMoves = [];
        const ITEMS_PER_PAGE = 24;
        let currentPage = 0;
        let isLoading = false;

        const grid = document.getElementById('pokedex-grid');
        const searchInput = document.getElementById('pokedex-search');
        const sentinel = document.getElementById('sentinel');
        const loader = document.getElementById('loader');
        const modal = document.getElementById('pokemon-modal');
        const modalBody = document.getElementById('modal-body');
        const closeModal = document.getElementById('close-modal');

        async function initPokedex() {
            try {
                // Load Pokemon and Moves in parallel
                const [pokeRes, movesRes] = await Promise.all([
                    fetch('../assets/pokemon.json'),
                    fetch('../assets/moves.json')
                ]);

                allPokemon = await pokeRes.json();
                allMoves = await movesRes.json();

                filteredPokemon = [...allPokemon];
                loadMore();
            } catch (err) {
                console.error('Failed to load Pokedex data:', err);
            }
        }

        function handleSpriteError(img, name) {
            if (img.dataset.fallbackState === 'final') return;

            const clean = name.toLowerCase().replace(/ /g, '-').replace(/\./g, '').replace(/[^a-z0-9-]/g, '');
            const isMega = clean.includes('mega');

            if (!img.dataset.fallbackState && isMega && !img.src.includes('assets/')) {
                img.dataset.fallbackState = '1';
                let suffix = 'mega';
                if (clean.includes('-mega-x') || clean.includes('megax')) suffix = 'mega-x';
                else if (clean.includes('-mega-y') || clean.includes('megay')) suffix = 'mega-y';
                else if (clean.includes('-mega-z') || clean.includes('megaz')) suffix = 'mega-z';

                // If clean already ends with suffix, use it. Otherwise, extract base and append.
                const hasSuffix = clean.endsWith(suffix) || clean.endsWith(suffix.replace('-', ''));
                let fileName = hasSuffix ? clean : '';

                if (!fileName) {
                    const base = clean.split('-mega')[0];
                    fileName = `${base}-${suffix}`;
                }

                img.src = `../assets/mega-sprites/${fileName}.gif`;
                return;
            }

            img.dataset.fallbackState = 'final';
            img.onerror = null;

            if (!img.src.includes('xy')) {
                img.src = `https://www.smogon.com/dex/media/sprites/xy/${clean}.gif`;
            } else {
                img.src = 'https://play.pokemonshowdown.com/sprites/ani/unown-interrogation.gif';
            }
        }

        function getSpriteUrl(name) {
            let clean = name.toLowerCase()
                .replace(/ /g, '-')
                .replace(/\./g, '')
                .replace(/'/g, '')
                .replace(/:/g, '')
                .replace(/%/g, '');

            if (clean === 'giratina-altered') clean = 'giratina-origin';
            if (clean === 'mimikyu-disguised') clean = 'mimikyu';
            if (clean.includes('noctowl')) clean = 'noctowl';

            return `https://play.pokemonshowdown.com/sprites/ani/${clean}.gif`;
        }

        function createPokemonCard(pokemon) {
            const card = document.createElement('div');
            card.className = 'pokedex-card';
            card.onclick = () => showPokemonDetails(pokemon);

            const stats = [
                { label: 'HP', val: pokemon.HP, class: 'hp', max: 255 },
                { label: 'ATK', val: pokemon.Attack, class: 'atk', max: 190 },
                { label: 'DEF', val: pokemon.Defense, class: 'def', max: 230 },
                { label: 'SPE', val: pokemon.Speed, class: 'spe', max: 200 }
            ];

            const statHtml = stats.map(s => `
                <div class="stat-row">
                    <span class="stat-label">${s.label}</span>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill stat-${s.class}" style="width: ${(s.val / s.max) * 100}%"></div>
                    </div>
                    <span style="width: 25px; text-align: right;">${s.val}</span>
                </div>
            `).join('');

            card.innerHTML = `
                <span class="pokemon-number">#${String(pokemon.id).padStart(4, '0')}</span>
                <img src="${getSpriteUrl(pokemon.Name)}" alt="${pokemon.Name}" class="pokemon-img" 
                     onerror="handleSpriteError(this, '${pokemon.Name}')">
                <h3 style="color: white; font-size: 1.4rem; margin-bottom: 0.5rem; font-family: 'Inter', sans-serif;">${pokemon.Name}</h3>
                <div style="margin-bottom: 1.5rem;">
                    <span class="type-tag type-${pokemon.Type_1.toLowerCase()}">${pokemon.Type_1}</span>
                    ${pokemon.Type_2 ? `<span class="type-tag type-${pokemon.Type_2.toLowerCase()}">${pokemon.Type_2}</span>` : ''}
                </div>
                <div class="stat-container">
                    ${statHtml}
                </div>
            `;
            return card;
        }

        function showPokemonDetails(pokemon) {
            // Find moves of the same types
            const compatibleMoves = allMoves.filter(m =>
            (m.type && (m.type.toLowerCase() === pokemon.Type_1.toLowerCase() ||
                (pokemon.Type_2 && m.type.toLowerCase() === pokemon.Type_2.toLowerCase())))
            ).slice(0, 10); // Show top 10 relevant moves

            const movesHtml = compatibleMoves.length > 0 ? compatibleMoves.map(m => `
                <div class="move-card">
                    <div class="move-header">
                        <div class="move-name-wrap">
                            <span class="move-name">${m.name}</span>
                            <span class="move-type-badge type-${m.type ? m.type.toLowerCase() : 'normal'}">${m.type || 'Normal'}</span>
                        </div>
                        <div class="move-stats">
                            <span class="move-stat-item">PWR: <b>${m.power || '--'}</b></span>
                            <span class="move-stat-item">ACC: <b>${m.accuracy || '--'}</b></span>
                            <span class="move-stat-item">PP: <b>${m.pp || '--'}</b></span>
                        </div>
                    </div>
                    <p class="move-description">${m.short_description || 'No description available.'}</p>
                </div>
            `).join('') : '<p>No specific moves found for these types.</p>';

            const stats = [
                { label: 'HP', val: pokemon.HP, class: 'hp', max: 255 },
                { label: 'Attack', val: pokemon.Attack, class: 'atk', max: 190 },
                { label: 'Defense', val: pokemon.Defense, class: 'def', max: 230 },
                { label: 'Sp. Atk', val: pokemon['Sp.Atk'], class: 'spa', max: 194 },
                { label: 'Sp. Def', val: pokemon['Sp.Def'], class: 'spd', max: 230 },
                { label: 'Speed', val: pokemon.Speed, class: 'spe', max: 200 }
            ];

            const detailedStatsHtml = stats.map(s => `
                <div class="modal-stat-row">
                    <div class="modal-stat-header">
                        <span>${s.label}</span>
                        <span>${s.val}</span>
                    </div>
                    <div class="modal-stat-bar-container">
                        <div class="modal-stat-bar stat-${s.class}" style="width: ${(s.val / s.max) * 100}%"></div>
                    </div>
                </div>
            `).join('');

            modalBody.innerHTML = `
                <div class="modal-grid">
                    <div class="modal-header-section">
                        <div class="modal-sprite-container">
                            <img src="${getSpriteUrl(pokemon.Name)}" alt="${pokemon.Name}" class="modal-sprite"
                                 onerror="handleSpriteError(this, '${pokemon.Name}')">
                        </div>
                        <h2 style="font-size: 2.5rem; color: white; margin-bottom: 0.5rem;">${pokemon.Name}</h2>
                        <p style="color: var(--primary-red); font-weight: 700; font-family: 'JetBrains Mono';">#${String(pokemon.id).padStart(4, '0')}</p>
                        
                        <div class="modal-badge-group">
                            <span class="type-tag type-${pokemon.Type_1.toLowerCase()}" style="font-size: 1rem; padding: 8px 20px;">${pokemon.Type_1}</span>
                            ${pokemon.Type_2 ? `<span class="type-tag type-${pokemon.Type_2.toLowerCase()}" style="font-size: 1rem; padding: 8px 20px;">${pokemon.Type_2}</span>` : ''}
                        </div>

                        <div class="modal-badge-group" style="margin-top: 15px;">
                            ${pokemon.Is_Legendary ? '<span class="special-badge badge-legendary">Legendary</span>' : ''}
                            ${pokemon.Is_Mythical ? '<span class="special-badge badge-mythical">Mythical</span>' : ''}
                            ${pokemon.Is_Pseudo_Legendary ? '<span class="special-badge badge-pseudo">Pseudo-Legendary</span>' : ''}
                        </div>

                        <div class="modal-info-grid">
                            <div class="info-item">
                                <span class="info-label">Height</span>
                                <span class="info-value">${pokemon['Height(m)']}m</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Weight</span>
                                <span class="info-value">${pokemon['Weight{kg}']}kg</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Generation</span>
                                <span class="info-value">${pokemon.Generation || '1'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Catch Rate</span>
                                <span class="info-value">${pokemon.Capture_Rate || '--'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Egg Group 1</span>
                                <span class="info-value">${pokemon.Egg_Group_1 || 'Unknown'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Base Happiness</span>
                                <span class="info-value">${pokemon.Base_Happiness || '--'}</span>
                            </div>
                        </div>

                        <div class="total-stats-pill">
                            TOTAL STATS: ${pokemon.Total_Stats || 'N/A'}
                        </div>
                    </div>

                    <div class="modal-details-section">
                        <div class="modal-stats-section">
                            <h3>BASE STATS</h3>
                            ${detailedStatsHtml}
                        </div>

                        <div class="modal-moves-section" style="margin-top: 40px;">
                            <h3>COMPATIBLE MOVES</h3>
                            <p style="color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-bottom: 15px;">Moves of matching elemental types.</p>
                            <div class="modal-moves-list">
                                ${movesHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModalHandler() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        closeModal.onclick = closeModalHandler;
        window.onclick = (e) => { if (e.target === modal) closeModalHandler(); };

        function loadMore() {
            if (isLoading) return;
            isLoading = true;

            const start = currentPage * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const nextBatch = filteredPokemon.slice(start, end);

            if (nextBatch.length === 0) {
                isLoading = false;
                return;
            }

            const fragment = document.createDocumentFragment();
            nextBatch.forEach(p => fragment.appendChild(createPokemonCard(p)));
            grid.appendChild(fragment);

            currentPage++;
            isLoading = false;
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            filteredPokemon = allPokemon.filter(p =>
                p.Name.toLowerCase().includes(query) ||
                String(p.id).includes(query) ||
                p.Type_1.toLowerCase().includes(query) ||
                (p.Type_2 && p.Type_2.toLowerCase().includes(query)) ||
                (p.Generation && String(p.Generation).toLowerCase().includes(query))
            );
            grid.innerHTML = '';
            currentPage = 0;
            loadMore();
        });

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadMore();
            }
        }, { rootMargin: '200px' });

        observer.observe(sentinel);
        initPokedex();
    </script>
</body>

</html>
